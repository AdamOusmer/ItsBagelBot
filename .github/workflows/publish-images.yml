name: Publish Container Images

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      service:
        description: Service image to rebuild
        required: true
        default: all
        type: choice
        options:
          - all
          - commands
          - modules
          - notifications
          - outgress
          - projector
          - transactions
          - users
          - worker
          - twitch-ingress
          - console-dashboard
          - console-admin

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: itsbagelbot

jobs:
  changes:
    name: Select images
    runs-on: ubuntu-22.04
    outputs:
      has-changes: ${{ steps.plan.outputs.has-changes }}
      matrix: ${{ steps.plan.outputs.matrix }}
      build_matrix: ${{ steps.plan.outputs.build_matrix }}
      services: ${{ steps.plan.outputs.services }}
      build_ts: ${{ steps.plan.outputs.build_ts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build image matrix from changed paths
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          all_services='[
            {
              "image": "commands",
              "context": ".",
              "containerfile": "app/commands/Containerfile",
              "description": "ItsBagelBot commands data service"
            },
            {
              "image": "modules",
              "context": ".",
              "containerfile": "app/modules/Containerfile",
              "description": "ItsBagelBot modules data service"
            },
            {
              "image": "notifications",
              "context": ".",
              "containerfile": "app/notifications/Containerfile",
              "description": "ItsBagelBot notifications data service"
            },
            {
              "image": "outgress",
              "context": ".",
              "containerfile": "app/outgress/Containerfile",
              "description": "ItsBagelBot Twitch egress service"
            },
            {
              "image": "projector",
              "context": ".",
              "containerfile": "app/projector/Containerfile",
              "description": "ItsBagelBot settings projection service"
            },
            {
              "image": "transactions",
              "context": ".",
              "containerfile": "app/transactions/Containerfile",
              "description": "ItsBagelBot transactions data service"
            },
            {
              "image": "users",
              "context": ".",
              "containerfile": "app/users/Containerfile",
              "description": "ItsBagelBot users data service"
            },
            {
              "image": "worker",
              "context": ".",
              "containerfile": "app/worker/Containerfile",
              "description": "ItsBagelBot Twitch event worker"
            },
            {
              "image": "twitch-ingress",
              "context": "app/ingress",
              "containerfile": "app/ingress/Containerfile",
              "description": "ItsBagelBot Twitch ingress service"
            },
            {
              "image": "console-dashboard",
              "context": "console",
              "containerfile": "console/dashboard/Containerfile",
              "description": "ItsBagelBot console dashboard (SvelteKit SSR)"
            },
            {
              "image": "console-admin",
              "context": "console",
              "containerfile": "console/admin/Containerfile",
              "description": "ItsBagelBot console admin (SvelteKit SSR)"
            }
          ]'

          declare -A selected=()

          add() {
            selected["$1"]=1
          }

          add_root_go_services() {
            add "commands"
            add "modules"
            add "notifications"
            add "outgress"
            add "projector"
            add "transactions"
            add "users"
            add "worker"
          }

          add_all_services() {
            add "commands"
            add "modules"
            add "notifications"
            add "outgress"
            add "projector"
            add "transactions"
            add "users"
            add "worker"
            add "twitch-ingress"
            add "console-dashboard"
            add "console-admin"
          }

          select_for_path() {
            local path="$1"

            case "$path" in
              .github/workflows/publish-images.yml)
                add_all_services
                ;;
              .containerignore|go.mod|go.sum|pkg/*)
                add_root_go_services
                ;;
              internal/domain/*|internal/utils/*)
                add_root_go_services
                ;;
              app/commands/*)
                add "commands"
                ;;
              app/ingress/*)
                add "twitch-ingress"
                ;;
              app/modules/*)
                add "modules"
                ;;
              app/notifications/*)
                add "notifications"
                ;;
              app/outgress/*)
                add "outgress"
                ;;
              app/projector/*)
                add "projector"
                ;;
              app/transactions/*)
                add "transactions"
                ;;
              app/users/*)
                add "users"
                ;;
              app/worker/*)
                add "worker"
                ;;
              console/shared/*|console/bunfig.toml|console/bun.lock|console/package.json)
                add "console-dashboard"
                add "console-admin"
                ;;
              console/dashboard/*)
                add "console-dashboard"
                ;;
              console/admin/*)
                add "console-admin"
                ;;
            esac
          }

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            requested="${{ inputs.service }}"
            if [[ "$requested" == "all" ]]; then
              add_all_services
            else
              add "$requested"
            fi
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            add_all_services
          else
            if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.event.pull_request.head.sha }}"
            else
              base="${{ github.event.before }}"
              head="${{ github.sha }}"
            fi

            if [[ "$base" =~ ^0+$ ]] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
              add_all_services
            else
              mapfile -t changed_files < <(git diff --name-only "$base" "$head")
              for path in "${changed_files[@]}"; do
                select_for_path "$path"
              done
            fi
          fi

          selected_json=$(
            for service in "${!selected[@]}"; do
              printf '%s\n' "$service"
            done | jq -R . | jq -cs .
          )
          matrix=$(jq -c --argjson selected "$selected_json" '[.[] | select(.image as $image | $selected | index($image))]' <<< "$all_services")
          build_matrix=$(jq -c '
            [
              .[] as $service
              | ($service + {
                  platform: "linux/amd64",
                  arch_label: "Intel x86_64",
                  runner: "ubuntu-24.04",
                  tag_suffix: "linuxx86_64"
                }),
                ($service + {
                  platform: "linux/arm64",
                  arch_label: "ARM64",
                  runner: "ubuntu-24.04-arm",
                  tag_suffix: "linuxarm64"
                })
            ]
          ' <<< "$matrix")
          services=$(jq -r '.[].image' <<< "$matrix" | paste -sd ',' -)

          if [[ "$matrix" == "[]" ]]; then
            echo "No service image changes detected."
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Selected service images: $services"
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          fi

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "build_matrix=$build_matrix" >> "$GITHUB_OUTPUT"
          echo "services=$services" >> "$GITHUB_OUTPUT"
          echo "build_ts=$(git show -s --format=%ct "${GITHUB_SHA}")" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.image }} ${{ matrix.arch_label }}
    needs: changes
    if: needs.changes.outputs.has-changes == 'true'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.changes.outputs.build_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Prepare image metadata
        id: meta
        shell: bash
        env:
          BUILD_TS: ${{ needs.changes.outputs.build_ts }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="${IMAGE_REPOSITORY}/${{ matrix.image }}"
          registry="${REGISTRY}/${owner}"
          base_tags="sha-${GITHUB_SHA::12}"

          if [[ "${GITHUB_EVENT_NAME}" == "push" || "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]] && [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            base_tags="${base_tags} main latest main-${BUILD_TS}-${GITHUB_SHA::12}"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME#v}"
            base_tags="${base_tags} ${GITHUB_REF_NAME} ${version}"
          fi

          tags=""
          for tag in $base_tags; do
            tags="${tags} ${tag}-${{ matrix.tag_suffix }}"
          done
          tags="${tags# }"

          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "registry=${registry}" >> "${GITHUB_OUTPUT}"
          echo "subject=${registry}/${image}" >> "${GITHUB_OUTPUT}"
          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"

      - name: Install Podman toolchain
        run: |
          # GitHub-hosted Ubuntu runners may ship optional Microsoft apt feeds.
          # If those feeds 403, apt-get update fails before reaching Ubuntu's
          # buildah/podman packages, so remove only the optional feeds here.
          sudo rm -f \
            /etc/apt/sources.list.d/azure-cli.list \
            /etc/apt/sources.list.d/azure-cli.sources \
            /etc/apt/sources.list.d/microsoft-prod.list \
            /etc/apt/sources.list.d/microsoft-prod.sources
          sudo apt-get update
          sudo apt-get install -y buildah podman
          buildah version
          podman version

      - name: Build native image
        id: build
        shell: bash
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          TAGS: ${{ steps.meta.outputs.tags }}
          CONTEXT: ${{ matrix.context }}
          CONTAINERFILE: ${{ matrix.containerfile }}
          PLATFORM: ${{ matrix.platform }}
          DESCRIPTION: ${{ matrix.description }}
        run: |
          set -euo pipefail

          tag_args=()
          for tag in $TAGS; do
            tag_args+=(-t "${IMAGE}:${tag}")
          done

          buildah bud \
            --platform "$PLATFORM" \
            --format oci \
            --build-arg "BUILD_VERSION=${GITHUB_SHA::12}" \
            --label "org.opencontainers.image.title=ItsBagelBot ${{ matrix.image }}" \
            --label "org.opencontainers.image.description=${DESCRIPTION}" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.licenses=LicenseRef-Proprietary" \
            -f "$CONTAINERFILE" \
            "${tag_args[@]}" \
            "$CONTEXT"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | buildah login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Push native image to GHCR
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          REGISTRY_PATH: ${{ steps.meta.outputs.registry }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          for tag in $TAGS; do
            buildah push "${IMAGE}:${tag}" "docker://${REGISTRY_PATH}/${IMAGE}:${tag}"
          done

  manifest:
    name: Publish manifest ${{ matrix.image }}
    needs: [ changes, build ]
    if: needs.changes.outputs.has-changes == 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.changes.outputs.matrix) }}

    steps:
      - name: Prepare image metadata
        id: meta
        shell: bash
        env:
          BUILD_TS: ${{ needs.changes.outputs.build_ts }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="${IMAGE_REPOSITORY}/${{ matrix.image }}"
          registry="${REGISTRY}/${owner}"
          tags="sha-${GITHUB_SHA::12}"

          if [[ "${GITHUB_EVENT_NAME}" == "push" || "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]] && [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            tags="${tags} main latest main-${BUILD_TS}-${GITHUB_SHA::12}"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME#v}"
            tags="${tags} ${GITHUB_REF_NAME} ${version}"
          fi

          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "registry=${registry}" >> "${GITHUB_OUTPUT}"
          echo "subject=${registry}/${image}" >> "${GITHUB_OUTPUT}"
          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"

      - name: Install Podman toolchain
        run: |
          # GitHub-hosted Ubuntu runners may ship optional Microsoft apt feeds.
          # If those feeds 403, apt-get update fails before reaching Ubuntu's
          # podman package, so remove only the optional feeds here.
          sudo rm -f \
            /etc/apt/sources.list.d/azure-cli.list \
            /etc/apt/sources.list.d/azure-cli.sources \
            /etc/apt/sources.list.d/microsoft-prod.list \
            /etc/apt/sources.list.d/microsoft-prod.sources
          sudo apt-get update
          sudo apt-get install -y podman
          podman version

      - name: Login to GHCR
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Publish multi-architecture manifests
        id: publish
        shell: bash
        env:
          SUBJECT: ${{ steps.meta.outputs.subject }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          first_digest=""

          for tag in $TAGS; do
            manifest="${SUBJECT}:${tag}"
            digest_file="$(mktemp)"
            podman manifest create "$manifest"
            podman manifest add "$manifest" "docker://${SUBJECT}:${tag}-linuxx86_64"
            podman manifest add "$manifest" "docker://${SUBJECT}:${tag}-linuxarm64"
            podman manifest push --all --digestfile "$digest_file" "$manifest" "docker://${manifest}"
            digest="$(<"$digest_file")"
            rm -f "$digest_file"
            echo "${tag} ${digest}"

            if [[ -z "$first_digest" ]]; then
              first_digest="${digest##*@}"
            fi
          done

          echo "digest=${first_digest}" >> "$GITHUB_OUTPUT"

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ steps.meta.outputs.subject }}
          subject-digest: ${{ steps.publish.outputs.digest }}
