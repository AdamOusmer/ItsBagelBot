name: Go Test Pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1. Check out the code
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # setup-go@v5 caches the module cache + build cache by default, keyed on
      # go.sum, so no separate actions/cache step is needed.
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'

      - name: Install dependencies
        run: go mod download

      # Regenerate every service's Ent client. Discovered from app/*/ent/schema
      # so adding a new Ent service needs no edit here.
      - name: Generate Ent clients
        run: |
          set -euo pipefail
          for schema in app/*/ent/schema; do
            echo "ent generate ./$schema"
            # sql/upsert is required by the commands/modules batch flush
            # (INSERT ... ON DUPLICATE KEY UPDATE); applied to every schema so
            # generated clients stay uniform across services.
            go run -mod=mod entgo.io/ent/cmd/ent generate --feature sql/upsert "./$schema"
          done

      # -race detects race conditions (good for a concurrent bot); -v names the
      # failing test.
      - name: Run Tests
        run: go test -v -race ./...
