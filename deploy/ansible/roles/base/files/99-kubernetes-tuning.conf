# --- KUBERNETES WATCHERS ---
# k3s needs high inotify limits to watch pod state changes efficiently
fs.inotify.max_user_instances = 8192
fs.inotify.max_user_watches = 524288
fs.file-max = 2097152

# --- TAILSCALE / UDP OPTIMIZATIONS ---
# Tailscale creates direct peer-to-peer UDP tunnels.
# Expanding network buffers prevents packet loss during high throughput.
net.core.rmem_max = 2500000
net.core.wmem_max = 2500000

# --- TCP CONNECTION STEROIDS ---
# Enable Google's BBR congestion control algorithm.
# This drastically improves network speed and reduces latency over the internet.
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# Increase the number of local ports available for outbound connections (Cloudflared/k3s)
net.ipv4.ip_local_port_range = 1024 65535

# Increase the maximum number of connections the kernel will queue before dropping them
net.core.somaxconn = 65535
net.ipv4.tcp_max_syn_backlog = 65535

# Speed up the closing of old connections so ports become available faster
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_tw_reuse = 1

# --- IP FORWARDING (Required for k3s & Tailscale) ---
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1
