# Doppler -> Kubernetes secret sync for the New Relic stack (ns newrelic).
#
# These DopplerSecrets already exist LIVE but were applied out-of-band (each
# carries a kubectl last-applied-configuration and is NOT Flux-managed). This
# file pulls them into the repo so the `cluster` Kustomization owns them, mirror-
# ing their live specs EXACTLY (managedSecret name + processor asName), so Flux
# adoption is a no-op rather than a rewrite. The Doppler operator reconciles the
# managed Secrets from project infra / config prd_newrelic.
#
# WHY THESE EXACT asName VALUES: each nri-bundle subchart reads its license from
# a DIFFERENT key, so the single Doppler var NEWRELIC_LICENSE_KEY is projected
# under the key each subchart expects. The HelmRelease (newrelic.yaml) points
# customSecretName/customSecretLicenseKey at these:
#   nri-bundle-newrelic-infrastructure-license  key licenseKey  (infra agents)
#   nri-bundle-newrelic-logging-config           key license     (fluent-bit)
#   nri-bundle-newrelic-prometheus-agent-license key licenseKey  (prometheus)
#   newrelic-key-secret                          key new_relic_license_key (spare)
#   valkey-core-secret                           key VALKEY_CORE_PASSWORD (nri-redis)
#
# The valkey password is consumed as a FILE, not env: the kubelet agent mounts
# valkey-core-secret at /secrets/valkey and nri-redis reads
# /secrets/valkey/VALKEY_CORE_PASSWORD. The key is NOT renamed to valkey-password
# (the live secret carries VALKEY_CORE_PASSWORD verbatim and that is the proven
# mount path). The earlier partial helm-values overlay that proposed an
# asName: valkey-password rename has been superseded by the HelmRelease and
# removed; the rename was never reconciled live, so we do NOT adopt it.
#
# NOTE: there is NO DopplerSecret for nri-kube-events here on purpose -- that
# component is disabled in the HelmRelease, so its leftover license secret is not
# managed and can be GC'd during cutover (see RUNBOOK).
---
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: doppler-nr-infrastructure
  namespace: newrelic
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: doppler-token-secret
  managedSecret:
    name: nri-bundle-newrelic-infrastructure-license
    namespace: newrelic
    type: Opaque
  processors:
    NEWRELIC_LICENSE_KEY:
      asName: licenseKey
      type: plain
  resyncSeconds: 60
  verifyTLS: true
---
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: doppler-nr-logging
  namespace: newrelic
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: doppler-token-secret
  managedSecret:
    name: nri-bundle-newrelic-logging-config
    namespace: newrelic
    type: Opaque
  processors:
    NEWRELIC_LICENSE_KEY:
      asName: license
      type: plain
  resyncSeconds: 60
  verifyTLS: true
---
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: doppler-nr-prometheus
  namespace: newrelic
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: doppler-token-secret
  managedSecret:
    name: nri-bundle-newrelic-prometheus-agent-license
    namespace: newrelic
    type: Opaque
  processors:
    NEWRELIC_LICENSE_KEY:
      asName: licenseKey
      type: plain
  resyncSeconds: 60
  verifyTLS: true
---
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: doppler-newrelic-key-secret
  namespace: newrelic
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: doppler-token-secret
  managedSecret:
    name: newrelic-key-secret
    namespace: newrelic
    type: Opaque
  processors:
    NEWRELIC_LICENSE_KEY:
      asName: new_relic_license_key
      type: plain
  resyncSeconds: 60
  verifyTLS: true
---
# Valkey password for nri-redis. Mirrors the live doppler-nr-valkey spec: NO
# processor rename, so the managed secret keeps the key VALKEY_CORE_PASSWORD that
# the agent mount path /secrets/valkey/VALKEY_CORE_PASSWORD depends on.
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: doppler-nr-valkey
  namespace: newrelic
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: doppler-token-secret
  managedSecret:
    name: valkey-core-secret
    namespace: newrelic
    type: Opaque
  processors: {}
  resyncSeconds: 60
  verifyTLS: true
