apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- gotk-components.yaml
- gotk-sync.yaml
patches:
# Keep every Flux controller off node1. node1 is a 2-core, infra-loaded ARM host
# being freed for its DB role (see node1-to-db-RUNBOOK.md); the controllers are
# stateless (caches self-rebuild) so node2/node3 host them without a data move.
- target:
    kind: Deployment
  patch: |-
    - op: add
      path: /spec/template/spec/affinity
      value:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [node1]
# Memory-limit trims. Upstream gotk-components ships every controller with
# limits.memory: 1Gi, and GOMEMLIMIT is wired to limits.memory via
# resourceFieldRef, so the Go GC happily lets the heap coast toward 1Gi.
# Lowering the limit lowers GOMEMLIMIT with it and the GC keeps RSS near the
# real working set instead. Measured before the trim (2026-07-06):
# image-reflector 580Mi RSS (12 ImageRepositories, ~5.5k tags in its badger
# cache), kustomize 210Mi. 384Mi leaves the reflector headroom for badger
# compaction spikes; kustomize builds this small repo well under 256Mi.
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: image-reflector-controller
      namespace: flux-system
    spec:
      template:
        spec:
          containers:
            - name: manager
              resources:
                limits:
                  memory: 384Mi
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: kustomize-controller
      namespace: flux-system
    spec:
      template:
        spec:
          containers:
            - name: manager
              resources:
                limits:
                  memory: 256Mi
