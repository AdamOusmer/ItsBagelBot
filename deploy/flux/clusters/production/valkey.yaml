# Valkey sentinel cluster (valkey namespace). Kept separate from the apps
# Kustomization because that one pins everything to targetNamespace: production;
# here targetNamespace is unset so the manifests' own namespace (valkey)
# applies. wait is on: the StatefulSet reports health, so Flux blocks until the
# rolling restart settles.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: valkey
  namespace: flux-system
spec:
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./deploy/k8s-valkey
  prune: true
  wait: true
  timeout: 10m
