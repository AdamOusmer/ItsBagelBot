# Cross-namespace cluster infrastructure (cloudflared tunnel DaemonSet in the
# cloudflared namespace, traefik HelmChartConfig in kube-system). Kept separate
# from the apps Kustomization because that one pins everything to
# targetNamespace: production; here targetNamespace is unset so each manifest's
# own namespace applies. wait is off: HelmChartConfig is a CRD with no health
# status, so a readiness wait would stall.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./deploy/k8s-cluster
  prune: true
  wait: false
  timeout: 5m
