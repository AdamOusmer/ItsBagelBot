---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: twitch-ingress
  namespace: flux-system
spec:
  image: ghcr.io/adamousmer/itsbagelbot/twitch-ingress
  interval: 5m
  secretRef:
    name: ghcr-pull
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: twitch-ingress
  namespace: flux-system
spec:
  digestReflectionPolicy: Always
  imageRepositoryRef:
    name: twitch-ingress
  filterTags:
    pattern: '^main-(?P<ts>[0-9]+)-[a-f0-9]{12}$'
    extract: $ts
  policy:
    numerical:
      order: asc
