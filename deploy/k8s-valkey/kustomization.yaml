apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: valkey

resources:
  - serviceaccount.yaml
  - rbac.yaml
  - services.yaml
  - pdb.yaml
  - dopplersecrets.yaml
  - statefulset.yaml

# Base config is generated with a content hash so any edit rolls the
# StatefulSet (kustomize rewrites the volume reference to the hashed name).
# Start/ping logic no longer lives in mounted scripts: valkey-server runs the
# seeded conf directly, the Tailscale announce IP comes from the downward API
# (status.hostIP is the node's tailnet address here), failover persistence is
# valkey's built-in CONFIG REWRITE, and probes are inline valkey-cli. A small
# initContainer seeds the writable /data conf once.
configMapGenerator:
  - name: valkey-config
    files:
      - config/sentinel.conf
      - config/valkey.conf
