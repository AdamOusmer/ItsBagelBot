apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: node
    app.kubernetes.io/instance: valkey
    app.kubernetes.io/name: valkey
  name: valkey
  namespace: valkey
spec:
  ports:
  - name: tcp-redis
    port: 6379
    protocol: TCP
    targetPort: redis
  - name: tcp-sentinel
    port: 26379
    protocol: TCP
    targetPort: valkey-sentinel
  selector:
    app.kubernetes.io/component: node
    app.kubernetes.io/instance: valkey
    app.kubernetes.io/name: valkey
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: valkey
    app.kubernetes.io/name: valkey
  name: valkey-headless
  namespace: valkey
spec:
  ports:
  - name: redis
    port: 6379
    protocol: TCP
    targetPort: redis
  - name: valkey-sentinel
    port: 26379
    protocol: TCP
    targetPort: valkey-sentinel
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/component: node
    app.kubernetes.io/instance: valkey
    app.kubernetes.io/name: valkey
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: metrics
    app.kubernetes.io/instance: valkey
    app.kubernetes.io/name: valkey
  name: valkey-metrics
  namespace: valkey
spec:
  ports:
  - name: http-metrics
    port: 9121
    protocol: TCP
    targetPort: metrics
  selector:
    app.kubernetes.io/component: node
    app.kubernetes.io/instance: valkey
    app.kubernetes.io/name: valkey
  type: ClusterIP
