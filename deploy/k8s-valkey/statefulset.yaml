apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/component: node
    app.kubernetes.io/instance: valkey
    app.kubernetes.io/name: valkey
  name: valkey-node
  namespace: valkey
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  replicas: 4 # one valkey+sentinel pod per node incl worker1 (hostPort + one-per-node spread)
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/component: node
      app.kubernetes.io/instance: valkey
      app.kubernetes.io/name: valkey
  serviceName: valkey-headless
  template:
    metadata:
      annotations:
        config.linkerd.io/skip-inbound-ports: 6379,26379,9121
        config.linkerd.io/skip-outbound-ports: 6379,26379
        linkerd.io/inject: enabled
        prometheus.io/port: '9121'
        prometheus.io/scrape: 'true'
        secrets.doppler.com/reload: 'true'
      labels:
        app.kubernetes.io/component: node
        app.kubernetes.io/instance: valkey
        app.kubernetes.io/name: valkey
    spec:
      containers:
      - command:
        - /bin/sh
        - /scripts/start-valkey.sh
        image: valkey/valkey:9.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - /scripts/ping-valkey.sh
          failureThreshold: 3
          initialDelaySeconds: 20
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        name: valkey
        ports:
        - containerPort: 6379
          hostPort: 6379
          name: redis
          protocol: TCP
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - /scripts/ping-valkey.sh
          failureThreshold: 3
          initialDelaySeconds: 10
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 3
        resources:
          limits:
            cpu: '1'
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 999
          seccompProfile:
            type: RuntimeDefault
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data
          name: valkey-data
        - mountPath: /scripts
          name: scripts
        - mountPath: /secrets/core
          name: core-secret
          readOnly: true
        - mountPath: /secrets/users
          name: users-secret
          readOnly: true
        - mountPath: /config
          name: valkey-config
          readOnly: true
      - command:
        - /bin/sh
        - /scripts/start-sentinel.sh
        image: valkey/valkey:9.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - /scripts/ping-sentinel.sh
          failureThreshold: 3
          initialDelaySeconds: 20
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        name: sentinel
        ports:
        - containerPort: 26379
          hostPort: 26379
          name: valkey-sentinel
          protocol: TCP
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - /scripts/ping-sentinel.sh
          failureThreshold: 3
          initialDelaySeconds: 15
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 30m
            memory: 32Mi
          requests:
            cpu: 5m
            memory: 16Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 999
          seccompProfile:
            type: RuntimeDefault
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data
          name: valkey-data
        - mountPath: /scripts
          name: scripts
        - mountPath: /secrets/core
          name: core-secret
          readOnly: true
        - mountPath: /config
          name: valkey-config
          readOnly: true
      - env:
        - name: REDIS_ADDR
          value: redis://127.0.0.1:6379
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              key: valkey-password
              name: valkey-core-secret
        image: oliver006/redis_exporter:v1.83.0
        imagePullPolicy: IfNotPresent
        name: metrics
        ports:
        - containerPort: 9121
          name: metrics
          protocol: TCP
        resources:
          limits:
            cpu: 30m
            memory: 32Mi
          requests:
            cpu: 5m
            memory: 16Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 59000
          seccompProfile:
            type: RuntimeDefault
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      priorityClassName: infra-low
      restartPolicy: Always
      # Tolerate the worker-pool taint so a valkey-node lands on worker1 too.
      # one-per-node spread (below) + hostPort keep it exactly one per node.
      tolerations:
      - key: itsbagelbot.dev/pool
        operator: Equal
        value: worker-pool
        effect: NoSchedule
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
      serviceAccount: valkey
      serviceAccountName: valkey
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/component: node
            app.kubernetes.io/instance: valkey
            app.kubernetes.io/name: valkey
        maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
      volumes:
      - configMap:
          defaultMode: 365
          name: valkey-scripts
        name: scripts
      - name: core-secret
        secret:
          defaultMode: 256
          secretName: valkey-core-secret
      - name: users-secret
        secret:
          defaultMode: 256
          secretName: valkey-users-secret
      - configMap:
          defaultMode: 420
          name: valkey-config
        name: valkey-config
  updateStrategy:
    type: RollingUpdate
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: valkey-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 8Gi
      volumeMode: Filesystem
    status:
      phase: Pending
