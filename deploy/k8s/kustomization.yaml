apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: production
resources:
  - console-admin.yaml
  - commands.yaml
  - console-dashboard.yaml
  # console-admin.yaml now replaces the Go admin tier, sharing the admin.tail451e6d.ts.net host.
  - modules.yaml
  - notifications.yaml
  - outgress.yaml
  - projector.yaml
  - transactions.yaml
  - users.yaml
  - worker.yaml
  # sesame is the worker rewrite. It ships ALONGSIDE worker on purpose: it reuses
  # worker's lane consumer group ("worker"), so the two share the DeliverGroup and
  # messages load-balance across them — no double-processing, no gap. Once sesame is
  # confirmed healthy, the worker-deletion PR removes worker.yaml (apps Kustomization
  # has prune=true, so dropping it prunes the worker Deployment/PDB/DopplerSecret)
  # along with app/worker/ and images/worker.yaml.
  - sesame.yaml
  - twitch-ingress.yaml
  - network-policies.yaml
  - linkerd-auth.yaml
  - nats.yaml
  - nats-leaf.yaml
  - nats-auth-dopplersecret.yaml
# NATS broker config, formerly created by apply-nats.sh. The configmaps hold
# only the server conf + the auth conf ($ENV placeholders expanded at runtime
# from the nats-auth-env secret). disableNameSuffixHash keeps the names stable
# (nats-config / nats-leaf-config) so the volume mounts resolve and the
# config-reloader sidecar hot-reloads on content change instead of forcing a
# pod roll on every edit.
configMapGenerator:
  - name: nats-config
    files:
      - nats.conf=nats-server.conf
      - auth.conf=nats-auth.conf
  - name: nats-leaf-config
    files:
      - nats.conf=nats-leaf-server.conf
      - auth.conf=nats-auth.conf
generatorOptions:
  disableNameSuffixHash: true
