# Hub NATS server. Mounted at /etc/nats/nats.conf by deploy/k8s/nats.yaml;
# auth.conf (from nats-auth.conf) sits next to it in the same configmap, and the
# bcrypt hashes it references arrive through the nats-auth-env secret.

server_name: $POD_NAME

# Listener
port: 4222
http_port: 8222

# Connection limits — generous for many workers
max_connections: 1024
max_payload: 8MB
max_pending: 16MB

# Write deadline for slow consumers — tightened from 10s for faster bad-client
# eviction on the RPC bus; legitimate subscribers drain well under 2s.
write_deadline: "2s"

# Detect dead clients faster
ping_interval: "20s"
ping_max: 3

# Leaf node listener. Each leaf carries the whole fleet, and a leafnode link
# binds exactly one account, so there is one authorized leaf user per account:
# the leaf opens one remote per account (see nats-leaf-server.conf) and the
# matching user here pins that link to the right account. BUS carries the
# JetStream/event plane; the *_RPC accounts carry the per-service RPC + cache
# plane. Both planes ride the leaf as the priority path for fleet clients.
leafnodes {
  port: 7422
  no_advertise: true
  authorization {
    users: [
      { user: "leaf_bus",            password: $NATS_BCRYPT_LEAF_BUS,            account: "BUS" }
      { user: "leaf_users",          password: $NATS_BCRYPT_LEAF_USERS,          account: "USERS_RPC" }
      { user: "leaf_commands",       password: $NATS_BCRYPT_LEAF_COMMANDS,       account: "COMMANDS_RPC" }
      { user: "leaf_modules",        password: $NATS_BCRYPT_LEAF_MODULES,        account: "MODULES_RPC" }
      { user: "leaf_projector",      password: $NATS_BCRYPT_LEAF_PROJECTOR,      account: "PROJECTOR_RPC" }
      { user: "leaf_outgress",       password: $NATS_BCRYPT_LEAF_OUTGRESS,       account: "OUTGRESS_RPC" }
      { user: "leaf_worker",         password: $NATS_BCRYPT_LEAF_WORKER,         account: "WORKER_RPC" }
      { user: "leaf_dashboard",      password: $NATS_BCRYPT_LEAF_DASHBOARD,      account: "DASHBOARD_RPC" }
      { user: "leaf_admin",          password: $NATS_BCRYPT_LEAF_ADMIN,          account: "ADMIN_RPC" }
      { user: "leaf_twitch_ingress", password: $NATS_BCRYPT_LEAF_TWITCH_INGRESS, account: "TWITCH_INGRESS_RPC" }
    ]
  }
}

# Cluster configuration for HA
cluster {
  name: "bagelbot"
  port: 6222
  routes: [
    "nats-route://nats-0.nats-headless.production.svc.cluster.local:6222"
    "nats-route://nats-1.nats-headless.production.svc.cluster.local:6222"
    "nats-route://nats-2.nats-headless.production.svc.cluster.local:6222"
  ]
}

# JetStream configuration. `domain: hub` makes this the authoritative
# JetStream for the cluster; the node2 leaf runs in its own domain.
jetstream {
  store_dir: /data/jetstream
  domain: hub
  max_mem: 256MB
  max_file: 2GB
}

# Limits per account (default account)
max_subscriptions: 0
max_control_line: 4KB

# Per-service users and subject ACLs.
include "auth.conf"
