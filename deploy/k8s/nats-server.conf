# Hub NATS server. Mounted at /etc/nats/nats.conf by deploy/k8s/nats.yaml;
# auth.conf (from nats-auth.conf) sits next to it in the same configmap, and the
# bcrypt hashes it references arrive through the nats-auth-env secret.

server_name: $POD_NAME

# Listener
port: 4222
http_port: 8222

# Connection limits — generous for many workers
max_connections: 1024
max_payload: 8MB
# Per-connection outbound buffer for batch acknowledgements and consumer fanout.
# This matches the leaf and avoids slow-consumer churn during a 700k burst.
max_pending: 64MB

# Write deadline for slow consumers — tightened from 10s for faster bad-client
# eviction on the RPC bus; legitimate subscribers drain well under 2s.
write_deadline: "2s"

# Detect dead clients faster
ping_interval: "20s"
ping_max: 3

# Leaf node listener. Only BUS is bridged between the standalone leaf cluster
# and the JetStream hub. RPC accounts deliberately have no hub leafnode links:
# their request/reply and cache traffic routes directly across the leaf cluster,
# so the RPC tier keeps serving when the hub is unavailable and does not send a
# duplicate copy of every cross-node request toward the hub.
leafnodes {
  port: 7422
  no_advertise: true
  authorization {
    users: [
      { user: "leaf_bus", password: $NATS_BCRYPT_LEAF_BUS, account: "BUS" }
    ]
  }
}

# Cluster configuration for HA
cluster {
  name: "bagelbot"
  port: 6222
  # BUS gets its own route connection instead of sharing a pooled route with
  # control accounts. s2_auto leaves the low-RTT node2<->node3 path uncompressed
  # and compresses the higher-RTT worker1 route, protecting worker1's existing
  # internet link without changing its speed plan.
  accounts: ["BUS"]
  compression: {
    mode: s2_auto
    rtt_thresholds: [5ms, 20ms, 50ms]
  }
  routes: [
    "nats-route://nats-0.nats-headless.production.svc.cluster.local:6222"
    "nats-route://nats-1.nats-headless.production.svc.cluster.local:6222"
    "nats-route://nats-2.nats-headless.production.svc.cluster.local:6222"
  ]
}

# JetStream configuration. `domain: hub` makes this the authoritative
# JetStream for the cluster; the node2 leaf runs in its own domain.
# max_mem must exceed the combined MaxBytes of every memory-backed stream
# (TWITCH_INGRESS 1 GiB + TWITCH_OUTGRESS 256 MiB) plus dedup-id and broker
# state. Hub members now run on node2/node3/worker1, so give JetStream 4GB and
# leave another ~2GiB under the pod limit for the NATS process and Go runtime.
jetstream {
  store_dir: /data/jetstream
  domain: hub
  max_mem: 4GB
  max_file: 2GB
}

# Limits per account (default account)
max_subscriptions: 0
max_control_line: 4KB

# Per-service users and subject ACLs.
include "auth.conf"
