# Hub NATS server. Mounted at /etc/nats/nats.conf by deploy/k8s/nats.yaml;
# auth.conf (from nats-auth.conf) sits next to it in the same configmap, and the
# bcrypt hashes it references arrive through the nats-auth-env secret.

server_name: $POD_NAME

# Listener
port: 4222
http_port: 8222

# Connection limits — generous for many workers
max_connections: 1024
max_payload: 8MB
# Per-connection outbound buffer. Raised 16MB -> 64MB for the 150k firehose: the
# hub fans every ingress event out to the consumer push connections, and a small
# pending buffer forces slow-consumer disconnects under burst. 64MB gives the
# fan-out headroom now that the mesh proxy is no longer in the path.
max_pending: 64MB

# Write deadline for slow consumers — tightened from 10s for faster bad-client
# eviction on the RPC bus; legitimate subscribers drain well under 2s.
write_deadline: "2s"

# Detect dead clients faster
ping_interval: "20s"
ping_max: 3

# Client-facing TLS. Since NATS is no longer in the Linkerd mesh (see nats.yaml),
# this is the wire encryption for client connections, on top of the tailnet.
# verify:false = server-auth only: the server presents its cert and clients verify
# it against the fleet CA (NATS_CA_PEM), but clients authenticate with their bcrypt
# user/password (auth.conf), not client certs — so there are no per-service certs.
# The cert secret (nats-hub-tls) is issued by cert-manager and mounted at
# /etc/nats/certs; the config-reloader watches it so renewals hot-reload on SIGHUP.
tls {
  cert_file: "/etc/nats/certs/tls.crt"
  key_file:  "/etc/nats/certs/tls.key"
  ca_file:   "/etc/nats/certs/ca.crt"
  timeout: 5
}

# Leaf node listener. Each leaf carries the whole fleet, and a leafnode link
# binds exactly one account, so there is one authorized leaf user per account:
# the leaf opens one remote per account (see nats-leaf-server.conf) and the
# matching user here pins that link to the right account. BUS carries the
# JetStream/event plane; the *_RPC accounts carry the per-service RPC + cache
# plane. Both planes ride the leaf as the priority path for fleet clients.
leafnodes {
  port: 7422
  no_advertise: true
  # TLS for the leaf->hub links. verify:false (server-auth): the leaf verifies the
  # hub cert against the CA and authenticates with its per-account leaf password
  # (below), the same model as the client listener — no client certs to manage.
  tls {
    cert_file: "/etc/nats/certs/tls.crt"
    key_file:  "/etc/nats/certs/tls.key"
    ca_file:   "/etc/nats/certs/ca.crt"
    timeout: 5
  }
  authorization {
    users: [
      { user: "leaf_bus",            password: $NATS_BCRYPT_LEAF_BUS,            account: "BUS" }
      { user: "leaf_users",          password: $NATS_BCRYPT_LEAF_USERS,          account: "USERS_RPC" }
      { user: "leaf_commands",       password: $NATS_BCRYPT_LEAF_COMMANDS,       account: "COMMANDS_RPC" }
      { user: "leaf_loyalty",        password: $NATS_BCRYPT_LEAF_LOYALTY,        account: "LOYALTY_RPC" }
      { user: "leaf_modules",        password: $NATS_BCRYPT_LEAF_MODULES,        account: "MODULES_RPC" }
      { user: "leaf_projector",      password: $NATS_BCRYPT_LEAF_PROJECTOR,      account: "PROJECTOR_RPC" }
      { user: "leaf_outgress",       password: $NATS_BCRYPT_LEAF_OUTGRESS,       account: "OUTGRESS_RPC" }
      { user: "leaf_worker",         password: $NATS_BCRYPT_LEAF_WORKER,         account: "WORKER_RPC" }
      { user: "leaf_dashboard",      password: $NATS_BCRYPT_LEAF_DASHBOARD,      account: "DASHBOARD_RPC" }
      { user: "leaf_admin",          password: $NATS_BCRYPT_LEAF_ADMIN,          account: "ADMIN_RPC" }
      { user: "leaf_notifications",  password: $NATS_BCRYPT_LEAF_NOTIFICATIONS,  account: "NOTIFICATIONS_RPC" }
      { user: "leaf_twitch_ingress", password: $NATS_BCRYPT_LEAF_TWITCH_INGRESS, account: "TWITCH_INGRESS_RPC" }
      { user: "leaf_transactions",   password: $NATS_BCRYPT_LEAF_TRANSACTIONS,   account: "TRANSACTIONS_RPC" }
      { user: "leaf_gateway",        password: $NATS_BCRYPT_LEAF_GATEWAY,        account: "GATEWAY_RPC" }
    ]
  }
}

# Cluster configuration for HA
cluster {
  name: "bagelbot"
  port: 6222
  # Mutual TLS between the hub RAFT peers: low cardinality (3 members), all present
  # the CA-signed cert, so verify:true is cheap defense-in-depth for the JetStream
  # consensus traffic once the mesh is gone.
  tls {
    cert_file: "/etc/nats/certs/tls.crt"
    key_file:  "/etc/nats/certs/tls.key"
    ca_file:   "/etc/nats/certs/ca.crt"
    verify: true
    timeout: 5
  }
  routes: [
    "nats-route://nats-0.nats-headless.production.svc.cluster.local:6222"
    "nats-route://nats-1.nats-headless.production.svc.cluster.local:6222"
    "nats-route://nats-2.nats-headless.production.svc.cluster.local:6222"
  ]
}

# JetStream configuration. `domain: hub` makes this the authoritative
# JetStream for the cluster; the node2 leaf runs in its own domain.
# max_mem must exceed the combined MaxBytes of every memory-backed stream
# (TWITCH_INGRESS 1 GiB + TWITCH_OUTGRESS 256 MiB) plus dedup-id and broker
# state. Hub members now run on node2/node3/worker1, so give JetStream 4GB and
# leave another ~2GiB under the pod limit for the NATS process and Go runtime.
jetstream {
  store_dir: /data/jetstream
  domain: hub
  max_mem: 4GB
  max_file: 2GB
}

# Limits per account (default account)
max_subscriptions: 0
max_control_line: 4KB

# Per-service users and subject ACLs.
include "auth.conf"
