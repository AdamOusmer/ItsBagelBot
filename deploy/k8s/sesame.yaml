# sesame replaces the worker: same lanes, same pkg/bus consumer group ("worker"),
# same Doppler secret values. It reuses the worker's Doppler service token
# (worker-doppler-token, created out-of-band and never pruned), so sesame-env
# holds the identical secrets the worker read (VALKEY_*, NATS_CACHE_INVALIDATION_PREFIX,
# TWITCH_SPECIAL_USER_IDS). Only the k8s secret name differs.
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: sesame-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: worker-doppler-token
  managedSecret:
    name: sesame-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sesame
  namespace: production
  annotations:
    secrets.doppler.com/reload: "true"
spec:
  # replicas intentionally omitted: the sesame ScaledObject below owns this
  # field via its generated HPA (floor 4, matching the old static count).
  # kustomize-controller stops setting it, so SSA hands ownership to the HPA
  # instead of fighting it every reconcile.
  revisionHistoryLimit: 3
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: sesame
  template:
    metadata:
      labels:
        app: sesame
      annotations:
        linkerd.io/inject: disabled
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 1000m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 128Mi
        # NATS is out of the mesh and encrypts the wire with native TLS.
        config.linkerd.io/skip-outbound-ports: "4222"
    spec:
      tolerations:
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      # node1 is the 2-core ARM node reserved for stateful/frontend + infra; keep
      # the hot-path worker off it. KEDA (see the ScaledObject below) scales
      # onto node2/node3/worker1.
      # Baseline shape at the KEDA floor of 5: node3=2, worker1=2, node2=1.
      # node2 already carries the control plane + valkey master, so the doubles
      # belong on the big-CPU pair; the graded preferences below pick which
      # nodes take them (node3 first, worker1 second) while the soft skew keeps
      # any node from being emptied. Low weights on purpose: a skew >= 1 must
      # outscore the preference (see twitch-ingress.yaml for the pile-up this
      # prevents). Burst pods above the floor inherit the same bias.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [node1]
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 25
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [node3]
            - weight: 20
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [worker1]
      topologySpreadConstraints:
        # matchLabelKeys scopes the skew to the CURRENT ReplicaSet: during a
        # maxSurge=0 roll the outgoing pods no longer count, so every rollout
        # re-spreads one-per-node instead of piling onto whichever node freed
        # capacity first (bit the ingress on 2026-07-10: 3/0/1). Soft constraint
        # stays soft, so a node outage never wedges scheduling; the KEDA floor
        # (>= one per hot-path node) plus the ReplicaSet downscaler's
        # remove-co-located-duplicates-first ranking keep steady state at
        # >= 1 per node.
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          matchLabelKeys: [pod-template-hash]
          labelSelector:
            matchLabels:
              app: sesame
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: sesame
          image: ghcr.io/adamousmer/itsbagelbot/sesame:main-1784051907-ddec495a0b75@sha256:d7b336296f35f7175d9bb13aab662207d8ea65c55eb5e55bda5b45a7df1bf824 # {"$imagepolicy": "flux-system:sesame"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
            # Durable BUS/JetStream traffic goes directly to the hub. The leaf
            # cluster is the independent Core NATS RPC tier only; sending stream
            # PubAcks through it adds a cross-leaf round trip and stalls large
            # windows.
            #
            # The two JetStream planes dial the ordinal that leads their streams
            # (R1 placement pins from pkg/bus/provision.go), skipping the
            # intra-hub route hop the PreferSameNode `nats` Service would add on
            # a non-leader member: consumers (NATS_HUB_URL) sit with
            # TWITCH_INGRESS on nats-0, the publisher pool
            # (NATS_HUB_PUBLISH_URL) with TWITCH_OUTGRESS + BAGEL_DATA on
            # nats-1. Both per-pod headless names are hub cert SANs.
            - name: NATS_URL
              value: tls://nats:4222
            - name: NATS_HUB_URL
              value: tls://nats-0.nats-headless.production.svc.cluster.local:4222
            - name: NATS_HUB_PUBLISH_URL
              value: tls://nats-1.nats-headless.production.svc.cluster.local:4222
            # Fleet CA (trust-manager fleet-ca ConfigMap) to verify the NATS server
            # TLS cert now that NATS is out of the Linkerd mesh; read as RootCAs by
            # pkg/bus (Go services) and the console nats lib (TS).
            - name: NATS_CA_PEM
              valueFrom:
                configMapKeyRef:
                  name: fleet-ca
                  key: ca.pem
            - name: VALKEY_TLS_CA_PEM
              valueFrom:
                configMapKeyRef:
                  name: fleet-ca
                  key: ca.pem
            - name: VALKEY_TLS_SERVER_NAME
              value: valkey.valkey.svc.cluster.local
            - name: NATS_RPC_URL
              value: tls://nats-leaf:4222
            - name: NATS_LEAF_URL
              value: tls://nats-leaf:4222
            - name: SSL_CERT_FILE
              value: /etc/nats-ca/ca.pem
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: VALKEY_LOCAL_ADDR
              value: valkey-local.valkey.svc.cluster.local:6380
            - name: GOMEMLIMIT
              value: 512MiB
            # Reuse the worker's shared lane consumer so this is a true drop-in:
            # no DeliverAll replay, and rollout overlap load-balances instead of
            # double-processing.
            - name: SESAME_CONSUMER_NAME
              value: worker
            # Production acceptance found one Watermill subscription serialized
            # the pod at 20/s through the leaf. The fleet-owned concurrent hub
            # subscriber sustains four queue subscriptions with 100 handler slots
            # each. This fills one confirmed PubAck cohort per publisher connection;
            # 200 slots added only ~2% throughput while more than doubling p95.
            - name: SESAME_MIN_ROUTINES
              value: "100"
            - name: SESAME_MAX_ROUTINES
              value: "100"
            - name: SESAME_MIN_CONSUMERS
              value: "4"
            - name: SESAME_MAX_CONSUMERS
              value: "4"
            # Four ordered publishers hash by broadcaster: one channel remains
            # ordered while unrelated channels can overlap confirmation cohorts.
            - name: NATS_PUBLISH_CONNECTIONS
              value: "4"
            - name: SESAME_SCALE_UP_AFTER
              value: 2s
            - name: SESAME_SCALE_DOWN_AFTER
              value: 45s
            - name: SESAME_PREMIUM_RESERVE_PERCENT
              value: "25"
            # Live status: dedicated Valkey key with a TTL backstop; on expiry sesame
            # re-checks the stream against Twitch via the outgress system lane,
            # falling back to the projector live RPC on a cold key.
            - name: SESAME_LIVE_TTL
              value: 12h
            - name: NATS_OUTGRESS_SYSTEM_SUBJECT
              value: twitch.outgress.system
            - name: NATS_BROADCASTER_LIVE_SUBJECT
              value: bagel.rpc.broadcaster.live.get
          envFrom:
            # sesame-env (Doppler) carries VALKEY_*, NATS_CACHE_INVALIDATION_PREFIX,
            # and TWITCH_SPECIAL_USER_IDS — the same values the worker read.
            - secretRef:
                name: sesame-env
          volumeMounts:
            - name: fleet-ca
              mountPath: /etc/nats-ca
              readOnly: true
          ports:
            - containerPort: 8080
          resources:
            requests:
              # Full-path production tests used 220-339m while waiting on shared
              # NATS/Valkey, whereas the pure engine reached ~450m. A 500m
              # request makes the 75% trigger fire on actual engine CPU
              # saturation (~375m), not on I/O wait; lag remains primary.
              cpu: 500m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              httpGet:
                path: /drain
                port: 8080
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            failureThreshold: 18
            periodSeconds: 5
      volumes:
        - name: fleet-ca
          configMap:
            name: fleet-ca
      terminationGracePeriodSeconds: 45
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sesame
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: sesame
---
# Sesame's engine is sub-100us p95; confirmed NATS input/output is the measured
# capacity boundary. minReplicaCount 5 keeps the baseline shape
# node3=2, worker1=2, node2=1 (see the Deployment's graded node preferences)
# without waiting on a scale-up; node2 stays light on purpose.
# Consumer names are bus.durableName("worker", subject) - sesame
# shares the worker's pre-existing durable via fleetSubscriber (app/sesame/main.go
# bus.NewSubscriber(cfg.NATSURL, cfg.ConsumerName, log), ConsumerName=worker),
# not per-lane groups like outgress. lag = num_pending + num_ack_pending on
# that durable (see pkg/bus/bus.go laneConsumerConfig). Tune thresholds from
# the admin lane-telemetry view (reads $JS.hub.API.CONSUMER.INFO.> live).
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: sesame
  namespace: production
spec:
  scaleTargetRef:
    name: sesame
  pollingInterval: 15
  cooldownPeriod: 300
  minReplicaCount: 5
  maxReplicaCount: 10
  fallback:
    failureThreshold: 3
    replicas: 5
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - {type: Pods, value: 2, periodSeconds: 30}
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - {type: Pods, value: 1, periodSeconds: 120}
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: "75"
    - type: nats-jetstream
      metadata:
        natsServerMonitoringEndpoint: nats.production.svc.cluster.local:8222
        account: BUS
        stream: TWITCH_INGRESS
        consumer: worker_twitch_ingress_event_premium
        # The slowest node measured 6.68k commands/s under simultaneous
        # three-node load. Premium reserves 25% of that conservative capacity.
        lagThreshold: "1500"
        activationLagThreshold: "500"
    - type: nats-jetstream
      metadata:
        natsServerMonitoringEndpoint: nats.production.svc.cluster.local:8222
        account: BUS
        stream: TWITCH_INGRESS
        consumer: worker_twitch_ingress_event_standard
        # Do not add a whole pod for breadcrumbs: at the five-pod floor this
        # scales only beyond ~30k queued standard events at the five-pod floor,
        # not a few hundred events of ordinary jitter.
        lagThreshold: "6000"
        activationLagThreshold: "2000"
