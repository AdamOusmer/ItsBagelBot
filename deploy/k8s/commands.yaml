apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: commands-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: commands-doppler-token
  managedSecret:
    name: commands-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: commands
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: commands
  template:
    metadata:
      labels:
        app: commands
      annotations:
        linkerd.io/inject: enabled
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: commands
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - commands
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: commands
          image: ghcr.io/adamousmer/itsbagelbot/commands:main-1781680976-1ae67c5026d7@sha256:ed611fd7baa928651f3d2ff151ac95df7e40d17e3fc0cf856e4ecdd4d9550e19 # {"$imagepolicy": "flux-system:commands"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
          envFrom:
            - secretRef:
                name: commands-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 5m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 10
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: commands
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: commands
