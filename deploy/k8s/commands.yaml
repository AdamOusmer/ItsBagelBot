apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: commands-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: commands-doppler-token
  managedSecret:
    name: commands-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: commands
  namespace: production
  annotations:
    secrets.doppler.com/reload: "true"
spec:
  replicas: 3 # one per hot-path node: node2, node3, worker1
  revisionHistoryLimit: 3
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: commands
  template:
    metadata:
      labels:
        app: commands
    spec:
      tolerations:
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [node1]
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: commands
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          matchLabelKeys: [pod-template-hash]
          labelSelector:
            matchLabels:
              app: commands
      # Required pod anti-affinity prevents old and new ReplicaSets from ever
      # stacking two commands pods on one hot-path node.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: commands
          image: ghcr.io/adamousmer/itsbagelbot/commands:main-1784637762-7a44fd7e4084@sha256:bd4893f277a08e4e291c2fb4a215a5aa03506d6eb598574d169ac37879481ed3 # {"$imagepolicy": "flux-system:commands"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
            # Split planes: the BUS / JetStream connection dials the hub directly
            # (NATS_HUB_URL) so stream traffic never pays a leaf forwarding hop;
            # the RPC + cache plane (NATS_RPC_URL / NATS_LEAF_URL) stays on the
            # node-local leaf. NATS_URL is the local-dev fallback only.
            - name: NATS_URL
              value: nats://nats-leaf:4222
            - name: NATS_HUB_URL
              value: nats://nats:4222
            - name: NATS_HUB_PUBLISH_URL
              value: nats://nats:4222
            # Fleet CA (trust-manager fleet-ca ConfigMap) to verify the NATS
            # server's native-TLS cert; read as RootCAs by pkg/bus (Go services)
            # and the console nats lib (TS).
            - name: NATS_CA_PEM
              valueFrom:
                configMapKeyRef:
                  name: fleet-ca
                  key: ca.pem
            - name: NATS_RPC_URL
              value: nats://nats-leaf:4222
            - name: NATS_LEAF_URL
              value: nats://nats-leaf:4222
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DB_MAX_OPEN_CONNS
              value: "4"
            - name: DB_QUERY_CONCURRENCY
              value: "4"
            - name: DB_AUTO_MIGRATE
              value: "true"
            - name: GOMEMLIMIT
              value: 160MiB
          envFrom:
            - secretRef:
                name: commands-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              httpGet:
                path: /drain
                port: 8080
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            failureThreshold: 18 # 18 × 5s = 90s max startup window
            periodSeconds: 5
      terminationGracePeriodSeconds: 45
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: commands
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: commands
