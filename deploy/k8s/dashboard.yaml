# Dashboard (Go). Public at https://dashboard.itsbagelbot.com through the
# existing cloudflared tunnel -> traefik (wildcard *.itsbagelbot.com is
# already routed and the default TLSStore carries the origin cert).
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: dashboard-env
  namespace: bagelbot
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: dashboard-doppler-token
  managedSecret:
    name: dashboard-env
    namespace: bagelbot
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: bagelbot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
      annotations:
        linkerd.io/inject: disabled
    spec:
      # node2 (amd64) is reserved for the sentinel; app workloads pin to arm64.
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532 # distroless `nonroot`; numeric so kubelet can verify
        runAsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: dashboard
          image: docker.io/itsbagelbot/dashboard:0.1.3
          imagePullPolicy: Never # imported directly into node containerd
          envFrom:
            - secretRef:
                name: dashboard-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: bagelbot
spec:
  selector:
    app: dashboard
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dashboard
  namespace: bagelbot
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`dashboard.itsbagelbot.com`)
      kind: Rule
      services:
        - name: dashboard
          port: 8080
  tls: {} # default TLSStore already serves the itsbagelbot.com origin cert
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dashboard
  namespace: bagelbot
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: dashboard
