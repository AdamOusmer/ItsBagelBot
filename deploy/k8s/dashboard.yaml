# Dashboard (Go). Public at https://dashboard.itsbagelbot.com through the
# existing cloudflared tunnel -> traefik (wildcard *.itsbagelbot.com is
# already routed and the default TLSStore carries the origin cert).
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: dashboard-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: dashboard-doppler-token
  managedSecret:
    name: dashboard-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: production
spec:
  replicas: 2
  # Hard host anti-affinity on a 2-node cluster: one replica per node. The
  # default surge strategy would deadlock (no room for a surge pod), so we
  # roll one at a time by taking a replica down first.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
      annotations:
        linkerd.io/inject: enabled
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: dashboard
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - dashboard
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532 # distroless `nonroot`; numeric so kubelet can verify
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: dashboard
          image: ghcr.io/adamousmer/itsbagelbot/dashboard:main-1781472286-58326f31d8d0@sha256:c75594170ad882f201ee18eafc03a57a3a93cfcf516080b17a271bf7c32980b8 # {"$imagepolicy": "flux-system:dashboard"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
          envFrom:
            - secretRef:
                name: dashboard-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: production
spec:
  # Prefer the same-zone (=same-node) endpoint for any client that dials this
  # Service's ClusterIP (kube-proxy / Linkerd read the EndpointSlice hints this
  # generates, spilling cross-zone only when no local endpoint is ready).
  # NOTE: the public path does not benefit here - the dashboard IngressRoute
  # load-balances across pod endpoints directly with a sticky cookie, so it
  # bypasses this ClusterIP. Kept for correctness of in-cluster ClusterIP use.
  trafficDistribution: PreferClose
  selector:
    app: dashboard
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dashboard
  namespace: production
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`dashboard.itsbagelbot.com`)
      kind: Rule
      services:
        - name: dashboard
          port: 8080
          # Session affinity: Traefik load-balances across the dashboard pod
          # endpoints directly, so it can pin each client to one pod via a
          # cookie (keeps dashboard sessions / websockets on a single backend).
          sticky:
            cookie:
              name: dashboard_affinity
              secure: true
              httpOnly: true
              sameSite: lax
  tls: {} # default TLSStore already serves the itsbagelbot.com origin cert
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dashboard
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: dashboard
