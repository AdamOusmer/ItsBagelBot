apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: worker-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: worker-doppler-token
  managedSecret:
    name: worker-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: production
  annotations:
    secrets.doppler.com/reload: "true"
spec:
  replicas: 4 # one per node; 4 schedulable nodes incl worker1 (tolerates worker-pool)
  revisionHistoryLimit: 3
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 1000m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 128Mi
        config.linkerd.io/skip-outbound-ports: 6379,26379
    spec:
      tolerations:
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: worker
      # Baseline worker capacity follows node count: one worker pod on each
      # schedulable node, with bounded in-process scaling inside each pod.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: worker
          image: ghcr.io/adamousmer/itsbagelbot/worker:main-1782989625-a17180d59ed0@sha256:077edfafc3534959de7081c6edaa05ae9f37b76ba20a4845230d6c14009777d9 # {"$imagepolicy": "flux-system:worker"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
            # Apps connect only to the node-local leaf cluster (4-node HA); the
            # hub is reached over the leafnode link for JetStream. No hub in the
            # server list, so a leaf roll can never pin a client to the hub.
            - name: NATS_URL
              value: nats://nats-leaf:4222
            - name: NATS_RPC_URL
              value: nats://nats-leaf:4222
            - name: NATS_LEAF_URL
              value: nats://nats-leaf:4222
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: GOMEMLIMIT
              value: 512MiB
            - name: WORKER_MIN_ROUTINES
              value: "4"
            - name: WORKER_MAX_ROUTINES
              value: "25"
            - name: WORKER_MAX_CONSUMERS
              value: "4"
            - name: WORKER_SCALE_UP_AFTER
              value: 2s
            - name: WORKER_SCALE_DOWN_AFTER
              value: 45s
            - name: WORKER_PREMIUM_RESERVE_PERCENT
              value: "25"
            # Live status: dedicated Valkey key with a TTL backstop; on expiry the
            # worker re-checks the stream against Twitch via the outgress system
            # lane, falling back to the projector live RPC on a cold key.
            - name: WORKER_LIVE_TTL
              value: 12h
            - name: NATS_OUTGRESS_SYSTEM_SUBJECT
              value: twitch.outgress.system
            - name: NATS_BROADCASTER_LIVE_SUBJECT
              value: bagel.rpc.broadcaster.live.get
          envFrom:
            # worker-env (Doppler) carries VALKEY_*, NATS_CACHE_INVALIDATION_PREFIX,
            # and TWITCH_SPECIAL_USER_IDS (the bagel crew, seeded from twitch-ingress).
            - secretRef:
                name: worker-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              httpGet:
                path: /drain
                port: 8080
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            failureThreshold: 18
            periodSeconds: 5
      terminationGracePeriodSeconds: 45
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: worker
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: worker
