apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: worker-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: worker-doppler-token
  managedSecret:
    name: worker-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: worker
  namespace: production
spec:
  revisionHistoryLimit: 3
  minReadySeconds: 10
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 1000m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 128Mi
    spec:
      # Baseline worker capacity follows node count: one worker pod on each
      # schedulable node, with bounded in-process scaling inside each pod.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: worker
          image: ghcr.io/adamousmer/itsbagelbot/worker:main-1781747331-2606f94ad617 # {"$imagepolicy": "flux-system:worker"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
            - name: NATS_URL
              value: nats://nats:4222
            - name: NATS_RPC_URL
              value: nats://nats-leaf:4222
            - name: GOMEMLIMIT
              value: 512MiB
            - name: WORKER_MIN_ROUTINES
              value: "4"
            - name: WORKER_MAX_ROUTINES
              value: "25"
            - name: WORKER_MAX_CONSUMERS
              value: "4"
            - name: WORKER_SCALE_UP_AFTER
              value: 2s
            - name: WORKER_SCALE_DOWN_AFTER
              value: 45s
            - name: WORKER_PREMIUM_RESERVE_PERCENT
              value: "25"
          envFrom:
            - secretRef:
                name: worker-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            failureThreshold: 18
            periodSeconds: 5
      terminationGracePeriodSeconds: 45
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: worker
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: worker
