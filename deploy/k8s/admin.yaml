# Admin (Go). Operator-only window into the Twitch ingress: live state of
# every Conduit shard plus the shard up/down event stream, read entirely over
# NATS. It owns no data, but uses Doppler for shared operational secrets such
# as New Relic telemetry configuration.
#
# Reachable ONLY over Tailscale, by construction, at
#
#   https://admin.tail451e6d.ts.net
#
# Exposure is via the Tailscale Kubernetes operator, not traefik: the
# Ingress below (class `tailscale`) attaches to the `ts-ingress`
# ProxyGroup (deploy/tailscale/proxies.yaml; 2 replicas spread across the
# nodes), which advertises the Tailscale Service `svc:admin`. MagicDNS
# resolves the name for tailnet members only, the proxy terminates TLS
# with an operator-provisioned Let's Encrypt cert, and traffic forwards
# to the admin Service, which spreads across both admin pods.
#
# Access control is the tailnet policy (deploy/tailscale/policy.hujson):
# only tag:macbook may reach svc:admin, and the admin path shares no
# data plane with public ingress (no traefik IngressRoute, no cloudflared
# route, no svclb listener - do not add any). There is no public DNS
# record and no node port involved; off-tailnet the name does not even
# resolve. The app itself still runs no auth layer.
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: admin-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: admin-doppler-token
  managedSecret:
    name: admin-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: production
spec:
  replicas: 2
  # Hard host anti-affinity + 2 nodes means the default surge strategy deadlocks
  # (it tries to place a 3rd replica with nowhere to go). Recreate-one-at-a-time.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
      annotations:
        # Keep the operator path independent of the mesh: this tool exists to
        # debug the fleet, so it must not share failure modes with it.
        linkerd.io/inject: disabled
    spec:
      # HA is node-level: pod anti-affinity spreads the replicas across
      # node1 (ARM) and node2 (Intel).
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - admin
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532 # distroless `nonroot`; numeric so kubelet can verify
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: admin
          image: ghcr.io/adamousmer/itsbagelbot/admin:main-1781353795-3dcd12de4548@sha256:9e895383ec8426349ed2f772789d0b7872b5e67fe785dc180eb15664f26eb8bb # {"$imagepolicy": "flux-system:admin"}
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: admin-env
          env:
            - name: NATS_HOST
              value: nats
            - name: NATS_PORT
              value: "4222"
            - name: NATS_ADMIN_SUBJECT
              value: twitch.ingress.admin.shards.get
            - name: NATS_STATUS_SUBJECT_PREFIX
              value: twitch.ingress.status
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: production
spec:
  selector:
    app: admin
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin
  namespace: production
  annotations:
    # Serve through the HA ingress ProxyGroup as Tailscale Service
    # svc:admin instead of a single-replica proxy.
    tailscale.com/proxy-group: ts-ingress
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: admin
      port:
        number: 8080
  tls:
    - hosts:
        # Just the leftmost label: yields admin.tail451e6d.ts.net.
        - admin
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: admin
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: admin
