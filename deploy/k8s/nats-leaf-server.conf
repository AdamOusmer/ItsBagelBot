# Leaf NATS servers (nats-leaf DaemonSet). Mounted at /etc/nats/nats.conf by
# deploy/k8s/nats-leaf.yaml; auth.conf is the same nats-auth.conf as the hub so
# leaf-local clients authenticate identically. NATS_LEAF_REMOTE_URL carries the
# leaf user's credentials (nats-leaf://leaf:<password>@nats.production.svc.cluster.local:7422)
# and comes from the nats-auth-env secret.

# The node prefix lets clients distinguish a same-node connection from a
# fallback. POD_NAME keeps identities unique during maxSurge leaf rollouts.
server_name: $NATS_SERVER_NAME

port: 4222
http_port: 8222

max_connections: 1024
max_payload: 8MB
max_pending: 16MB
# Tightened from 10s — fast RPC clients drain well under 2s.
write_deadline: "2s"

# Detect dead clients faster
ping_interval: "20s"
ping_max: 3

# Lame-duck graceful shutdown. The pod preStop signals LDM (SIGUSR2) before the
# socket closes: the leaf stops accepting new connections and migrates its
# existing clients to a healthy leaf over the drain window, so a DaemonSet roll
# or node drain no longer surfaces as a hard RPC disconnect on that node.
# (duration min is 30s; terminationGracePeriodSeconds on the pod covers it.)
lame_duck_grace_period: "5s"
lame_duck_duration: "30s"

# One remote per fleet account: a leafnode link binds exactly one account, so
# carrying the whole fleet over the leaf means one remote (and one leaf
# credential) per account. Each NATS_LEAF_REMOTE_URL_<ACCOUNT> embeds that
# account's leaf user/password, e.g.
# nats-leaf://leaf_users:<pw>@nats.production.svc.cluster.local:7422
leafnodes {
  remotes = [
    { urls: [$NATS_LEAF_REMOTE_URL_BUS],            account: "BUS" }
    { urls: [$NATS_LEAF_REMOTE_URL_USERS],          account: "USERS_RPC" }
    { urls: [$NATS_LEAF_REMOTE_URL_COMMANDS],       account: "COMMANDS_RPC" }
    { urls: [$NATS_LEAF_REMOTE_URL_MODULES],        account: "MODULES_RPC" }
    { urls: [$NATS_LEAF_REMOTE_URL_PROJECTOR],      account: "PROJECTOR_RPC" }
    { urls: [$NATS_LEAF_REMOTE_URL_OUTGRESS],       account: "OUTGRESS_RPC" }
    { urls: [$NATS_LEAF_REMOTE_URL_WORKER],         account: "WORKER_RPC" }
    { urls: [$NATS_LEAF_REMOTE_URL_DASHBOARD],      account: "DASHBOARD_RPC" }
    { urls: [$NATS_LEAF_REMOTE_URL_ADMIN],          account: "ADMIN_RPC" }
    { urls: [$NATS_LEAF_REMOTE_URL_NOTIFICATIONS],  account: "NOTIFICATIONS_RPC" }
    { urls: [$NATS_LEAF_REMOTE_URL_TWITCH_INGRESS], account: "TWITCH_INGRESS_RPC" }
  ]
}

# Cluster the leaf servers among themselves so cross-node RPC routes directly
# leaf-to-leaf instead of hopping through the hub, and so the leaf tier keeps
# serving request/reply if the hub link drops. Routes resolve via the
# nats-leaf-peers headless service (publishNotReadyAddresses, so a forming leaf
# is still discoverable). The cluster name differs from the hub's ("bagelbot")
# so the two never merge.
#
# NATS prefers a locally-connected queue member before routing across the
# cluster, so an RPC answered by a node-local responder pays zero hops; only a
# call with no local responder takes one direct leaf-to-leaf hop. 
max_subscriptions: 0
max_control_line: 4KB

include "auth.conf"
