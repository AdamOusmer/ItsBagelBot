# Leaf NATS servers (nats-leaf DaemonSet). Mounted at /etc/nats/nats.conf by
# deploy/k8s/nats-leaf.yaml; auth.conf is the same nats-auth.conf as the hub so
# leaf-local clients authenticate identically. NATS_LEAF_REMOTE_URL carries the
# leaf user's credentials (nats-leaf://leaf:<password>@nats.production.svc.cluster.local:7422)
# and comes from the nats-auth-env secret.

server_name: $POD_NAME

port: 4222
http_port: 8222

max_connections: 1024
max_payload: 8MB
max_pending: 16MB
# Tightened from 10s — fast RPC clients drain well under 2s.
write_deadline: "2s"

# Detect dead clients faster
ping_interval: "20s"
ping_max: 3

leafnodes {
  remotes = [
    {
      urls: [$NATS_LEAF_REMOTE_URL]
      account: "BAGELBOT"
    }
  ]
}

jetstream {
  store_dir: /data/jetstream
  domain: leaf
  max_mem: 128MB
  max_file: 1GB
}

max_subscriptions: 0
max_control_line: 4KB

include "auth.conf"

