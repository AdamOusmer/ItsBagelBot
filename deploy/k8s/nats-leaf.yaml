# Leaf NATS servers, one per schedulable Kubernetes node. The nats-leaf-config configmap is
# generated from nats-leaf-server.conf + nats-auth.conf by the Flux kustomize
# configMapGenerator (deploy/k8s/kustomization.yaml); credentials (bcrypt
# hashes and the leaf remote URL) come from the nats-auth-env secret.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app: nats-leaf
  name: nats-leaf
  namespace: production
  annotations:
    config.linkerd.io/opaque-ports: "4222,6222"
spec:
  revisionHistoryLimit: 5
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nats-leaf
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
        # NATS speaks first on the wire, so protocol detection would stall;
        # opaque keeps Linkerd mTLS without the detection timeout. 6222 is the
        # leaf-to-leaf cluster route port.
        config.linkerd.io/opaque-ports: "4222,6222"
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 1000m
        config.linkerd.io/proxy-memory-limit: 128Mi
        config.linkerd.io/proxy-memory-request: 16Mi
        prometheus.io/path: /metrics
        prometheus.io/port: "7777"
        prometheus.io/scrape: "true"
      labels:
        app: nats-leaf
    spec:
      tolerations:
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
      # Shared PID namespace lets the config-reloader sidecar SIGHUP the
      # nats-server process (same uid 1000) when the mounted config changes.
      shareProcessNamespace: true
      # Covers the lame-duck drain (grace 5s + duration 30s) the preStop runs
      # before the leaf exits; keep above that sum so the kubelet does not SIGKILL
      # a leaf mid-migration.
      terminationGracePeriodSeconds: 45
      # nats runs as uid/gid 1000; fsGroup makes the leaf-local JetStream
      # emptyDir writable. Durable streams live on the hub, not these leaves.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: nats
          image: nats:2.11-alpine
          imagePullPolicy: IfNotPresent
          # --pid writes a pidfile the reloader reads to signal this process.
          args: ["--config", "/etc/nats/nats.conf", "--pid", "/var/run/nats/nats.pid"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - secretRef:
                name: nats-auth-env
          ports:
            - {containerPort: 4222, name: client}
            - {containerPort: 8222, name: monitor}
            - {containerPort: 6222, name: cluster}
          volumeMounts:
            - {name: config, mountPath: /etc/nats, readOnly: true}
            - {name: jetstream, mountPath: /data/jetstream}
            - {name: pid, mountPath: /var/run/nats}
          resources:
            # Leaves are encrypted local relays, not durable stores; keep burst
            # headroom but avoid reserving hub-sized memory on every node.
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 1500m, memory: 512Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
            readOnlyRootFilesystem: true
          startupProbe:
            httpGet: {path: /healthz, port: monitor}
            periodSeconds: 5
            failureThreshold: 10
            timeoutSeconds: 1
          livenessProbe:
            httpGet: {path: /healthz, port: monitor}
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            # Plain /healthz: the leaves run core NATS only (JetStream disabled),
            # so a JS-scoped probe would never report ready.
            httpGet: {path: /healthz, port: monitor}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          lifecycle:
            preStop:
              exec:
                # Enter lame-duck (SIGUSR2 via the pidfile) so this leaf migrates
                # its clients to a healthy leaf before the socket closes, then
                # hold the container until the drain finishes. The sleep must
                # outlast lame_duck_grace_period + lame_duck_duration (35s); a
                # bare SIGTERM would otherwise abort the graceful drain.
                command: ["/bin/sh", "-c", "nats-server --signal ldm=/var/run/nats/nats.pid; sleep 36"]
        # Watches the mounted config (nats.conf + auth.conf, sourced from the
        # nats-leaf-config configmap) and SIGHUPs nats-server on change, so an
        # apply-nats.sh configmap update hot-reloads without a manual signal or
        # a pod restart. TODO(deploy): pin to a digest like the other images.
        - name: reloader
          image: natsio/nats-server-config-reloader:0.23.0
          imagePullPolicy: IfNotPresent
          args:
            - "-pid"
            - "/var/run/nats/nats.pid"
            - "-config"
            - "/etc/nats/nats.conf"
            - "-config"
            - "/etc/nats/auth.conf"
          volumeMounts:
            - {name: config, mountPath: /etc/nats, readOnly: true}
            - {name: pid, mountPath: /var/run/nats}
          resources:
            requests: {cpu: 5m, memory: 16Mi}
            limits: {cpu: 50m, memory: 64Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
            readOnlyRootFilesystem: true
        - name: prometheus-nats-exporter
          image: natsio/prometheus-nats-exporter:0.15.0
          imagePullPolicy: IfNotPresent
          args: ["-varz", "-connz", "-subz", "-routez", "-jsz=all", "http://localhost:8222"]
          ports:
            - {containerPort: 7777, name: metrics}
          resources:
            requests: {cpu: 5m, memory: 32Mi}
            limits: {cpu: 100m, memory: 128Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
      volumes:
        - name: config
          configMap:
            name: nats-leaf-config
        - name: pid
          emptyDir: {}
        - name: jetstream
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: nats-leaf
  name: nats-leaf
  namespace: production
  annotations:
    config.linkerd.io/opaque-ports: "4222"
spec:
  # Prefer the node-local leaf for the normal fast path, but allow kube-proxy to
  # spill to another node while the local leaf or its Linkerd sidecar is rolling.
  # internalTrafficPolicy: Local made every app on that node lose NATS RPC during
  # leaf updates, which surfaced as dashboard/admin 500s.
  trafficDistribution: PreferClose
  selector:
    app: nats-leaf
  ports:
    - {name: client, port: 4222, targetPort: client}
    - {name: monitor, port: 8222, targetPort: monitor}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: nats-leaf
  name: nats-leaf-peers
  namespace: production
  annotations:
    config.linkerd.io/opaque-ports: "4222,6222"
spec:
  # Headless route-discovery for the leaf cluster: the route URL resolves to every
  # leaf pod IP, so each node dials every peer and forms a clean full mesh (a
  # ClusterIP would load-balance the route dial and leave the mesh incomplete).
  # publishNotReadyAddresses lets a still-forming leaf seed the cluster on rollout.
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: nats-leaf
  ports:
    - {name: client, port: 4222, targetPort: client}
    - {name: monitor, port: 8222, targetPort: monitor}
    - {name: cluster, port: 6222, targetPort: cluster}
