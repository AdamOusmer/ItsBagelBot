# Leaf NATS servers (node2 side). The nats-leaf-config configmap is generated
# from nats-leaf-server.conf + nats-auth.conf by the Flux kustomize
# configMapGenerator (deploy/k8s/kustomization.yaml); credentials (bcrypt
# hashes and the leaf remote URL) come from the nats-auth-env secret.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: nats-leaf
  name: nats-leaf
  namespace: production
  annotations:
    config.linkerd.io/opaque-ports: "4222"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  podManagementPolicy: Parallel
  serviceName: nats-leaf-peers
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  selector:
    matchLabels:
      app: nats-leaf
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
        # NATS speaks first on the wire, so protocol detection would stall;
        # opaque keeps Linkerd mTLS without the detection timeout.
        config.linkerd.io/opaque-ports: "4222"
        config.linkerd.io/proxy-memory-limit: 128Mi
        config.linkerd.io/proxy-memory-request: 16Mi
        prometheus.io/path: /metrics
        prometheus.io/port: "7777"
        prometheus.io/scrape: "true"
      labels:
        app: nats-leaf
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: nats-leaf
              topologyKey: kubernetes.io/hostname
      # Shared PID namespace lets the config-reloader sidecar SIGHUP the
      # nats-server process (same uid 1000) when the mounted config changes.
      shareProcessNamespace: true
      # nats runs as uid/gid 1000; fsGroup makes the JetStream PVC writable.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: nats
          image: nats:2.11-alpine
          imagePullPolicy: IfNotPresent
          # --pid writes a pidfile the reloader reads to signal this process.
          args: ["--config", "/etc/nats/nats.conf", "--pid", "/var/run/nats/nats.pid"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - secretRef:
                name: nats-auth-env
          ports:
            - { containerPort: 4222, name: client }
            - { containerPort: 8222, name: monitor }
          volumeMounts:
            - { name: config, mountPath: /etc/nats, readOnly: true }
            - { name: jetstream, mountPath: /data/jetstream }
            - { name: pid, mountPath: /var/run/nats }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true
          startupProbe:
            httpGet: { path: /healthz, port: monitor }
            periodSeconds: 5
            failureThreshold: 10
            timeoutSeconds: 1
          livenessProbe:
            httpGet: { path: /healthz, port: monitor }
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet: { path: "/healthz?js-enabled-only=true", port: monitor }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
        # Watches the mounted config (nats.conf + auth.conf, sourced from the
        # nats-leaf-config configmap) and SIGHUPs nats-server on change, so an
        # apply-nats.sh configmap update hot-reloads without a manual signal or
        # a pod restart. TODO(deploy): pin to a digest like the other images.
        - name: reloader
          image: natsio/nats-server-config-reloader:0.23.0
          imagePullPolicy: IfNotPresent
          args:
            - "-pid"
            - "/var/run/nats/nats.pid"
            - "-config"
            - "/etc/nats/nats.conf"
            - "-config"
            - "/etc/nats/auth.conf"
          volumeMounts:
            - { name: config, mountPath: /etc/nats, readOnly: true }
            - { name: pid, mountPath: /var/run/nats }
          resources:
            requests: { cpu: 5m, memory: 16Mi }
            limits: { cpu: 50m, memory: 64Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true
        - name: prometheus-nats-exporter
          image: natsio/prometheus-nats-exporter:0.15.0
          imagePullPolicy: IfNotPresent
          args: ["-varz", "-connz", "-subz", "-routez", "-jsz=all", "http://localhost:8222"]
          ports:
            - { containerPort: 7777, name: metrics }
          resources:
            requests: { cpu: 5m, memory: 32Mi }
            limits: { cpu: 100m, memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: config
          configMap:
            name: nats-leaf-config
        - name: pid
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: jetstream
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: nats-leaf
  name: nats-leaf
  namespace: production
  annotations:
    config.linkerd.io/opaque-ports: "4222"
spec:
  internalTrafficPolicy: Local
  selector:
    app: nats-leaf
  ports:
    - { name: client, port: 4222, targetPort: client }
    - { name: monitor, port: 8222, targetPort: monitor }
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: nats-leaf
  name: nats-leaf-peers
  namespace: production
  annotations:
    config.linkerd.io/opaque-ports: "4222"
spec:
  publishNotReadyAddresses: true
  selector:
    app: nats-leaf
  ports:
    - { name: client, port: 4222, targetPort: client }
    - { name: monitor, port: 8222, targetPort: monitor }
