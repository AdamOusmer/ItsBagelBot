# Hub NATS server. The nats-config configmap is generated from
# nats-server.conf + nats-auth.conf by the Flux kustomize configMapGenerator
# (deploy/k8s/kustomization.yaml); bcrypt hashes come from the nats-auth-env
# secret.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: nats
  name: nats
  namespace: production
spec:
  serviceName: nats-headless
  replicas: 3
  podManagementPolicy: Parallel
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
        # NATS speaks first on the wire, so protocol detection would stall;
        # opaque keeps Linkerd mTLS without the detection timeout.
        config.linkerd.io/opaque-ports: "4222,7422"
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 1000m
        config.linkerd.io/proxy-memory-limit: 128Mi
        config.linkerd.io/proxy-memory-request: 16Mi
        prometheus.io/path: /metrics
        prometheus.io/port: "7777"
        prometheus.io/scrape: "true"
      labels:
        app: nats
    spec:
      tolerations:
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: nats
      # nats runs as uid/gid 1000; fsGroup makes the JetStream PVC writable.
      # Shared PID namespace lets the config-reloader sidecar SIGHUP the
      # nats-server process (same uid 1000) when the mounted config changes.
      shareProcessNamespace: true
      # nats runs as uid/gid 1000; fsGroup makes the JetStream PVC writable.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: nats
          image: nats:2.11-alpine
          imagePullPolicy: IfNotPresent
          # --pid writes a pidfile the reloader reads to signal this process.
          args: ["--config", "/etc/nats/nats.conf", "--pid", "/var/run/nats/nats.pid"]
          envFrom:
            - secretRef:
                name: nats-auth-env
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - {containerPort: 4222, name: client}
            - {containerPort: 8222, name: monitor}
            - {containerPort: 7422, name: leafnodes}
            - {containerPort: 6222, name: cluster}
          volumeMounts:
            - {name: config, mountPath: /etc/nats, readOnly: true}
            - {name: jetstream-data, mountPath: /data/jetstream}
            - {name: pid, mountPath: /var/run/nats}
          resources:
            # Headroom for JetStream: the container limit must exceed the
            # jetstream max_mem (256MB) in nats-server.conf, otherwise the
            # broker is OOMKilled the moment a stream uses its memory budget.
            # CPU limit preserves burst headroom for low-p99 local RPC paths
            # on JetStream flushes or GC bursts; this node carries the whole bus.
            requests: {cpu: 250m, memory: 256Mi}
            limits: {cpu: 2000m, memory: 768Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
            readOnlyRootFilesystem: true
          lifecycle:
            preStop:
              exec:
                # Allow in-flight JetStream operations and client reconnects to
                # drain before the socket closes. Shortens the 500 blast radius
                # during NATS restarts (hub is still single-replica).
                command: ["/bin/sh", "-c", "sleep 10"]
          startupProbe:
            httpGet: {path: /healthz, port: monitor}
            periodSeconds: 5
            failureThreshold: 10
            timeoutSeconds: 1
          livenessProbe:
            httpGet: {path: /healthz, port: monitor}
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet: {path: "/healthz?js-enabled-only=true", port: monitor}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
        # Watches the mounted config (nats.conf + auth.conf, sourced from the
        # nats-config configmap) and SIGHUPs nats-server on change, so an
        # apply-nats.sh configmap update hot-reloads without a manual signal or
        # a pod restart. TODO(deploy): pin to a digest like the other images.
        - name: reloader
          image: natsio/nats-server-config-reloader:0.23.0
          imagePullPolicy: IfNotPresent
          args:
            - "-pid"
            - "/var/run/nats/nats.pid"
            - "-config"
            - "/etc/nats/nats.conf"
            - "-config"
            - "/etc/nats/auth.conf"
          volumeMounts:
            - {name: config, mountPath: /etc/nats, readOnly: true}
            - {name: pid, mountPath: /var/run/nats}
          resources:
            requests: {cpu: 5m, memory: 16Mi}
            limits: {cpu: 50m, memory: 64Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
            readOnlyRootFilesystem: true
        - name: prometheus-nats-exporter
          image: natsio/prometheus-nats-exporter:0.15.0
          imagePullPolicy: IfNotPresent
          args: ["-varz", "-connz", "-subz", "-routez", "-jsz=all", "http://localhost:8222"]
          ports:
            - {containerPort: 7777, name: metrics}
          resources:
            requests: {cpu: 5m, memory: 32Mi}
            limits: {cpu: 100m, memory: 128Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
      volumes:
        - name: config
          configMap:
            name: nats-config
        - name: pid
          emptyDir: {}
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: jetstream-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: nats
  name: nats
  namespace: production
  annotations:
    config.linkerd.io/opaque-ports: "4222,7422,6222"
spec:
  selector:
    app: nats
  ports:
    - {name: client, port: 4222, targetPort: client}
    - {name: monitor, port: 8222, targetPort: monitor}
    - {name: leafnodes, port: 7422, targetPort: leafnodes}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: nats
  name: nats-headless
  namespace: production
  annotations:
    config.linkerd.io/opaque-ports: "4222,7422,6222"
spec:
  clusterIP: None
  selector:
    app: nats
  ports:
    - {name: cluster, port: 6222, targetPort: cluster}
