# Hub NATS server. The nats-config configmap is generated from
# nats-server.conf + nats-auth.conf by the Flux kustomize configMapGenerator
# (deploy/k8s/kustomization.yaml); bcrypt hashes come from the nats-auth-env
# secret.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: nats
  name: nats
  namespace: production
spec:
  serviceName: nats-headless
  replicas: 3
  podManagementPolicy: Parallel
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
        # NATS speaks first on the wire, so protocol detection would stall;
        # opaque keeps Linkerd mTLS without the detection timeout.
        config.linkerd.io/opaque-ports: "4222,7422"
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 1000m
        config.linkerd.io/proxy-memory-limit: 128Mi
        config.linkerd.io/proxy-memory-request: 16Mi
        prometheus.io/path: /metrics
        prometheus.io/port: "7777"
        prometheus.io/scrape: "true"
      labels:
        app: nats
    spec:
      tolerations:
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        # Tolerate worker1's worker-pool taint so the hub can run there (see the
        # affinity note): worker1 is the 8-core/15GiB node that replaces node1 in
        # the quorum.
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
      # The JetStream hub is a 3-member RAFT quorum. node1 (a 2-core, infra-loaded
      # ARM host) gated the whole StatefulSet's resources, since all three members
      # share one pod template, so members now land on node2/node3/worker1
      # instead. worker1 rides a home-wifi link, but with three voters a worker1
      # blip still leaves node2+node3 as a 2/3 quorum. Trade-off: an R1 stream
      # whose single replica lands on worker1 stalls while that link blips, so the
      # hot firehose must stay replicated or have its placement watched — validate
      # on the prod topology test before bumping resources (see the runbook).
      # JetStream PVCs are local-path (node-bound): moving the node1 member means
      # deleting jetstream-data-nats-2 + its pod so it reprovisions on worker1 and
      # RAFT re-syncs it.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [node1]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: nats
      # nats runs as uid/gid 1000; fsGroup makes the JetStream PVC writable.
      # Shared PID namespace lets the config-reloader sidecar SIGHUP the
      # nats-server process (same uid 1000) when the mounted config changes.
      shareProcessNamespace: true
      # nats runs as uid/gid 1000; fsGroup makes the JetStream PVC writable.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: nats
          image: nats:2.14.3-alpine
          imagePullPolicy: IfNotPresent
          # --pid writes a pidfile the reloader reads to signal this process.
          args: ["--config", "/etc/nats/nats.conf", "--pid", "/var/run/nats/nats.pid"]
          envFrom:
            - secretRef:
                name: nats-auth-env
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - {containerPort: 4222, name: client}
            - {containerPort: 8222, name: monitor}
            - {containerPort: 7422, name: leafnodes}
            - {containerPort: 6222, name: cluster}
          volumeMounts:
            - {name: config, mountPath: /etc/nats, readOnly: true}
            - {name: jetstream-data, mountPath: /data/jetstream}
            - {name: pid, mountPath: /var/run/nats}
          resources:
            # R1 memory-backed ingress needs enough headroom above JetStream's
            # 4GB max_mem for dedup indexes, connections and the Go runtime.
            # node2/node3 each have 6 cores and worker1 has 8. Live usage before
            # this bump was 9%/17%/9%; a 2-core request fits every node while a
            # 4-core ceiling lets whichever R1 member owns TWITCH_INGRESS absorb
            # batch commits without CPU throttling. Memory remains unchanged.
            requests: {cpu: "2", memory: 2Gi}
            limits: {cpu: "4", memory: 6Gi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
            readOnlyRootFilesystem: true
          lifecycle:
            preStop:
              exec:
                # Allow in-flight JetStream operations and client reconnects to
                # drain before the socket closes. Shortens the 500 blast radius
                # during NATS restarts (hub is still single-replica).
                command: ["/bin/sh", "-c", "sleep 10"]
          startupProbe:
            httpGet: {path: /healthz, port: monitor}
            periodSeconds: 5
            failureThreshold: 10
            timeoutSeconds: 1
          livenessProbe:
            httpGet: {path: /healthz, port: monitor}
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 12
          readinessProbe:
            httpGet: {path: "/healthz?js-enabled-only=true", port: monitor}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
        # Watches the mounted config (nats.conf + auth.conf, sourced from the
        # nats-config configmap) and SIGHUPs nats-server on change, so a git
        # push updating the Flux-managed configMapGenerator hot-reloads without
        # a manual signal or a pod restart.
        # TODO(deploy): pin to a digest like the other images.
        - name: reloader
          image: natsio/nats-server-config-reloader:0.23.0
          imagePullPolicy: IfNotPresent
          args:
            - "-pid"
            - "/var/run/nats/nats.pid"
            - "-config"
            - "/etc/nats/nats.conf"
            - "-config"
            - "/etc/nats/auth.conf"
          volumeMounts:
            - {name: config, mountPath: /etc/nats, readOnly: true}
            - {name: pid, mountPath: /var/run/nats}
          resources:
            requests: {cpu: 5m, memory: 16Mi}
            limits: {cpu: 50m, memory: 64Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
            readOnlyRootFilesystem: true
        - name: prometheus-nats-exporter
          image: natsio/prometheus-nats-exporter:0.15.0
          imagePullPolicy: IfNotPresent
          args: ["-varz", "-connz", "-subz", "-routez", "-jsz=all", "http://localhost:8222"]
          ports:
            - {containerPort: 7777, name: metrics}
          resources:
            requests: {cpu: 5m, memory: 32Mi}
            limits: {cpu: 100m, memory: 128Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
      volumes:
        - name: config
          configMap:
            name: nats-config
        - name: pid
          emptyDir: {}
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: jetstream-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: nats
  name: nats
  namespace: production
  annotations:
    config.linkerd.io/opaque-ports: "4222,7422,6222"
spec:
  # Leaf remotes dial this Service once per account. Prefer the hub on the same
  # node so node2/node3/worker1 avoid an unnecessary cross-node or home-WAN hop;
  # node1 still falls back cluster-wide because it intentionally has no hub.
  trafficDistribution: PreferSameNode
  selector:
    app: nats
  ports:
    - {name: client, port: 4222, targetPort: client}
    - {name: monitor, port: 8222, targetPort: monitor}
    - {name: leafnodes, port: 7422, targetPort: leafnodes}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: nats
  name: nats-headless
  namespace: production
  annotations:
    config.linkerd.io/opaque-ports: "4222,7422,6222"
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: nats
  ports:
    - {name: cluster, port: 6222, targetPort: cluster}
