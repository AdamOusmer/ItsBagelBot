apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: modules-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: modules-doppler-token
  managedSecret:
    name: modules-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modules
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: modules
  template:
    metadata:
      labels:
        app: modules
      annotations:
        linkerd.io/inject: enabled
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: modules
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - modules
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: modules
          image: ghcr.io/adamousmer/itsbagelbot/modules:main-1781581833-763bd001d866@sha256:8b2529ec061d5f3d7414363d67b25b8d3ab4522370e75485707e272ef68bee24 # {"$imagepolicy": "flux-system:modules"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
          envFrom:
            - secretRef:
                name: modules-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 5m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 10
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: modules
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: modules
