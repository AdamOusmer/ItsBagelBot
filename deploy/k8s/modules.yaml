apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: modules-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: modules-doppler-token
  managedSecret:
    name: modules-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: modules
  namespace: production
spec:
  revisionHistoryLimit: 3
  minReadySeconds: 10
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: modules
  template:
    metadata:
      labels:
        app: modules
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 750m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 96Mi
    spec:
      # DaemonSet placement keeps one modules pod per schedulable node.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: modules
          image: ghcr.io/adamousmer/itsbagelbot/modules:main-1781834070-ce6a46304f9a@sha256:c78bfffcaab2bfcb3a1ee73c3eea7e00c9ce9d062e959904093956ad1ea593c4 # {"$imagepolicy": "flux-system:modules"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
            - name: NATS_URL
              value: nats://nats:4222
            - name: NATS_RPC_URL
              value: nats://nats-leaf:4222
            - name: GOMEMLIMIT
              value: 160MiB
          envFrom:
            - secretRef:
                name: modules-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 1500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              exec:
                # Give kube-proxy / Linkerd / traefik time to drain this endpoint
                # before SIGTERM fires. Prevents connection-refused 500s during rolls.
                command: ["/bin/sh", "-c", "sleep 10"]
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            failureThreshold: 18 # 18 × 5s = 90s max startup window
            periodSeconds: 5
      terminationGracePeriodSeconds: 45
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: modules
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: modules
