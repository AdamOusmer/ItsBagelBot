apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: modules-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: modules-doppler-token
  managedSecret:
    name: modules-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modules
  namespace: production
  annotations:
    secrets.doppler.com/reload: "true"
spec:
  replicas: 3 # one per node; 3 schedulable nodes incl worker1 (tolerates worker-pool); node3 decommissioned
  revisionHistoryLimit: 3
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: modules
  template:
    metadata:
      labels:
        app: modules
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 750m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 96Mi
    spec:
      tolerations:
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: modules
      # DaemonSet placement keeps one modules pod per schedulable node.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: modules
          image: ghcr.io/adamousmer/itsbagelbot/modules:main-1783747203-1596d9d4f6c4@sha256:33da12a93bccbd1d4122d79d4169d8651f4477621575d0cd0364ee74c627f094 # {"$imagepolicy": "flux-system:modules"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
            # Apps connect only to the node-local leaf cluster (4-node HA); the
            # hub is reached over the leafnode link for JetStream. No hub in the
            # server list, so a leaf roll can never pin a client to the hub.
            - name: NATS_URL
              value: nats://nats-leaf:4222
            - name: NATS_RPC_URL
              value: nats://nats-leaf:4222
            - name: NATS_LEAF_URL
              value: nats://nats-leaf:4222
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DB_MAX_OPEN_CONNS
              value: "4"
            - name: DB_QUERY_CONCURRENCY
              value: "4"
            - name: DB_AUTO_MIGRATE
              value: "true"
            - name: GOMEMLIMIT
              value: 160MiB
            # Tink keyset for at-rest Govee API-key encryption (this service's
            # own keyset, distinct from users'), consumed as a file. The mount is
            # optional (see volumes): until the TINK_KEYSET secret is provisioned
            # the file is absent and the service degrades to "govee off" rather
            # than crash-looping.
            - name: TINK_KEYSET_PATH
              value: /etc/tink/keyset.json
          envFrom:
            - secretRef:
                name: modules-env
          volumeMounts:
            - name: tink-keyset
              mountPath: /etc/tink
              readOnly: true
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              httpGet:
                path: /drain
                port: 8080
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            failureThreshold: 18 # 18 × 5s = 90s max startup window
            periodSeconds: 5
      terminationGracePeriodSeconds: 45
      volumes:
        # Optional: a missing TINK_KEYSET key leaves the file absent, and the
        # service disables govee key custody instead of failing to start.
        - name: tink-keyset
          secret:
            secretName: modules-env
            optional: true
            items:
              - key: TINK_KEYSET
                path: keyset.json
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: modules
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: modules
