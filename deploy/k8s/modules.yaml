apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: modules-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: modules-doppler-token
  managedSecret:
    name: modules-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modules
  namespace: production
  annotations:
    secrets.doppler.com/reload: "true"
spec:
  replicas: 3 # one per node; 3 schedulable nodes incl worker1 (tolerates worker-pool); node3 decommissioned
  revisionHistoryLimit: 3
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: modules
  template:
    metadata:
      labels:
        app: modules
      annotations:
        linkerd.io/inject: disabled
        # NATS is out of the Linkerd mesh: bypass the app-side proxy for the NATS
        # client port so the firehose / RPC traffic goes direct (NATS-native TLS
        # provides the encryption). Without this the proxy still taxes every event.
        config.linkerd.io/skip-outbound-ports: "4222"
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 750m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 96Mi
    spec:
      tolerations:
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: modules
      # DaemonSet placement keeps one modules pod per schedulable node.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: modules
          image: ghcr.io/adamousmer/itsbagelbot/modules:main-1783910766-266a60df96c6@sha256:a21cc9416b9129a06589b6f4e6771b5be42b758894965b8b1c17bb51fd98d66b # {"$imagepolicy": "flux-system:modules"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
            # Split planes: the BUS / JetStream connection dials the hub directly
            # (NATS_HUB_URL) so stream traffic never pays a leaf forwarding hop;
            # the RPC + cache plane (NATS_RPC_URL / NATS_LEAF_URL) stays on the
            # node-local leaf. NATS_URL is the local-dev fallback only.
            - name: NATS_URL
              value: nats://nats-leaf:4222
            - name: NATS_HUB_URL
              value: nats://nats:4222
            # Fleet CA (trust-manager fleet-ca ConfigMap) to verify the NATS server
            # TLS cert now that NATS is out of the Linkerd mesh; read as RootCAs by
            # pkg/bus (Go services) and the console nats lib (TS).
            - name: NATS_CA_PEM
              valueFrom:
                configMapKeyRef:
                  name: fleet-ca
                  key: ca.pem
            - name: NATS_RPC_URL
              value: nats://nats-leaf:4222
            - name: NATS_LEAF_URL
              value: nats://nats-leaf:4222
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DB_MAX_OPEN_CONNS
              value: "4"
            - name: DB_QUERY_CONCURRENCY
              value: "4"
            - name: DB_AUTO_MIGRATE
              value: "true"
            - name: GOMEMLIMIT
              value: 160MiB
            # Tink keyset for at-rest Govee API-key encryption (this service's
            # own keyset, distinct from users'), consumed as a file. The mount is
            # optional (see volumes): until the TINK_KEYSET secret is provisioned
            # the file is absent and the service degrades to "govee off" rather
            # than crash-looping.
            - name: TINK_KEYSET_PATH
              value: /etc/tink/keyset.json
          envFrom:
            - secretRef:
                name: modules-env
          volumeMounts:
            - name: tink-keyset
              mountPath: /etc/tink
              readOnly: true
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              httpGet:
                path: /drain
                port: 8080
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            failureThreshold: 18 # 18 × 5s = 90s max startup window
            periodSeconds: 5
      terminationGracePeriodSeconds: 45
      volumes:
        # Optional: a missing TINK_KEYSET key leaves the file absent, and the
        # service disables govee key custody instead of failing to start.
        - name: tink-keyset
          secret:
            secretName: modules-env
            optional: true
            items:
              - key: TINK_KEYSET
                path: keyset.json
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: modules
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: modules
