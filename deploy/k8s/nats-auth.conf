# NATS authentication and authorization for the BagelBot fleet.
#
# Included by the hub server config (and mirrored on the leaf). Passwords are
# bcrypt hashes resolved from environment variables injected into the nats
# container from the nats-auth-env secret; the matching plaintext lives only
# in each service's Doppler project as NATS_USER / NATS_PASSWORD.
#
# Permission model:
#   * One account (BAGELBOT) so every service shares the same subject space
#     and the same JetStream domain.
#   * One user per service, allowed to publish exactly what it emits and
#     subscribe to exactly what it owns or consumes.
#   * RPC repliers get allow_responses instead of a blanket _INBOX.> publish,
#     so they can only answer requests they actually received.
#   * Services that issue requests (RPC or JetStream API) subscribe _INBOX.>
#     for their replies. OAuth tokens only transit subjects the users service
#     alone may subscribe to: bagel.rpc.dashboard.grant_save (onboarding),
#     bagel.rpc.admin.user.token_set (operator-installed bot token) and
#     bagel.rpc.internal.tokens.> (outgress loading/rotating the bot token,
#     whose get replies carry the plaintext back to the requester's inbox).
#   * $JS.> publish covers the JetStream API, acks, and flow control for the
#     watermill-based event bus (subjects under data.>).

accounts: {
  BAGELBOT: {
    jetstream: enabled
    users: [
      {
        # users: owns user/token data; answers dashboard, admin and
        # projection RPCs; emits user change events and cache invalidations.
        user: "users"
        password: $NATS_BCRYPT_USERS
        permissions: {
          publish: {
            allow: [
              "data.users.>",
              # Scope-per-subject so the ACL enforces which sections this
              # service may invalidate (it owns user status, grants, delegation).
              "bagel.cache.invalidate.grant",
              "bagel.cache.invalidate.status",
              "bagel.cache.invalidate.delegation",
              "$JS.>"
            ]
          }
          subscribe: {
            allow: [
              "bagel.rpc.dashboard.>",
              "bagel.rpc.admin.user.>",
              "bagel.rpc.delegation.>",
              "bagel.rpc.internal.projection.users.get",
              "bagel.rpc.internal.tokens.>",
              "data.users.>",
              "data.reproject.request",
              "_INBOX.>"
            ]
          }
          allow_responses: true
        }
      },
      {
        # outgress: drains the chat lanes, answers its management RPC, and
        # loads/rotates the bot account's token through the users service
        # token RPC.
        user: "outgress"
        password: $NATS_BCRYPT_OUTGRESS
        permissions: {
          publish: {
            allow: [
              "bagel.rpc.internal.tokens.>",
              "$JS.>"
            ]
          }
          subscribe: {
            allow: [
              "twitch.outgress.>",
              "bagel.rpc.outgress.>",
              "_INBOX.>"
            ]
          }
          allow_responses: true
        }
      },
      {
        # worker: drains premium/standard ingress lanes, resolves projection
        # state over RPC, and publishes the resulting actions to outgress.
        user: "worker"
        password: $NATS_BCRYPT_WORKER
        permissions: {
          publish: {
            allow: [
              "bagel.rpc.internal.projection.>",
              "twitch.outgress.>",
              "$JS.>"
            ]
          }
          subscribe: {
            allow: [
              "twitch.ingress.event.premium",
              "twitch.ingress.event.standard",
              # Push-evict the in-process projection cache for exactly the
              # sections the worker caches (user status/grant, commands, modules).
              "bagel.cache.invalidate.status",
              "bagel.cache.invalidate.grant",
              "bagel.cache.invalidate.commands",
              "bagel.cache.invalidate.modules",
              "_INBOX.>"
            ]
          }
        }
      },
      {
        # commands: owns command data; answers the commands projection RPC and
        # the dashboard command CRUD RPC (commands.*); emits command change
        # events.
        user: "commands"
        password: $NATS_BCRYPT_COMMANDS
        permissions: {
          publish: {
            allow: [
              "data.commands.>",
              "$JS.>"
            ]
          }
          subscribe: {
            allow: [
              "bagel.rpc.internal.projection.commands.get",
              "bagel.rpc.commands.>",
              "data.commands.>",
              "_INBOX.>"
            ]
          }
          allow_responses: true
        }
      },
      {
        # modules: owns module data; answers the modules projection RPC;
        # emits module change events; replays on reproject requests.
        user: "modules"
        password: $NATS_BCRYPT_MODULES
        permissions: {
          publish: {
            allow: [
              "data.modules.>",
              "$JS.>"
            ]
          }
          subscribe: {
            allow: [
              "bagel.rpc.internal.projection.modules.get",
              "data.modules.>",
              "data.reproject.request",
              "_INBOX.>"
            ]
          }
          allow_responses: true
        }
      },
      {
        # projector: folds data.> events into Valkey, answers the broadcaster
        # status RPC and dashboard read RPCs from the projection, pre-warms on
        # stream.online by asking the data services for their projections.
        user: "projector"
        password: $NATS_BCRYPT_PROJECTOR
        permissions: {
          publish: {
            allow: [
              "bagel.rpc.internal.projection.>",
              "data.reproject.request",
              # After folding a command/module change into Valkey, the projector
              # fans out a scoped cache invalidation for that section only.
              "bagel.cache.invalidate.commands",
              "bagel.cache.invalidate.modules",
              "$JS.>"
            ]
          }
          subscribe: {
            allow: [
              "bagel.rpc.broadcaster.status.get",
              "bagel.rpc.projector.dashboard.>",
              "twitch.ingress.event.stream",
              "data.users.>",
              "data.modules.>",
              "data.commands.>",
              "_INBOX.>"
            ]
          }
          allow_responses: true
        }
      },
      {
        # transactions: records Tebex transactions, emits transaction events.
        user: "transactions"
        password: $NATS_BCRYPT_TRANSACTIONS
        permissions: {
          publish: {
            allow: [
              "data.transactions.>",
              "$JS.>"
            ]
          }
          subscribe: {
            allow: ["_INBOX.>"]
          }
        }
      },
      {
        # dashboard: web tier; requests user upserts, bot grants and
        # broadcaster tiers; reads projected commands/modules through projector
        # and writes custom commands through commands.*;
        # enqueues EventSub on/off jobs on the outgress
        # system lane so Helix calls share the fleet rate-limit bucket;
        # push-evicts its per-section caches on the invalidation lane (it
        # caches every section, so it subscribes the whole bagel.cache.invalidate
        # subtree). May not subscribe to any RPC subject, so it can never observe
        # another service's requests (grant_save carries OAuth tokens).
        user: "dashboard"
        password: $NATS_BCRYPT_DASHBOARD
        permissions: {
          publish: {
            allow: [
              "bagel.rpc.dashboard.>",
              "bagel.rpc.commands.>",
              "bagel.rpc.projector.dashboard.>",
              "bagel.rpc.delegation.>",
              "bagel.rpc.broadcaster.status.get",
              "twitch.outgress.system",
              "bagel.rpc.admin.user.audit.>"
            ]
          }
          subscribe: {
            allow: [
              "bagel.cache.invalidate.>",
              "_INBOX.>"
            ]
          }
        }
      },
      {
        # admin: operator tool; requests shard snapshots and user
        # administration; enqueues per-user EventSub restarts on the outgress
        # system lane; watches the ingress status stream; reads JetStream
        # stream/consumer state (read-only) for the lane telemetry view.
        # The lane view targets the hub JetStream domain, so the JS API
        # subjects carry the "hub" domain segment ($JS.hub.API.>, not $JS.API.>).
        user: "admin"
        password: $NATS_BCRYPT_ADMIN
        permissions: {
          publish: {
            allow: [
              "twitch.ingress.admin.>",
              "bagel.rpc.admin.user.>",
              "twitch.outgress.system",
              "data.reproject.request",
              "$JS.hub.API.INFO",
              "$JS.hub.API.STREAM.NAMES",
              "$JS.hub.API.STREAM.LIST",
              "$JS.hub.API.STREAM.INFO.>",
              "$JS.hub.API.CONSUMER.NAMES.>",
              "$JS.hub.API.CONSUMER.LIST.>",
              "$JS.hub.API.CONSUMER.INFO.>",
              "$JS.hub.API.CONSUMER.CREATE.>",
              "$JS.hub.API.CONSUMER.DURABLE.CREATE.>",
              "$JS.hub.API.CONSUMER.DELETE.>",
              "$JS.hub.API.STREAM.CREATE.KV_admin_lanes",
              "$JS.hub.API.STREAM.UPDATE.KV_admin_lanes",
              "$JS.hub.API.STREAM.MSG.GET.KV_admin_lanes",
              "$JS.hub.API.DIRECT.GET.KV_admin_lanes",
              "$JS.hub.API.DIRECT.GET.KV_admin_lanes.>",
              "$KV.admin_lanes.>"
            ]
          }
          subscribe: {
            allow: [
              "twitch.ingress.status.>",
              # Admin caches user state + tokens; push-evict on status/grant
              # changes only (it does not cache commands/modules/delegation).
              "bagel.cache.invalidate.status",
              "bagel.cache.invalidate.grant",
              "_INBOX.>"
            ]
          }
        }
      },
      {
        # twitch-ingress: publishes everything Twitch (event lanes, shard
        # statuses), answers the admin shard RPC, asks for broadcaster status,
        # and evicts its premium/standard lane cache on broadcaster status
        # changes (the "status" section of the cache-invalidation bus only).
        user: "twitch_ingress"
        password: $NATS_BCRYPT_TWITCH_INGRESS
        permissions: {
          publish: {
            allow: [
              "twitch.>",
              "bagel.rpc.broadcaster.status.get"
            ]
          }
          subscribe: {
            allow: [
              "twitch.ingress.admin.shards.>",
              "bagel.cache.invalidate.status",
              "_INBOX.>"
            ]
          }
          allow_responses: true
        }
      }
    ]
  }

  # System account for server monitoring; no fleet service uses it.
  SYS: {
    users: [
      { user: "sys", password: $NATS_BCRYPT_SYS }
    ]
  }
}

system_account: SYS
