apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: transactions-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: transactions-doppler-token
  managedSecret:
    name: transactions-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: transactions
  namespace: production
spec:
  revisionHistoryLimit: 3
  minReadySeconds: 10
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: transactions
  template:
    metadata:
      labels:
        app: transactions
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 750m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 96Mi
    spec:
      # DaemonSet placement keeps one transactions pod per schedulable node.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: transactions
          image: ghcr.io/adamousmer/itsbagelbot/transactions:main-1781856558-aadcf892c0fb@sha256:76d5d2efddab3ce090fb617c3addc74db9d98f7374bd07a634565034bd53e023 # {"$imagepolicy": "flux-system:transactions"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
            - name: NATS_URL
              value: nats://nats:4222
            - name: DB_MAX_OPEN_CONNS
              value: "4"
            - name: DB_QUERY_CONCURRENCY
              value: "4"
            - name: DB_AUTO_MIGRATE
              value: "false"
            - name: GOMEMLIMIT
              value: 160MiB
          envFrom:
            - secretRef:
                name: transactions-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 1500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              httpGet:
                path: /drain
                port: 8080
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            failureThreshold: 18 # 18 × 5s = 90s max startup window
            periodSeconds: 5
      terminationGracePeriodSeconds: 45
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: transactions
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: transactions
