apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: transactions-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: transactions-doppler-token
  managedSecret:
    name: transactions-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transactions
  namespace: production
  annotations:
    secrets.doppler.com/reload: "true"
spec:
  replicas: 3 # one per node; 3 schedulable nodes incl worker1 (tolerates worker-pool); node3 decommissioned
  revisionHistoryLimit: 3
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: transactions
  template:
    metadata:
      labels:
        app: transactions
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 750m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 96Mi
    spec:
      tolerations:
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: transactions
      # DaemonSet placement keeps one transactions pod per schedulable node.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: transactions
          image: ghcr.io/adamousmer/itsbagelbot/transactions:main-1783840266-40cf85014658@sha256:417421b8410c68a082e5be28706459f4e165ba7560f6026444257785f7426873 # {"$imagepolicy": "flux-system:transactions"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
            # Both planes (BUS JetStream publisher + TRANSACTIONS_RPC checkout
            # responder) connect to the node-local leaf cluster; the hub is
            # reached over the leafnode link. RPC creds (NATS_RPC_USER/PASSWORD)
            # and the Tebex Headless secrets (TEBEX_WEBSTORE_TOKEN,
            # TEBEX_PACKAGE_ID) ride in via envFrom from Doppler.
            - name: NATS_URL
              value: nats://nats-leaf:4222
            - name: NATS_LEAF_URL
              value: nats://nats-leaf:4222
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DB_MAX_OPEN_CONNS
              value: "4"
            - name: DB_QUERY_CONCURRENCY
              value: "4"
            - name: DB_AUTO_MIGRATE
              value: "true"
            # Tebex Developers > Webhooks > Endpoints secret. The Fiber webhook
            # handler refuses requests until this is configured.
            - name: TEBEX_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: transactions-env
                  key: TEBEX_WEBHOOK_SECRET
                  optional: true
            - name: GOMEMLIMIT
              value: 160MiB
          envFrom:
            - secretRef:
                name: transactions-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 15m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              httpGet:
                path: /drain
                port: 8080
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            failureThreshold: 18 # 18 × 5s = 90s max startup window
            periodSeconds: 5
      terminationGracePeriodSeconds: 45
---
apiVersion: v1
kind: Service
metadata:
  name: transactions
  namespace: production
spec:
  trafficDistribution: PreferClose
  selector:
    app: transactions
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: transactions-webhooks
  namespace: production
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`webhooks.itsbagelbot.com`) && (PathPrefix(`/tebex`) || PathPrefix(`/webhooks/tebex`))
      kind: Rule
      services:
        - name: transactions
          port: 80
          nativeLB: true
  tls: {}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: transactions
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: transactions
