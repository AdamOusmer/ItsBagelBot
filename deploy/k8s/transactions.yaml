apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: transactions-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: transactions-doppler-token
  managedSecret:
    name: transactions-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transactions
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: transactions
  template:
    metadata:
      labels:
        app: transactions
      annotations:
        linkerd.io/inject: enabled
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: transactions
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - transactions
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: transactions
          image: ghcr.io/adamousmer/itsbagelbot/transactions:main-1781547007-63272eba3174@sha256:04d2e3edd69f1e57d2b8e6e8f7c413ae2bbb1783522d06a29a014c9dda91f29d # {"$imagepolicy": "flux-system:transactions"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
          envFrom:
            - secretRef:
                name: transactions-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 5m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 10
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: transactions
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: transactions
