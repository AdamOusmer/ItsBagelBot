apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: users-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: users-doppler-token
  managedSecret:
    name: users-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users
  namespace: production
  annotations:
    secrets.doppler.com/reload: "true"
spec:
  replicas: 3 # one per node; 3 schedulable nodes incl worker1 (tolerates worker-pool); node3 decommissioned
  revisionHistoryLimit: 3
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: users
  template:
    metadata:
      labels:
        app: users
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 750m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 96Mi
    spec:
      tolerations:
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: users
      # DaemonSet placement keeps one users pod per schedulable node.
      # Resolve external hosts (Twitch OAuth token refresh) without the cluster
      # search-domain fan-out (ndots:1) and serialize A/AAAA to dodge the
      # conntrack race; cap any DNS stall well under a few seconds.
      dnsConfig:
        options:
          - {name: ndots, value: "1"}
          - {name: single-request-reopen}
          - {name: timeout, value: "2"}
          - {name: attempts, value: "2"}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: users
          image: ghcr.io/adamousmer/itsbagelbot/users:main-1783188210-e49adfdfc147@sha256:efe38d7586b9518c50fe9b9feeb7b5869146e5b7963403f2bb0ad80f8692cd09 # {"$imagepolicy": "flux-system:users"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
            # Apps connect only to the node-local leaf cluster (4-node HA); the
            # hub is reached over the leafnode link for JetStream. No hub in the
            # server list, so a leaf roll can never pin a client to the hub.
            - name: NATS_URL
              value: nats://nats-leaf:4222
            - name: NATS_RPC_URL
              value: nats://nats-leaf:4222
            - name: NATS_LEAF_URL
              value: nats://nats-leaf:4222
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DB_MAX_OPEN_CONNS
              value: "4"
            - name: DB_QUERY_CONCURRENCY
              value: "4"
            - name: DB_AUTO_MIGRATE
              value: "true"
            - name: GOMEMLIMIT
              value: 160MiB
          envFrom:
            - secretRef:
                name: users-env
          volumeMounts:
            # Tink keyset for at-rest token encryption, synced from Doppler
            # (TINK_KEYSET key of users-env) and consumed as a file via
            # TINK_KEYSET_PATH=/etc/tink/keyset.json.
            - name: tink-keyset
              mountPath: /etc/tink
              readOnly: true
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              httpGet:
                path: /drain
                port: 8080
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            failureThreshold: 18 # 18 × 5s = 90s max startup window
            periodSeconds: 5
      terminationGracePeriodSeconds: 45
      volumes:
        - name: tink-keyset
          secret:
            secretName: users-env
            items:
              - key: TINK_KEYSET
                path: keyset.json
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: users
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: users
