apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: users-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: users-doppler-token
  managedSecret:
    name: users-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: users
  namespace: production
spec:
  revisionHistoryLimit: 3
  minReadySeconds: 10
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: users
  template:
    metadata:
      labels:
        app: users
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 750m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 96Mi
    spec:
      # DaemonSet placement keeps one users pod per schedulable node.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: users
          image: ghcr.io/adamousmer/itsbagelbot/users:main-1781747331-2606f94ad617@sha256:0195c85b7d142d1f8914ecfdf1993dcd3fb107d6433983cf1a987f69bc3e0ce0 # {"$imagepolicy": "flux-system:users"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
            - name: NATS_URL
              value: nats://nats:4222
            - name: NATS_RPC_URL
              value: nats://nats-leaf:4222
            - name: GOMEMLIMIT
              value: 160MiB
          envFrom:
            - secretRef:
                name: users-env
          volumeMounts:
            # Tink keyset for at-rest token encryption, synced from Doppler
            # (TINK_KEYSET key of users-env) and consumed as a file via
            # TINK_KEYSET_PATH=/etc/tink/keyset.json.
            - name: tink-keyset
              mountPath: /etc/tink
              readOnly: true
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 1500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              exec:
                # Give kube-proxy / Linkerd / traefik time to drain this endpoint
                # before SIGTERM fires. Prevents connection-refused 500s during rolls.
                command: ["/bin/sh", "-c", "sleep 10"]
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            failureThreshold: 18   # 18 × 5s = 90s max startup window
            periodSeconds: 5
      terminationGracePeriodSeconds: 45
      volumes:
        - name: tink-keyset
          secret:
            secretName: users-env
            items:
              - key: TINK_KEYSET
                path: keyset.json
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: users
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: users
