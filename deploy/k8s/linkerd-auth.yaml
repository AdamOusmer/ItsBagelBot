---
# Server: broadcaster-data
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: broadcaster-data-http
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: broadcaster-data
  port: 8080
  proxyProtocol: HTTP/1
---
# Server: console-dashboard (SvelteKit SSR on :3000, HTTP/1.1 via adapter-node)
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: console-dashboard-http
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: console-dashboard
  port: 3000
  proxyProtocol: HTTP/1
---
# Allow Kubelet probes to bypass auth (for Liveness/Readiness probes)
# Linkerd automatically allows kubelet probes by default when using proxy injection, 
# but making it explicit prevents breaking changes if policies are strict.
apiVersion: policy.linkerd.io/v1alpha1
kind: ServerAuthorization
metadata:
  name: allow-kubelet
  namespace: production
spec:
  server:
    selector:
      matchExpressions:
        - key: app
          operator: In
          values: [broadcaster-data, console-dashboard]
  client:
    networks:
      - cidr: 0.0.0.0/0
    unauthenticated: true
---
# Allow Traefik (in kube-system) to route traffic to the console dashboard.
apiVersion: policy.linkerd.io/v1alpha1
kind: ServerAuthorization
metadata:
  name: console-dashboard-allow-ingress
  namespace: production
spec:
  server:
    name: console-dashboard-http
  client:
    # Traefik reaches the pod unmeshed from kube-system; the app manages its own
    # session auth (encrypted cookie) and serves only public/session-gated data.
    unauthenticated: true
