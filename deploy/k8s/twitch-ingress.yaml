# Twitch Ingress (Elixir/BEAM). Secrets sync from Doppler project
# `twitch-ingress` (config prd) via the operator; the token secret
# `twitch-ingress-doppler-token` is created out-of-band, never committed.
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: twitch-ingress-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: twitch-ingress-doppler-token
  managedSecret:
    name: twitch-ingress-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
# Headless service: libcluster (Kubernetes.DNS strategy) resolves it to pod
# IPs to form the BEAM cluster. publishNotReadyAddresses lets nodes find each
# other before readiness, which is required for initial cluster formation.
apiVersion: v1
kind: Service
metadata:
  name: twitch-ingress-headless
  namespace: production
  annotations:
    config.linkerd.io/opaque-ports: "4369,9100-9110"
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: twitch-ingress
  ports:
    - name: epmd
      port: 4369
    - name: erlang-dist
      port: 9100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twitch-ingress
  namespace: production
  annotations:
    secrets.doppler.com/reload: "true"
spec:
  replicas: 5 # node1 excluded via hot-path anti-affinity; target shape node3=2, worker1=2, node2=1 (see affinity)
  revisionHistoryLimit: 3
  # Each pod death forces its EventSub conduit shards to rebind on a peer (new
  # websocket session + transport update), and Twitch drops a shard's events
  # until the rebind lands. Hold each replacement pod Ready for a full minute
  # before killing the next old pod so the Horde registry converges and the
  # displaced shards re-bind between swaps — the 2026-07-10 mid-stream incident
  # was pods cycling within a minute of each other, stacking shard gaps and
  # registry races ("registry pick unreachable") into a ~5 min chat outage.
  minReadySeconds: 60
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: twitch-ingress
  template:
    metadata:
      labels:
        app: twitch-ingress
      annotations:
        linkerd.io/inject: disabled
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 750m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 96Mi
        # Opaque ports for EPMD (4369) and Erlang distribution (9100-9110)
        # to prevent Linkerd protocol detection timeouts on server-speaks-first.
        config.linkerd.io/opaque-ports: "4369,9100-9110"
        # Skip outbound: 443 for the server-speaks-first Twitch EventSub wss://
        # sockets, and 4222 for NATS — now out of the mesh, so NATS-native TLS
        # provides the encryption and the proxy would otherwise tax every event.
        config.linkerd.io/skip-outbound-ports: "443,4222"
    spec:
      tolerations:
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      # node1 (2-core ARM) is reserved for stateful/frontend + infra; keep ingress
      # off it via nodeAffinity. Eligible nodes are node2/node3/worker1, and the
      # spread is SOFT (ScheduleAnyway): a worker1 outage (home node) must not
      # strand ingress with a hard maxSkew it cannot satisfy on fewer nodes.
      # Baseline shape: node3=2, worker1=2, node2=1. node2 already carries the
      # control plane + valkey master, so the doubles belong on the big-CPU
      # pair (node3 6c, worker1 8c) and node2 keeps the single. The soft skew
      # allows any 2/2/1 split; the two graded preferences below pick WHICH
      # nodes take the doubles (node3 first, worker1 second, node2 never
      # preferred). Soft only — a node outage re-packs onto the survivors.
      #
      # Weights are deliberately LOW: a skew >= 1 must outscore them so the
      # spread still wins against pile-ups. Weight 100 proved to overpower the
      # spread during a maxSurge=0 roll (old pods still count in the skew),
      # piling 3 replicas onto node3 and none on node2. Empty-node resource
      # scoring can still stack with these during bulk scheduling; if the shape
      # drifts, deleting the surplus pod once re-lands it correctly.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [node1]
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 25
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [node3]
            - weight: 20
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [worker1]
      topologySpreadConstraints:
        # matchLabelKeys scopes the skew to the CURRENT ReplicaSet: during a
        # maxSurge=0 roll the outgoing pods no longer count, so every rollout
        # re-spreads one-per-node instead of piling onto whichever node freed
        # capacity first (bit the ingress on 2026-07-10: 3/0/1). Soft constraint
        # stays soft, so a node outage never wedges scheduling; the KEDA floor
        # (>= one per hot-path node) plus the ReplicaSet downscaler's
        # remove-co-located-duplicates-first ranking keep steady state at
        # >= 1 per node.
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          matchLabelKeys: [pod-template-hash]
          labelSelector:
            matchLabels:
              app: twitch-ingress
      # Resolve external hosts (Twitch EventSub/Helix) without the cluster
      # search-domain fan-out (ndots:1) and serialize A/AAAA to dodge the
      # conntrack race; cap any DNS stall well under a few seconds.
      dnsConfig:
        options:
          - {name: ndots, value: "1"}
          - {name: single-request-reopen}
          - {name: timeout, value: "2"}
          - {name: attempts, value: "2"}
      securityContext:
        runAsNonRoot: true
        runAsUser: 999 # the image's `ingress` user; numeric so kubelet can verify
        runAsGroup: 999
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: ingress
          image: ghcr.io/adamousmer/itsbagelbot/twitch-ingress:main-1783937922-62476d23f403@sha256:d998aad5a6a15e3e8c816707a11271dd4eae9fef6f73e40025d1b3a8ae7653be # {"$imagepolicy": "flux-system:twitch-ingress"}
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: twitch-ingress-env
          env:
            - name: NATS_HOST
              value: nats
            # The RPC plane (:gnat) stays on the node-local leaf. The BUS firehose
            # plane (:gnat_bus) connects DIRECT to the hub member leading
            # TWITCH_INGRESS (placement-pinned to nats-0 by the stream contract):
            # the leaf runs no JetStream, and the PreferSameNode `nats` Service
            # would land pods on a non-leader member, paying an intra-hub route
            # hop per publish and PubAck. The per-pod headless name is a hub cert
            # SAN, follows the pod across nodes, and loses no availability — an
            # R1 stream is down with its pinned peer no matter which member the
            # client dialed. A hub roll re-pins the BUS connection (Gnat
            # reconnect); the RPC path is unaffected.
            - name: NATS_LEAF_HOST
              value: nats-leaf
            - name: NATS_HUB_HOST
              value: nats-0.nats-headless.production.svc.cluster.local
            # Fleet CA (trust-manager fleet-ca ConfigMap) to verify the NATS server
            # TLS cert now that NATS is out of the Linkerd mesh; decoded to ssl_opts
            # cacerts in config/runtime.exs. Both :gnat (leaf) and :gnat_bus (hub)
            # verify against it.
            - name: NATS_CA_PEM
              valueFrom:
                configMapKeyRef:
                  name: fleet-ca
                  key: ca.pem
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # Worker node (machine) the pod is scheduled on, surfaced to the
            # admin console so shard cards show the host name, not the pod IP.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: RELEASE_DISTRIBUTION
              value: name
            - name: RELEASE_NODE
              value: ingress@$(POD_IP)
            - name: RELEASE_COOKIE
              valueFrom:
                secretKeyRef:
                  name: twitch-ingress-env
                  key: BAGELBOT_ERLANG_COOKIE
            - name: NEW_RELIC_APP_NAME
              value: "ItsBagelBot-Ingress"
            - name: NEW_RELIC_LOGS_IN_CONTEXT
              value: "forwarder"
            - name: INGRESS_DISPATCHER_MAX_RUNNING
              value: "512"
            - name: INGRESS_DISPATCHER_MAX_QUEUE
              value: "20000"
            # Shipped inert (above max_running+max_queue's realistic reach) for
            # burn-in; tighten to "2048" once the new broadcaster_cap drop
            # metric shows real per-broadcaster admission patterns in prod.
            - name: INGRESS_DISPATCHER_MAX_PER_BROADCASTER
              value: "16000"
            # One atomic JetStream commit per scheduler-local cohort. The 1ms
            # tail bound avoids adding visible latency when traffic is quiet.
            # Lane publishes carry no Nats-Msg-Id: EventSub websockets never
            # redeliver, and the 2026-07-13 live A/B measured the broker's
            # per-message dedup insert at ~27% of single-stream ingest capacity
            # (86k/s with, 117k/s without). Without the header an ambiguous ack
            # timeout drops instead of retrying (at-most-once); definite
            # failures still retry. Applies to premium + standard identically.
            - name: INGRESS_PUBLISH_DEDUP
              value: "off"
            - name: INGRESS_PUBLISH_BATCH_SIZE
              value: "128"
            - name: INGRESS_PUBLISH_BATCH_WAIT_MS
              value: "1"
            # Match normal and dirty schedulers to the two-CPU cgroup below.
            # `short` normal-scheduler busy-wait was modestly faster than
            # `none` across repeated direct-dispatch runs, while dirty
            # schedulers stay at `none` because ingress does no sustained dirty
            # NIF work. More than two schedulers only creates cgroup contention
            # on this five-replica deployment.
            - name: ERL_FLAGS
              # Range, not a single port: probe/remote-shell hidden nodes
              # need their own listen port besides the main VM's.
              value: >-
                +S 2:2 +SDcpu 2:2 +SDio 2 +sbwt short +sbwtdcpu none +sbwtdio none -kernel inet_dist_listen_min 9100 -kernel inet_dist_listen_max 9110
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              exec:
                # Grace period for Linkerd and kube-proxy to drain this endpoint
                # before SIGTERM fires. Horde redistributes shards during this window.
                command: ["/bin/sh", "-c", "sleep 10"]
          livenessProbe:
            exec:
              command: ["/app/bin/ingress", "pid"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["/app/bin/ingress", "pid"]
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
      terminationGracePeriodSeconds: 45
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: twitch-ingress
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: twitch-ingress
