# Twitch Ingress (Elixir/BEAM). Secrets sync from Doppler project
# `twitch-ingress` (config prd) via the operator; the token secret
# `twitch-ingress-doppler-token` is created out-of-band, never committed.
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: twitch-ingress-env
  namespace: bagelbot
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: twitch-ingress-doppler-token
  managedSecret:
    name: twitch-ingress-env
    namespace: bagelbot
    type: Opaque
  resyncSeconds: 60
---
# Headless service: libcluster (Kubernetes.DNS strategy) resolves it to pod
# IPs to form the BEAM cluster. publishNotReadyAddresses lets nodes find each
# other before readiness, which is required for initial cluster formation.
apiVersion: v1
kind: Service
metadata:
  name: twitch-ingress-headless
  namespace: bagelbot
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: twitch-ingress
  ports:
    - name: epmd
      port: 4369
    - name: erlang-dist
      port: 9100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twitch-ingress
  namespace: bagelbot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: twitch-ingress
  template:
    metadata:
      labels:
        app: twitch-ingress
      annotations:
        # Erlang distribution and the server-first EventSub socket do not
        # play well with mesh protocol detection; this pod stays unmeshed.
        linkerd.io/inject: disabled
    spec:
      # node2 (amd64) is reserved for the sentinel; all app workloads pin to
      # the arm64 node. HA is replica-level: two BEAM nodes, PDB, and Horde
      # re-homing shards when one dies.
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        runAsNonRoot: true
        runAsUser: 999 # the image's `ingress` user; numeric so kubelet can verify
        runAsGroup: 999
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: ingress
          image: docker.io/itsbagelbot/twitch-ingress:0.1.1
          imagePullPolicy: Never # imported directly into node containerd
          envFrom:
            - secretRef:
                name: twitch-ingress-env
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: RELEASE_DISTRIBUTION
              value: name
            - name: RELEASE_NODE
              value: ingress@$(POD_IP)
            - name: RELEASE_COOKIE
              valueFrom:
                secretKeyRef:
                  name: twitch-ingress-env
                  key: BAGELBOT_ERLANG_COOKIE
            # The BEAM sizes schedulers from the host's logical CPUs, not the
            # cgroup quota. Cap schedulers to the CPU limit below and disable
            # scheduler busy-waiting so idle spinning never eats host cores.
            - name: ERL_FLAGS
              # Range, not a single port: probe/remote-shell hidden nodes
              # need their own listen port besides the main VM's.
              value: >-
                +S 2:2 +SDio 4
                +sbwt none +sbwtdcpu none +sbwtdio none
                -kernel inet_dist_listen_min 9100
                -kernel inet_dist_listen_max 9110
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          livenessProbe:
            exec:
              command: ["/app/bin/ingress", "pid"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["/app/bin/ingress", "pid"]
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
      terminationGracePeriodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: twitch-ingress
  namespace: bagelbot
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: twitch-ingress
