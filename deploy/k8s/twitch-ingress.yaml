# Twitch Ingress (Elixir/BEAM). Secrets sync from Doppler project
# `twitch-ingress` (config prd) via the operator; the token secret
# `twitch-ingress-doppler-token` is created out-of-band, never committed.
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: twitch-ingress-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: twitch-ingress-doppler-token
  managedSecret:
    name: twitch-ingress-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
# Headless service: libcluster (Kubernetes.DNS strategy) resolves it to pod
# IPs to form the BEAM cluster. publishNotReadyAddresses lets nodes find each
# other before readiness, which is required for initial cluster formation.
apiVersion: v1
kind: Service
metadata:
  name: twitch-ingress-headless
  namespace: production
  annotations:
    config.linkerd.io/opaque-ports: "4369,9100-9110"
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: twitch-ingress
  ports:
    - name: epmd
      port: 4369
    - name: erlang-dist
      port: 9100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twitch-ingress
  namespace: production
  annotations:
    secrets.doppler.com/reload: "true"
spec:
  replicas: 3 # one per eligible hot-path node: node2, node3, worker1
  revisionHistoryLimit: 3
  # On SIGTERM each pod hands its conduit shards off make-before-break
  # (Ingress.Drain): the successor binds on a peer before the local socket
  # closes, so a rollout drops no events. Still hold each replacement pod
  # Ready for a full minute before killing the next old pod: the Horde
  # registry converges between swaps, keeping one drain in flight at a time
  # — the 2026-07-10 mid-stream incident was pods cycling within a minute of
  # each other, stacking registry races ("registry pick unreachable") into a
  # ~5 min chat outage.
  minReadySeconds: 60
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: twitch-ingress
  template:
    metadata:
      labels:
        app: twitch-ingress
      annotations:
        linkerd.io/inject: disabled
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 750m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 96Mi
        # Opaque ports for EPMD (4369) and Erlang distribution (9100-9110)
        # to prevent Linkerd protocol detection timeouts on server-speaks-first.
        config.linkerd.io/opaque-ports: "4369,9100-9110"
        # Skip outbound: 443 for the server-speaks-first Twitch EventSub wss://
        # sockets, and 4222 for NATS — now out of the mesh, so NATS-native TLS
        # provides the encryption and the proxy would otherwise tax every event.
        config.linkerd.io/skip-outbound-ports: "443,4222"
    spec:
      tolerations:
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      # node1 (2-core ARM) is reserved for stateful/frontend + infra; keep ingress
      # off it via nodeAffinity. Eligible nodes are node2/node3/worker1, and the
      # three replicas are spread one per eligible node in steady state.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [node1]
      topologySpreadConstraints:
        # matchLabelKeys scopes the skew to the CURRENT ReplicaSet: during a
        # maxSurge=0 roll the outgoing pods no longer count, so every rollout
        # re-spreads one-per-node instead of piling onto whichever node freed
        # capacity first (bit the ingress on 2026-07-10: 3/0/1). With three
        # replicas and three eligible nodes, maxSkew=1 plus DoNotSchedule makes
        # the steady-state placement exactly 1/1/1.
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          matchLabelKeys: [pod-template-hash]
          labelSelector:
            matchLabels:
              app: twitch-ingress
      # Resolve external hosts (Twitch EventSub/Helix) without the cluster
      # search-domain fan-out (ndots:1) and serialize A/AAAA to dodge the
      # conntrack race; cap any DNS stall well under a few seconds.
      dnsConfig:
        options:
          - {name: ndots, value: "1"}
          - {name: single-request-reopen}
          - {name: timeout, value: "2"}
          - {name: attempts, value: "2"}
      securityContext:
        runAsNonRoot: true
        runAsUser: 999 # the image's `ingress` user; numeric so kubelet can verify
        runAsGroup: 999
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: ingress
          image: ghcr.io/adamousmer/itsbagelbot/twitch-ingress:main-1784147714-7c85f544506e@sha256:5c7b95a3b7f20662583566414dce8a89103979f99efb51e5c37e63b99507bed9 # {"$imagepolicy": "flux-system:twitch-ingress"}
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: twitch-ingress-env
          env:
            - name: NATS_HOST
              value: nats
            # The RPC plane (:gnat) stays on the node-local leaf. The BUS firehose
            # plane (:gnat_bus) connects DIRECT to the hub member leading
            # TWITCH_INGRESS (placement-pinned to nats-0 by the stream contract):
            # the leaf runs no JetStream, and the PreferSameNode `nats` Service
            # would land pods on a non-leader member, paying an intra-hub route
            # hop per publish and PubAck. The per-pod headless name is a hub cert
            # SAN, follows the pod across nodes, and loses no availability — an
            # R1 stream is down with its pinned peer no matter which member the
            # client dialed. A hub roll re-pins the BUS connection (Gnat
            # reconnect); the RPC path is unaffected.
            - name: NATS_LEAF_HOST
              value: nats-leaf
            - name: NATS_HUB_HOST
              value: nats-0.nats-headless.production.svc.cluster.local
            # Fleet CA (trust-manager fleet-ca ConfigMap) to verify the NATS server
            # TLS cert now that NATS is out of the Linkerd mesh; decoded to ssl_opts
            # cacerts in config/runtime.exs. Both :gnat (leaf) and :gnat_bus (hub)
            # verify against it.
            - name: NATS_CA_PEM
              valueFrom:
                configMapKeyRef:
                  name: fleet-ca
                  key: ca.pem
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # Worker node (machine) the pod is scheduled on, surfaced to the
            # admin console so shard cards show the host name, not the pod IP.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: RELEASE_DISTRIBUTION
              value: name
            - name: RELEASE_NODE
              value: ingress@$(POD_IP)
            - name: RELEASE_COOKIE
              valueFrom:
                secretKeyRef:
                  name: twitch-ingress-env
                  key: BAGELBOT_ERLANG_COOKIE
            - name: NEW_RELIC_APP_NAME
              value: "ItsBagelBot-Ingress"
            - name: NEW_RELIC_LOGS_IN_CONTEXT
              value: "forwarder"
            - name: INGRESS_DISPATCHER_MAX_RUNNING
              value: "512"
            - name: INGRESS_DISPATCHER_MAX_QUEUE
              value: "20000"
            # Shipped inert (above max_running+max_queue's realistic reach) for
            # burn-in; tighten to "2048" once the new broadcaster_cap drop
            # metric shows real per-broadcaster admission patterns in prod.
            - name: INGRESS_DISPATCHER_MAX_PER_BROADCASTER
              value: "16000"
            # Scheduler-local JetStream cohorts collect for at most 1ms. The
            # publisher is structurally dedup-free, so no environment toggle
            # can accidentally restore the broker's Nats-Msg-Id index tax.
            - name: INGRESS_PUBLISH_BATCH_SIZE
              value: "128"
            - name: INGRESS_PUBLISH_BATCH_WAIT_MS
              value: "1"
            # Match normal and dirty schedulers to the two-CPU cgroup below.
            # `short` normal-scheduler busy-wait was modestly faster than
            # `none` across repeated direct-dispatch runs, while dirty
            # schedulers stay at `none` because ingress does no sustained dirty
            # NIF work. More than two schedulers only creates cgroup contention
            # on this three-replica deployment.
            - name: ERL_FLAGS
              # Range, not a single port: probe/remote-shell hidden nodes
              # need their own listen port besides the main VM's.
              value: >-
                +S 2:2 +SDcpu 2:2 +SDio 2 +sbwt short +sbwtdcpu none +sbwtdio none -kernel inet_dist_listen_min 9100 -kernel inet_dist_listen_max 9110
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              exec:
                # Delay SIGTERM so cluster membership settles before the BEAM
                # starts its shard drain (Ingress.Drain runs in prep_stop on
                # SIGTERM: successor binds on a peer, then the local socket
                # closes). Drain (~12s worst case) + this sleep must stay
                # inside terminationGracePeriodSeconds.
                command: ["/bin/sh", "-c", "sleep 10"]
          livenessProbe:
            exec:
              command: ["/app/bin/ingress", "pid"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["/app/bin/ingress", "pid"]
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
      terminationGracePeriodSeconds: 45
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: twitch-ingress
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: twitch-ingress
