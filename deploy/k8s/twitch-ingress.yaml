# Twitch Ingress (Elixir/BEAM). Secrets sync from Doppler project
# `twitch-ingress` (config prd) via the operator; the token secret
# `twitch-ingress-doppler-token` is created out-of-band, never committed.
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: twitch-ingress-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: twitch-ingress-doppler-token
  managedSecret:
    name: twitch-ingress-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
# Headless service: libcluster (Kubernetes.DNS strategy) resolves it to pod
# IPs to form the BEAM cluster. publishNotReadyAddresses lets nodes find each
# other before readiness, which is required for initial cluster formation.
apiVersion: v1
kind: Service
metadata:
  name: twitch-ingress-headless
  namespace: production
  annotations:
    config.linkerd.io/opaque-ports: "4369,9100-9110"
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: twitch-ingress
  ports:
    - name: epmd
      port: 4369
    - name: erlang-dist
      port: 9100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twitch-ingress
  namespace: production
  annotations:
    secrets.doppler.com/reload: "true"
spec:
  replicas: 5 # enforced even spread across node1/2/3/worker1 (2,1,1,1) via hard topology spread below
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: twitch-ingress
  template:
    metadata:
      labels:
        app: twitch-ingress
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 750m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 96Mi
        # Opaque ports for EPMD (4369) and Erlang distribution (9100-9110)
        # to prevent Linkerd protocol detection timeouts on server-speaks-first.
        config.linkerd.io/opaque-ports: "4369,9100-9110"
        # Skip outbound port 443 to prevent mesh interference with the
        # server-speaks-first Twitch EventSub wss:// sockets.
        config.linkerd.io/skip-outbound-ports: "443"
    spec:
      tolerations:
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      # Enforced even spread (maxSkew 1, DoNotSchedule): 5 pods across 4 nodes
      # lands 2,1,1,1 and never piles onto one node. The previous soft spread
      # plus a worker-pool nodeAffinity preference let the scheduler's
      # least-allocated scoring put ALL pods on worker1 (the bandwidth-capped,
      # LAN-isolated worker node), defeating HA and closest-node routing. The
      # worker-pool preference is removed; the toleration stays so worker1 still
      # carries its share. maxSkew 1 stays satisfiable even if one node is
      # transiently unschedulable (5 pods on 3 nodes = 2,2,1, skew 1).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: twitch-ingress
      # Resolve external hosts (Twitch EventSub/Helix) without the cluster
      # search-domain fan-out (ndots:1) and serialize A/AAAA to dodge the
      # conntrack race; cap any DNS stall well under a few seconds.
      dnsConfig:
        options:
          - {name: ndots, value: "1"}
          - {name: single-request-reopen}
          - {name: timeout, value: "2"}
          - {name: attempts, value: "2"}
      securityContext:
        runAsNonRoot: true
        runAsUser: 999 # the image's `ingress` user; numeric so kubelet can verify
        runAsGroup: 999
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: ingress
          image: ghcr.io/adamousmer/itsbagelbot/twitch-ingress:main-1782826151-583725a4e4b9@sha256:23554a1a1415a6799469d697935a9f1b8eccbf73383926c2c25ad9c92a6e36c4 # {"$imagepolicy": "flux-system:twitch-ingress"}
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: twitch-ingress-env
          env:
            - name: NATS_HOST
              value: nats
            # Apps connect only to the node-local leaf cluster; the hub is reached
            # over the leafnode link. No hub host, so a leaf roll can't pin to hub.
            - name: NATS_LEAF_HOST
              value: nats-leaf
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # Worker node (machine) the pod is scheduled on, surfaced to the
            # admin console so shard cards show the host name, not the pod IP.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: RELEASE_DISTRIBUTION
              value: name
            - name: RELEASE_NODE
              value: ingress@$(POD_IP)
            - name: RELEASE_COOKIE
              valueFrom:
                secretKeyRef:
                  name: twitch-ingress-env
                  key: BAGELBOT_ERLANG_COOKIE
            - name: NEW_RELIC_APP_NAME
              value: "ItsBagelBot-Ingress"
            - name: NEW_RELIC_LOGS_IN_CONTEXT
              value: "forwarder"
            - name: INGRESS_DISPATCHER_MAX_RUNNING
              value: "64"
            - name: INGRESS_DISPATCHER_MAX_QUEUE
              value: "2000"
            # The BEAM sizes schedulers from the host's logical CPUs, not the
            # cgroup quota. Cap schedulers to the CPU limit below and disable
            # scheduler busy-waiting so idle spinning never eats host cores.
            - name: ERL_FLAGS
              # Range, not a single port: probe/remote-shell hidden nodes
              # need their own listen port besides the main VM's.
              value: >-
                +S 2:2 +SDio 4 +sbwt none +sbwtdcpu none +sbwtdio none -kernel inet_dist_listen_min 9100 -kernel inet_dist_listen_max 9110
          resources:
            requests:
              cpu: 50m
              memory: 192Mi
            limits:
              cpu: "2"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              exec:
                # Grace period for Linkerd and kube-proxy to drain this endpoint
                # before SIGTERM fires. Horde redistributes shards during this window.
                command: ["/bin/sh", "-c", "sleep 10"]
          livenessProbe:
            exec:
              command: ["/app/bin/ingress", "pid"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["/app/bin/ingress", "pid"]
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
      terminationGracePeriodSeconds: 45
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: twitch-ingress
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: twitch-ingress
