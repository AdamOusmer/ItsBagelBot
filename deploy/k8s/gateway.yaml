# gateway: the fleet's external-API gateway. Sesame requests third-party data
# (urchin.gg Coral, MCSR Ranked, fortnite-api.com) over NATS RPC
# (bagel.rpc.gateway.>); the gateway fetches, normalizes, and caches replies in
# Valkey. It is the only app that dials those external hosts.
#
# gateway-env (Doppler) carries VALKEY_*, URCHIN_API_KEY (provider disabled
# without it), optional MCSR_API_KEY, NEW_RELIC_*, and the NATS_RPC_USER /
# NATS_RPC_PASSWORD pair for the GATEWAY_RPC account. The fortnite provider
# stays dark until FORTNITE_ENABLED=true is set there; keyless it runs
# shop-only (!store via fortnite-api.com's public shop), and FORTNITE_API_KEY
# (an api-fortnite.com key) additionally lights !fnstats. The "season" stats
# window auto-resolves the season start from the stats upstream hourly;
# FORTNITE_SEASON_START_UNIX optionally overrides it manually.
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: gateway-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: gateway-doppler-token
  managedSecret:
    name: gateway-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: production
  annotations:
    secrets.doppler.com/reload: "true"
spec:
  # Stateless and cache-backed: keep one local RPC responder beside Sesame on
  # each hot-path node; the working set is one HTTP client and Valkey connection.
  replicas: 3
  revisionHistoryLimit: 3
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
      annotations:
        linkerd.io/inject: disabled
        # NATS is out of the Linkerd mesh: bypass the app-side proxy for the NATS
        # client port so the firehose / RPC traffic goes direct (NATS-native TLS
        # provides the encryption). Without this the proxy still taxes every event.
        config.linkerd.io/skip-outbound-ports: "4222"
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 750m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 96Mi
    spec:
      tolerations:
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [node1]
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: gateway
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          matchLabelKeys: [pod-template-hash]
          labelSelector:
            matchLabels:
              app: gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: gateway
          image: ghcr.io/adamousmer/itsbagelbot/gateway:main-1784706178-f2e7f2b19fc7@sha256:e3766f9e8312835dba60978d36eeab6fcc702996a69ff8cc1688d29580b1f6d7 # {"$imagepolicy": "flux-system:gateway"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
            # Split planes: the BUS / JetStream connection dials the hub directly
            # (NATS_HUB_URL) so stream traffic never pays a leaf forwarding hop;
            # the RPC + cache plane (NATS_RPC_URL / NATS_LEAF_URL) stays on the
            # node-local leaf. NATS_URL is the local-dev fallback only.
            - name: NATS_URL
              value: nats://nats-leaf:4222
            - name: NATS_HUB_URL
              value: nats://nats:4222
            # Fleet CA (trust-manager fleet-ca ConfigMap) to verify the NATS server
            # TLS cert now that NATS is out of the Linkerd mesh; read as RootCAs by
            # pkg/bus (Go services) and the console nats lib (TS).
            - name: NATS_CA_PEM
              valueFrom:
                configMapKeyRef:
                  name: fleet-ca
                  key: ca.pem
            - name: VALKEY_TLS_CA_PEM
              valueFrom:
                configMapKeyRef:
                  name: fleet-ca
                  key: ca.pem
            - name: VALKEY_TLS_SERVER_NAME
              value: valkey.valkey.svc.cluster.local
            - name: NATS_RPC_URL
              value: nats://nats-leaf:4222
            - name: NATS_LEAF_URL
              value: nats://nats-leaf:4222
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Node-local Valkey TLS reads stay on the pod network; writes ride Sentinel.
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: VALKEY_LOCAL_ADDR
              value: valkey-local.valkey.svc.cluster.local:6380
            - name: GOMEMLIMIT
              value: 96MiB
          envFrom:
            - secretRef:
                name: gateway-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              httpGet:
                path: /drain
                port: 8080
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            failureThreshold: 18 # 18 × 5s = 90s max startup window
            periodSeconds: 5
      terminationGracePeriodSeconds: 45
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: gateway
