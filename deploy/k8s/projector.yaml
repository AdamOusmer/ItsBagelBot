apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: projector-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: projector-doppler-token
  managedSecret:
    name: projector-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: projector
  namespace: production
spec:
  revisionHistoryLimit: 3
  minReadySeconds: 10
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: projector
  template:
    metadata:
      labels:
        app: projector
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 750m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 96Mi
        config.linkerd.io/skip-outbound-ports: 6379,26379
    spec:
      # DaemonSet placement keeps one projector pod per schedulable node.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: projector
          image: ghcr.io/adamousmer/itsbagelbot/projector:main-1781851278-01bbaee99c6e@sha256:59eccf2a327cdee13dba74224f616f946b822f7d6404f50765526d5185e8961b # {"$imagepolicy": "flux-system:projector"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
            - name: NATS_URL
              value: nats://nats:4222
            - name: NATS_RPC_URL
              value: nats://nats-leaf:4222
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: NATS_PROJECTOR_DASHBOARD_SUBJECT_PREFIX
              value: bagel.rpc.projector.dashboard
            - name: PROJECTOR_WRITE_CONCURRENCY
              value: "8"
            - name: GOMEMLIMIT
              value: 256MiB
          envFrom:
            - secretRef:
                name: projector-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1500m
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              httpGet:
                path: /drain
                port: 8080
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            failureThreshold: 18
            periodSeconds: 5
      terminationGracePeriodSeconds: 45
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: projector
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: projector
