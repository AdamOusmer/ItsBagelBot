apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: projector-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: projector-doppler-token
  managedSecret:
    name: projector-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: projector
  namespace: production
  annotations:
    secrets.doppler.com/reload: "true"
spec:
  replicas: 3 # one per node; 3 schedulable nodes incl worker1 (tolerates worker-pool); node3 decommissioned
  revisionHistoryLimit: 3
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: projector
  template:
    metadata:
      labels:
        app: projector
      annotations:
        linkerd.io/inject: disabled
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 750m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 96Mi
        # Valkey (6379/26379) and NATS (4222 — now out of the mesh, its own TLS
        # encrypts the wire) skip the proxy.
        config.linkerd.io/skip-outbound-ports: 6379,26379,4222
    spec:
      tolerations:
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: projector
      # DaemonSet placement keeps one projector pod per schedulable node.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: projector
          image: ghcr.io/adamousmer/itsbagelbot/projector:main-1783909337-fa7af3c6f9a1@sha256:a75f2b8668bb1e82df1ae541d29fd38a8c02ca802ef52d95a97e73666659027b # {"$imagepolicy": "flux-system:projector"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
            # Split planes: the BUS / JetStream connection dials the hub directly
            # (NATS_HUB_URL) so stream traffic never pays a leaf forwarding hop;
            # the RPC + cache plane (NATS_RPC_URL / NATS_LEAF_URL) stays on the
            # node-local leaf. NATS_URL is the local-dev fallback only.
            - name: NATS_URL
              value: nats://nats-leaf:4222
            - name: NATS_HUB_URL
              value: nats://nats:4222
            # Fleet CA (trust-manager fleet-ca ConfigMap) to verify the NATS server
            # TLS cert now that NATS is out of the Linkerd mesh; read as RootCAs by
            # pkg/bus (Go services) and the console nats lib (TS).
            - name: NATS_CA_PEM
              valueFrom:
                configMapKeyRef:
                  name: fleet-ca
                  key: ca.pem
            - name: VALKEY_TLS_CA_PEM
              valueFrom:
                configMapKeyRef:
                  name: fleet-ca
                  key: ca.pem
            - name: VALKEY_TLS_SERVER_NAME
              value: valkey.valkey.svc.cluster.local
            - name: NATS_RPC_URL
              value: nats://nats-leaf:4222
            - name: NATS_LEAF_URL
              value: nats://nats-leaf:4222
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: NATS_PROJECTOR_DASHBOARD_SUBJECT_PREFIX
              value: bagel.rpc.projector.dashboard
            - name: PROJECTOR_WRITE_CONCURRENCY
              value: "8"
            # Stream-online refreshes keep a full settings snapshot warm for a
            # day. Dashboard command/module reads hydrate missing sections in
            # the background with a shorter two-hour retention window.
            - name: PROJECTOR_LIVE_HYDRATION_TTL
              value: 24h
            - name: PROJECTOR_QUERY_HYDRATION_TTL
              value: 2h
            - name: PROJECTOR_HYDRATION_CONCURRENCY
              value: "8"
            - name: GOMEMLIMIT
              value: 256MiB
          envFrom:
            - secretRef:
                name: projector-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 750m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              httpGet:
                path: /drain
                port: 8080
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            failureThreshold: 18
            periodSeconds: 5
      terminationGracePeriodSeconds: 45
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: projector
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: projector
