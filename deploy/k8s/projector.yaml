apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: projector-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: projector-doppler-token
  managedSecret:
    name: projector-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: projector
  namespace: production
  annotations:
    secrets.doppler.com/reload: "true"
spec:
  replicas: 4 # one per node; 4 schedulable nodes incl worker1 (tolerates worker-pool)
  revisionHistoryLimit: 3
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: projector
  template:
    metadata:
      labels:
        app: projector
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 750m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 96Mi
        config.linkerd.io/skip-outbound-ports: 6379,26379
    spec:
      tolerations:
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: projector
      # DaemonSet placement keeps one projector pod per schedulable node.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: projector
          image: ghcr.io/adamousmer/itsbagelbot/projector:main-1782989625-a17180d59ed0@sha256:7b71d131de5efb1b6f7b9cecf5abb7be8a4ebb574b1c9c6285a0d363d4ab6df9 # {"$imagepolicy": "flux-system:projector"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
            # Apps connect only to the node-local leaf cluster (4-node HA); the
            # hub is reached over the leafnode link for JetStream. No hub in the
            # server list, so a leaf roll can never pin a client to the hub.
            - name: NATS_URL
              value: nats://nats-leaf:4222
            - name: NATS_RPC_URL
              value: nats://nats-leaf:4222
            - name: NATS_LEAF_URL
              value: nats://nats-leaf:4222
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: NATS_PROJECTOR_DASHBOARD_SUBJECT_PREFIX
              value: bagel.rpc.projector.dashboard
            - name: PROJECTOR_WRITE_CONCURRENCY
              value: "8"
            # Stream-online refreshes keep a full settings snapshot warm for a
            # day. Dashboard command/module reads hydrate missing sections in
            # the background with a shorter two-hour retention window.
            - name: PROJECTOR_LIVE_HYDRATION_TTL
              value: 24h
            - name: PROJECTOR_QUERY_HYDRATION_TTL
              value: 2h
            - name: PROJECTOR_HYDRATION_CONCURRENCY
              value: "8"
            - name: GOMEMLIMIT
              value: 256MiB
          envFrom:
            - secretRef:
                name: projector-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1500m
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              httpGet:
                path: /drain
                port: 8080
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            failureThreshold: 18
            periodSeconds: 5
      terminationGracePeriodSeconds: 45
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: projector
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: projector
