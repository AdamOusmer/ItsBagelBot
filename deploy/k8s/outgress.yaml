apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: outgress-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: outgress-doppler-token
  managedSecret:
    name: outgress-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outgress
  namespace: production
  annotations:
    secrets.doppler.com/reload: "true"
spec:
  replicas: 4 # one per node; 4 schedulable nodes incl worker1 (tolerates worker-pool)
  revisionHistoryLimit: 3
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: outgress
  template:
    metadata:
      labels:
        app: outgress
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 1000m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 128Mi
        # Valkey (6379/26379) and the Twitch Helix egress (443) skip the proxy.
        # Outgress's hot path is a synchronous POST to api.twitch.tv; routing it
        # through the linkerd sidecar adds a proxy hop per send for an external,
        # already-TLS destination the mesh cannot mTLS anyway. twitch-ingress
        # skips 443 for the same reason.
        config.linkerd.io/skip-outbound-ports: 6379,26379,443
    spec:
      tolerations:
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: outgress
      # DaemonSet placement keeps one outgress pod per schedulable node.
      # Resolving api.twitch.tv is on the hot path. With the default ndots:5 the
      # external FQDN first fans out into cluster-domain queries (…svc.cluster.local
      # etc.), each a chance to hit the cross-node DNS stall; ndots:1 sends the
      # absolute name first. A shorter timeout with a retry caps a stall well under
      # the 5s outgress message lifetime instead of blowing it.
      dnsConfig:
        options:
          - {name: ndots, value: "1"}
          - {name: single-request-reopen}
          - {name: timeout, value: "2"}
          - {name: attempts, value: "2"}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: outgress
          image: ghcr.io/adamousmer/itsbagelbot/outgress:main-1782831719-2829009df0e1@sha256:ec8677d1611f6f37b3efd2a3ac73369235d81aa0ade7ddd27710e34c5f38fb28 # {"$imagepolicy": "flux-system:outgress"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
            # Apps connect only to the node-local leaf cluster (4-node HA); the
            # hub is reached over the leafnode link for JetStream. No hub in the
            # server list, so a leaf roll can never pin a client to the hub.
            - name: NATS_URL
              value: nats://nats-leaf:4222
            - name: NATS_RPC_URL
              value: nats://nats-leaf:4222
            - name: NATS_LEAF_URL
              value: nats://nats-leaf:4222
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: GOMEMLIMIT
              value: 512MiB
            - name: OUTGRESS_MIN_ROUTINES
              value: "8"
            - name: OUTGRESS_MAX_ROUTINES
              value: "48"
            - name: OUTGRESS_MAX_CONSUMERS
              value: "3"
            - name: OUTGRESS_SCALE_UP_AFTER
              value: 1s
            - name: OUTGRESS_SCALE_DOWN_AFTER
              value: 60s
            - name: OUTGRESS_PREMIUM_RESERVE_PERCENT
              value: "25"
            - name: OUTGRESS_SYSTEM_WORKERS
              value: "4"
            # Use the scheduled node as the conservative locality boundary.
            # Kubernetes cannot expose a node topology label through the
            # downward API, and the fleet intentionally runs one outgress pod
            # per node. Distinct node localities therefore use the safe remote
            # peer-borrow timeout instead of misclassifying WAN peers as local.
            # This is operational identity, not a secret, so do not make pod
            # startup depend on Doppler carrying it.
            - name: OUTGRESS_REGION
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
                  # Remaining lease tuning (minimum members, replicas, epoch, etc.)
                  # may be supplied by outgress-env via Doppler.
          envFrom:
            - secretRef:
                name: outgress-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              httpGet:
                path: /drain
                port: 8080
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            failureThreshold: 18
            periodSeconds: 5
      terminationGracePeriodSeconds: 45
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: outgress
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: outgress
