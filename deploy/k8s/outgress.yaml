apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: outgress-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: outgress-doppler-token
  managedSecret:
    name: outgress-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outgress
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: outgress
  template:
    metadata:
      labels:
        app: outgress
      annotations:
        linkerd.io/inject: enabled
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: outgress
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - outgress
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: outgress
          image: ghcr.io/adamousmer/itsbagelbot/outgress:main-1781685725-d58d94486af0@sha256:4c575ab53756a953611bb8c502c3490cefd223c259eb13c8113a265a50e84123 # {"$imagepolicy": "flux-system:outgress"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
          envFrom:
            - secretRef:
                name: outgress-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 5m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 10
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: outgress
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: outgress
