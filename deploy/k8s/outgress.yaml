apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: outgress-env
  namespace: production
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: outgress-doppler-token
  managedSecret:
    name: outgress-env
    namespace: production
    type: Opaque
  resyncSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outgress
  namespace: production
  annotations:
    secrets.doppler.com/reload: "true"
spec:
  replicas: 3 # one per node; bump to match schedulable node count
  revisionHistoryLimit: 3
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: outgress
  template:
    metadata:
      labels:
        app: outgress
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-cpu-request: 5m
        config.linkerd.io/proxy-cpu-limit: 1000m
        config.linkerd.io/proxy-memory-request: 16Mi
        config.linkerd.io/proxy-memory-limit: 128Mi
        config.linkerd.io/skip-outbound-ports: 6379,26379
    spec:
      tolerations:
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: outgress
      # DaemonSet placement keeps one outgress pod per schedulable node.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: outgress
          image: ghcr.io/adamousmer/itsbagelbot/outgress:main-1781860502-318e9aeb0bc7@sha256:003d0b7f3f3946e4f58747056f5d71a391f9bac4137e8777d54896ea6abf2bc7 # {"$imagepolicy": "flux-system:outgress"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_HOST
              value: nats
            - name: NATS_URL
              value: nats://nats:4222
            - name: NATS_RPC_URL
              value: nats://nats-leaf:4222
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: GOMEMLIMIT
              value: 512MiB
            - name: OUTGRESS_MIN_ROUTINES
              value: "8"
            - name: OUTGRESS_MAX_ROUTINES
              value: "48"
            - name: OUTGRESS_MAX_CONSUMERS
              value: "3"
            - name: OUTGRESS_SCALE_UP_AFTER
              value: 1s
            - name: OUTGRESS_SCALE_DOWN_AFTER
              value: 60s
            - name: OUTGRESS_PREMIUM_RESERVE_PERCENT
              value: "25"
            - name: OUTGRESS_SYSTEM_WORKERS
              value: "4"
          envFrom:
            - secretRef:
                name: outgress-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          lifecycle:
            preStop:
              httpGet:
                path: /drain
                port: 8080
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            failureThreshold: 18
            periodSeconds: 5
      terminationGracePeriodSeconds: 45
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: outgress
  namespace: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: outgress
