port: 4222
http_port: 8222
max_connections: 512
max_payload: 8MB
max_pending: 64MB
write_deadline: "2s"
ping_interval: "20s"
ping_max: 3

tls {
  cert_file: "/etc/nats/certs/tls.crt"
  key_file: "/etc/nats/certs/tls.key"
  ca_file: "/etc/nats/certs/ca.crt"
  min_version: "1.2"
  timeout: 2
}

max_subscriptions: 0
max_control_line: 4KB
include "/etc/nats/auth/auth.conf"
