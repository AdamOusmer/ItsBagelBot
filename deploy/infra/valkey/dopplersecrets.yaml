# Doppler-managed secrets for Valkey. The operator syncs these from Doppler
# into the named k8s Secrets every resyncSeconds; workloads that mount them and
# carry the secrets.doppler.com/reload annotation are rolled on change.
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: doppler-valkey-core
  namespace: valkey
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: infra-valkey-core-doppler-token
  managedSecret:
    name: valkey-core-secret
    namespace: valkey
    type: Opaque
  processors:
    VALKEY_CORE_PASSWORD:
      asName: valkey-password
      type: plain
  resyncSeconds: 60
  verifyTLS: true
---
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: doppler-valkey-users
  namespace: valkey
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: infra-valkey-users-doppler-token
  managedSecret:
    name: valkey-users-secret
    namespace: valkey
    type: Opaque
  processors:
    VALKEY_USERS_ACL:
      asName: users.acl
      type: plain
  resyncSeconds: 60
  verifyTLS: true
