apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: valkey

# This is deliberately an unpartitioned Sentinel topology. The actual Valkey
# settings live in config/valkey.conf and are repeated as authoritative
# container flags for retained PVCs. topology_test.go is discovered by the
# repository's normal `go test ./...` CI run and rejects configuration drift.
resources:
  - benchmark-priority-class.yaml
  - services.yaml
  - pdb.yaml
  - dopplersecrets.yaml
  - statefulset.yaml

# Base config is generated with a content hash so any edit rolls the
# StatefulSet (kustomize rewrites the volume reference to the hashed name).
# Start/ping logic no longer lives in mounted scripts: valkey-server runs the
# seeded conf directly, stable StatefulSet DNS identities keep replication and
# Sentinel on the native WireGuard pod network, failover persistence is
# valkey's built-in CONFIG REWRITE, and probes are inline valkey-cli. A small
# initContainer seeds and migrates the writable /data conf.
configMapGenerator:
  - name: valkey-config
    files:
      - config/sentinel.conf
      - config/tuning.conf
      - config/valkey.conf
