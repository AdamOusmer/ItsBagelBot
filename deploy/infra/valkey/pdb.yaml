apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: valkey
  namespace: valkey
spec:
  # Quorum protection: four in-cluster Sentinels require three votes to
  # authorize a failover. Allowing only ONE voluntary disruption at a time
  # keeps that majority reachable.
  maxUnavailable: 1
  # Don't let the budget wedge a node drain when a valkey pod is already
  # unhealthy (e.g. crashlooping on flaky worker1): such pods are evictable
  # regardless of the budget, which lets them reschedule and recover.
  unhealthyPodEvictionPolicy: AlwaysAllow
  selector:
    matchLabels:
      app.kubernetes.io/component: node
      app.kubernetes.io/name: valkey
