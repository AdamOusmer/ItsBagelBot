port 0
# Native TLS is authoritative for clients and replication. Plaintext is
# disabled; every client, replica, and Sentinel reaches Valkey on 6380.
tls-port 6380
tls-cert-file /etc/valkey/tls/tls.crt
tls-key-file /etc/valkey/tls/tls.key
tls-ca-cert-file /etc/valkey/tls/ca.crt
tls-auth-clients no
tls-replication yes
bind 0.0.0.0
# This fleet is intentionally one Sentinel-managed keyspace, not Valkey
# Cluster. Keep replicas read-only so Sentinel is the only authority that can
# promote a writable primary. The StatefulSet repeats both values as command
# flags so an older CONFIG REWRITE on a retained PVC cannot override them.
cluster-enabled no
replica-read-only yes
loglevel notice
# Valkey 9.1 uses lock-free queues between the main thread and I/O workers.
# Two threads fit the 2-CPU container budget on the 6/8-core data-plane nodes;
# config-init reduces this to one on the 2-core node1 host until that replica is
# evacuated for the database role.
io-threads 2
# Bounded cache. maxmemory sits under the 2 GiB container limit to leave room
# for the replication backlog, COW, and buffers during AOF rewrite.
# volatile-lru evicts only keys that
# carry a TTL (cooldowns, live keys, cached projections) under pressure, so the
# ACL/persistent keys are never evicted; when only non-TTL keys remain, writes
# fail closed rather than dropping durable state.
maxmemory 512mb
maxmemory-policy volatile-lru
rename-command FLUSHDB ""
rename-command FLUSHALL ""
aclfile /secrets/users/users.acl
# ConfigMap-backed policy is deliberately included after retained state is
# reconciled by config-init, so updates apply to existing PVCs as well as new
# members. Node-specific io-threads and replica-priority are appended later.
include /config/tuning.conf
