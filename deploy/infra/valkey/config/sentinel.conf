port 0
# Sentinel clients, primary monitoring, and Sentinel peers use native TLS on
# 26380. Plaintext is disabled.
tls-port 26380
tls-cert-file /etc/valkey/tls/tls.crt
tls-key-file /etc/valkey/tls/tls.key
tls-ca-cert-file /etc/valkey/tls/ca.crt
tls-auth-clients no
tls-replication yes
# Monitor the primary by its stable StatefulSet DNS name. Replication, Sentinel
# gossip, failover and clients all stay on ClusterIP/pod addresses carried by
# Flannel's native WireGuard overlay; host and Tailscale addresses are not part
# of the Valkey data plane.
# The actual "sentinel monitor" line is appended dynamically at cold-start
# (see statefulset.yaml config-init) with node-0's stable pod DNS name — no
# static placeholder here, or sentinel fatals on duplicate.
sentinel down-after-milliseconds myprimary 5000
sentinel failover-timeout myprimary 60000
sentinel parallel-syncs myprimary 1
sentinel resolve-hostnames yes
sentinel announce-hostnames yes
