port 26379
# Monitor the master by its stable node Tailscale IP. The four in-cluster
# Sentinels and Valkey replicas use that same private node plane, which is also
# the cluster's CNI transport. Pods announce their node's Tailscale IP so a
# failover remains reachable across pod recreation.
# The actual "sentinel monitor" line is appended dynamically at cold-start
# (see statefulset.yaml config-init) with node-0's live hostIP looked up via
# the k8s API — no static placeholder here, or sentinel fatals on duplicate.
sentinel down-after-milliseconds myprimary 5000
sentinel failover-timeout myprimary 60000
sentinel parallel-syncs myprimary 1
sentinel resolve-hostnames yes
sentinel announce-hostnames no
