port 26379
# Monitor the master by node-0's stable Tailscale IP, not a pod IP or k8s FQDN.
# The external witness sentinel has only Tailscale (no linkerd, no cluster DNS),
# so it can only reach valkey/sentinel at the nodes' tailnet addresses. The
# in-cluster sentinels reach the same address over Tailscale (6379/26379 are
# linkerd skip-outbound). Pods announce their node's Tailscale IP, so after a
# failover sentinel tracks the new master by its tailnet address too.
# The actual "sentinel monitor" line is appended dynamically at cold-start
# (see statefulset.yaml config-init) with node-0's live hostIP looked up via
# the k8s API — no static placeholder here, or sentinel fatals on duplicate.
sentinel down-after-milliseconds myprimary 5000
sentinel failover-timeout myprimary 60000
sentinel parallel-syncs myprimary 1
sentinel resolve-hostnames yes
sentinel announce-hostnames no
