apiVersion: apps/v1
kind: StatefulSet
metadata:
  annotations:
    # One logical keyspace with one Sentinel-elected writable primary.
    itsbagelbot.dev/valkey-partitioning: disabled
    itsbagelbot.dev/valkey-topology: sentinel-single-primary
  labels:
    app.kubernetes.io/component: node
    app.kubernetes.io/instance: valkey
    app.kubernetes.io/name: valkey
  name: valkey-node
  namespace: valkey
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  # Parallel startup is required for a safe cold bootstrap: the pod placed on
  # node2 is the sole deterministic bootstrap candidate, while fresh members on
  # every other node wait for its Sentinel view. OrderedReady could deadlock the
  # fleet when ordinal zero is scheduled on a fenced node.
  podManagementPolicy: Parallel
  # Three colocated Valkey+Sentinel voters produce one writable primary and
  # two replicas, one per node since node1 left the fleet. This count is a
  # CI-enforced configuration invariant.
  replicas: 3
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/component: node
      app.kubernetes.io/instance: valkey
      app.kubernetes.io/name: valkey
  serviceName: valkey-headless
  template:
    metadata:
      annotations:
        # Replication and Sentinel announce stable StatefulSet DNS names over
        # Flannel's native WireGuard pod network. Valkey TLS provides
        # end-to-end identity and encryption on data port 6380 and Sentinel
        # port 26380; neither listener is exposed through a node hostPort.
        secrets.doppler.com/reload: 'true'
      labels:
        app.kubernetes.io/component: node
        app.kubernetes.io/instance: valkey
        app.kubernetes.io/name: valkey
    spec:
      # Seed the writable /data copies of valkey.conf and sentinel.conf ONCE.
      # After first boot valkey and sentinel own these files: valkey rewrites
      # replicaof on every Sentinel-driven failover and sentinel persists its
      # known peers/epoch, so a restarted pod reads its real current role from
      # /data instead of re-deriving it. Every member announces its stable
      # StatefulSet DNS identity, independent of the node it is scheduled on.
      initContainers:
      - name: config-init
        image: valkey/valkey@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -ec
        - |
          # Ask a live Sentinel before deriving any role. Stable pod DNS is
          # authoritative and node2 is the sole deterministic fresh-cluster
          # bootstrap candidate. Fresh pods on every other node wait for that
          # view, which avoids making an arbitrary StatefulSet ordinal primary.
          #
          # A retained fenced primary also waits until the remaining Sentinels
          # elect node2 or node3. Retained replicas may start immediately so
          # their colocated Sentinels can form the majority needed for failover.
          # This turns the placement policy into a fail-closed invariant instead
          # of relying on replica-priority, which only controls future elections.
          POD_FQDN="${POD_NAME}.valkey-headless.valkey.svc.cluster.local"
          lookup_master() {
            { REDISCLI_AUTH="${CORE}" valkey-cli -h valkey.valkey.svc.cluster.local -p 26380 --tls --cacert /etc/valkey/tls/ca.crt --sni valkey.valkey.svc.cluster.local --no-auth-warning sentinel get-master-addr-by-name myprimary 2>/dev/null || true; } \
              | head -n 1 | tr -d '"'
          }
          CONFIG_PRESENT=false
          if [ -f /data/valkey.conf ]; then
            CONFIG_PRESENT=true
          fi
          FENCED=true
          case "${NODE_NAME}" in
            node2|node3) FENCED=false ;;
          esac
          LIVE_MASTER=$(lookup_master)
          WAIT_FOR_PRIMARY=false
          if [ "${FENCED}" = "true" ]; then
            if [ "${CONFIG_PRESENT}" = "false" ] || ! grep -q '^replicaof ' /data/valkey.conf 2>/dev/null || [ "${LIVE_MASTER}" = "${POD_FQDN}" ]; then
              WAIT_FOR_PRIMARY=true
            fi
          elif [ "${CONFIG_PRESENT}" = "false" ] && [ "${NODE_NAME}" != "node2" ]; then
            WAIT_FOR_PRIMARY=true
          fi
          if [ "${WAIT_FOR_PRIMARY}" = "true" ]; then
            echo "Waiting for a node2/node3 Sentinel primary before starting ${POD_FQDN}"
            while [ -z "${LIVE_MASTER}" ] || { [ "${FENCED}" = "true" ] && [ "${LIVE_MASTER}" = "${POD_FQDN}" ]; }; do
              sleep 2
              LIVE_MASTER=$(lookup_master)
            done
          fi
          MASTER_ENDPOINT="${POD_FQDN}"
          if [ -n "${LIVE_MASTER}" ]; then
            MASTER_ENDPOINT="${LIVE_MASTER}"
          fi
          if [ ! -f /data/valkey.conf ]; then
            cp /config/valkey.conf /data/valkey.conf
            {
              echo "masterauth ${CORE}"
              echo "replica-announce-ip ${POD_FQDN}"
              echo "replica-announce-port 6380"
            } >> /data/valkey.conf
            # The only fresh member allowed to see an empty Sentinel view is the
            # pod placed on node2. It bootstraps itself; every other fresh member
            # has waited for and follows the discovered primary.
            if [ -n "${LIVE_MASTER}" ] && [ "${POD_FQDN}" != "${MASTER_ENDPOINT}" ]; then
              echo "replicaof ${MASTER_ENDPOINT} 6380" >> /data/valkey.conf
            fi
            chmod 600 /data/valkey.conf
          fi
          # Reconcile master eligibility on every boot. Retained PVCs may carry
          # a stale CONFIG REWRITE value, so only the explicit node2/node3
          # allowlist can remain eligible for Sentinel promotion. Every other
          # node, including worker1 and future unknown nodes, is fenced.
          sed -i '/^replica-priority /d' /data/valkey.conf
          case "${NODE_NAME}" in
            node2|node3)
              echo "replica-priority 100" >> /data/valkey.conf
              ;;
            *)
              echo "replica-priority 0" >> /data/valkey.conf
              ;;
          esac
          # Keep ConfigMap-backed runtime policy authoritative over retained
          # CONFIG REWRITE output. Moving the include to the end on every boot
          # makes a config change roll out without discarding Sentinel-owned
          # replication state in the writable file.
          sed -i '\|^include /config/tuning.conf$|d' /data/valkey.conf
          echo "include /config/tuning.conf" >> /data/valkey.conf
          # io-threads is deliberately reconciled on every boot instead of
          # only on fresh PVCs: CONFIG REWRITE persists old values.
          # Valkey 9.1 threads both reads and writes automatically; the former
          # io-threads-do-reads switch is deprecated and intentionally absent.
          sed -i '/^io-threads /d' /data/valkey.conf
          echo "io-threads 2" >> /data/valkey.conf
          # Reconcile this member's stable DNS identity before Valkey starts.
          sed -i '/^replica-announce-ip /d' /data/valkey.conf
          echo "replica-announce-ip ${POD_FQDN}" >> /data/valkey.conf
          # A planned failover may have changed the live primary after Valkey's
          # last CONFIG REWRITE. When Sentinel answered above, its current view
          # is authoritative: the primary must have no replicaof line and every
          # other member must follow that stable DNS endpoint.
          if [ -n "${LIVE_MASTER}" ]; then
            sed -i '/^replicaof /d' /data/valkey.conf
            if [ "${POD_FQDN}" != "${MASTER_ENDPOINT}" ]; then
              echo "replicaof ${MASTER_ENDPOINT} 6380" >> /data/valkey.conf
            fi
          fi
          # Retained PVCs carry Sentinel-rewritten topology. Move those live
          # addresses to the TLS listeners before either process starts; doing
          # this in config-init makes the migration repeatable after restores.
          sed -i -E \
            -e 's/^(replica-announce-port) 6379$/\1 6380/' \
            -e 's/^(replicaof [^ ]+) 6379$/\1 6380/' \
            /data/valkey.conf
          if [ ! -f /data/sentinel.conf ]; then
            cp /config/sentinel.conf /data/sentinel.conf
            {
              echo "requirepass ${CORE}"
              echo "sentinel auth-pass myprimary ${CORE}"
              echo "sentinel announce-ip ${POD_FQDN}"
              echo "sentinel announce-port 26380"
              echo "sentinel monitor myprimary ${MASTER_ENDPOINT} 6380 2"
            } >> /data/sentinel.conf
            chmod 600 /data/sentinel.conf
          fi
          sed -i '/^sentinel announce-ip /d' /data/sentinel.conf
          echo "sentinel announce-ip ${POD_FQDN}" >> /data/sentinel.conf
          sed -i '/^sentinel resolve-hostnames /d; /^sentinel announce-hostnames /d' /data/sentinel.conf
          {
            echo "sentinel resolve-hostnames yes"
            echo "sentinel announce-hostnames yes"
          } >> /data/sentinel.conf
          sed -i -E \
            -e 's/^(sentinel announce-port) 26379$/\1 26380/' \
            -e 's/^(sentinel monitor myprimary [^ ]+) 6379 (.+)$/\1 6380 \2/' \
            -e 's/^(sentinel known-replica myprimary [^ ]+) 6379$/\1 6380/' \
            -e 's/^(sentinel known-sentinel myprimary [^ ]+) 26379 (.+)$/\1 26380 \2/' \
            /data/sentinel.conf
          # A mixed-listener rollout can leave both the old endpoint and the
          # newly auto-discovered TLS endpoint in Sentinel's persisted state.
          # Port migration collapses those into the same address, which 9.1
          # correctly rejects as a duplicate. Keep the first stable identity;
          # Sentinel refreshes run IDs and topology through hello messages.
          awk '
            $1 == "sentinel" && ($2 == "known-replica" || $2 == "known-sentinel") && $3 == "myprimary" {
              endpoint = $2 FS $4 FS $5
              if (seen[endpoint]++) next
            }
            { print }
          ' /data/sentinel.conf > /data/sentinel.conf.dedup
          mv /data/sentinel.conf.dedup /data/sentinel.conf
          chmod 600 /data/sentinel.conf
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: CORE
          valueFrom:
            secretKeyRef:
              key: valkey-password
              name: valkey-core-secret
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 999
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - mountPath: /data
          name: valkey-data
        - mountPath: /config
          name: valkey-config
          readOnly: true
        - mountPath: /etc/valkey/tls
          name: valkey-tls
          readOnly: true
      containers:
      # valkey-server runs the seeded /data/valkey.conf directly. masterauth and
      # the stable StatefulSet DNS identity come in as flags from the downward
      # API / secret so topology never depends on a node address.
      - command:
        - valkey-server
        - /data/valkey.conf
        - --replica-announce-ip
        - $(POD_NAME).valkey-headless.valkey.svc.cluster.local
        - --replica-announce-port
        - "6380"
        - --masterauth
        - $(CORE)
        # Keep the fleet unpartitioned and replicas read-only. These flags are
        # authoritative over retained /data/valkey.conf files that Valkey may
        # have rewritten before the policy was committed to the repository.
        - --cluster-enabled
        - "no"
        - --replica-read-only
        - "yes"
        # Command-line policy is authoritative even for retained PVC configs
        # written before these limits existed. This fixes failover replicas
        # that were still maxmemory=0/noeviction while preserving their role.
        - --maxmemory
        - 512mb
        - --maxmemory-policy
        - volatile-lru
        # Retained PVCs may contain an older plaintext port. Command-line
        # policy is authoritative so a restore cannot reopen it.
        - --port
        - "0"
        - --tls-port
        - "6380"
        - --tls-cert-file
        - /etc/valkey/tls/tls.crt
        - --tls-key-file
        - /etc/valkey/tls/tls.key
        - --tls-ca-cert-file
        - /etc/valkey/tls/ca.crt
        - --tls-auth-clients
        - "no"
        - --tls-replication
        - "yes"
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: CORE
          valueFrom:
            secretKeyRef:
              key: valkey-password
              name: valkey-core-secret
        - name: REDISCLI_AUTH
          valueFrom:
            secretKeyRef:
              key: valkey-password
              name: valkey-core-secret
        image: valkey/valkey@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - valkey-cli
            - -p
            - "6380"
            - --tls
            - --cacert
            - /etc/valkey/tls/ca.crt
            - --sni
            - valkey.valkey.svc.cluster.local
            - ping
          failureThreshold: 3
          initialDelaySeconds: 20
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        name: valkey
        ports:
        - containerPort: 6380
          name: redis-tls
          protocol: TCP
        readinessProbe:
          exec:
            command:
            - valkey-cli
            - -p
            - "6380"
            - --tls
            - --cacert
            - /etc/valkey/tls/ca.crt
            - --sni
            - valkey.valkey.svc.cluster.local
            - ping
          failureThreshold: 3
          initialDelaySeconds: 10
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 3
        startupProbe:
          exec:
            command:
            - valkey-cli
            - -p
            - "6380"
            - --tls
            - --cacert
            - /etc/valkey/tls/ca.crt
            - --sni
            - valkey.valkey.svc.cluster.local
            - ping
          failureThreshold: 30
          periodSeconds: 2
          timeoutSeconds: 3
        resources:
          limits:
            cpu: '2'
            # 512 MiB maxmemory + 128 MiB replication backlog still need room
            # for allocator overhead, TLS buffers, AOF fork/COW and full sync.
            # A 2 GiB ceiling leaves a defensible worst-case fork/COW margin.
            memory: 2Gi
          requests:
            cpu: 250m
            memory: 384Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 999
          seccompProfile:
            type: RuntimeDefault
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data
          name: valkey-data
        - mountPath: /secrets/users
          name: users-secret
          readOnly: true
        - mountPath: /config
          name: valkey-config
          readOnly: true
        - mountPath: /etc/valkey/tls
          name: valkey-tls
          readOnly: true
      - command:
        - valkey-server
        - /data/sentinel.conf
        - --sentinel
        # Override Sentinel's rewritten PVC config as well as the ConfigMap.
        - --port
        - "0"
        - --tls-port
        - "26380"
        - --tls-cert-file
        - /etc/valkey/tls/tls.crt
        - --tls-key-file
        - /etc/valkey/tls/tls.key
        - --tls-ca-cert-file
        - /etc/valkey/tls/ca.crt
        - --tls-auth-clients
        - "no"
        - --tls-replication
        - "yes"
        env:
        - name: REDISCLI_AUTH
          valueFrom:
            secretKeyRef:
              key: valkey-password
              name: valkey-core-secret
        image: valkey/valkey@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - valkey-cli
            - -p
            - "26380"
            - --tls
            - --cacert
            - /etc/valkey/tls/ca.crt
            - --sni
            - valkey.valkey.svc.cluster.local
            - ping
          failureThreshold: 3
          initialDelaySeconds: 20
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        name: sentinel
        ports:
        - containerPort: 26380
          name: sentinel-tls
          protocol: TCP
        readinessProbe:
          exec:
            command:
            - valkey-cli
            - -p
            - "26380"
            - --tls
            - --cacert
            - /etc/valkey/tls/ca.crt
            - --sni
            - valkey.valkey.svc.cluster.local
            - ping
          failureThreshold: 3
          initialDelaySeconds: 15
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 3
        startupProbe:
          exec:
            command:
            - valkey-cli
            - -p
            - "26380"
            - --tls
            - --cacert
            - /etc/valkey/tls/ca.crt
            - --sni
            - valkey.valkey.svc.cluster.local
            - ping
          failureThreshold: 30
          periodSeconds: 2
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 250m
            memory: 64Mi
          requests:
            # TLS health checks use 25-40m steadily on every replica.
            cpu: 50m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 999
          seccompProfile:
            type: RuntimeDefault
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data
          name: valkey-data
        - mountPath: /etc/valkey/tls
          name: valkey-tls
          readOnly: true
      dnsPolicy: ClusterFirst
      priorityClassName: infra-low
      restartPolicy: Always
      # Tolerate the worker-pool taint so a valkey-node lands on worker1 too.
      # Required anti-affinity keeps exactly one member per node without
      # exposing Valkey through a hostPort.
      tolerations:
      - key: itsbagelbot.dev/pool
        operator: Equal
        value: worker-pool
        effect: NoSchedule
      schedulerName: default-scheduler
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/component: node
                app.kubernetes.io/instance: valkey
                app.kubernetes.io/name: valkey
            topologyKey: kubernetes.io/hostname
      securityContext:
        fsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/component: node
            app.kubernetes.io/instance: valkey
            app.kubernetes.io/name: valkey
        maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
      volumes:
      - name: users-secret
        secret:
          defaultMode: 256
          secretName: valkey-users-secret
      - configMap:
          defaultMode: 420
          name: valkey-config
        name: valkey-config
      - name: valkey-tls
        secret:
          defaultMode: 288
          secretName: valkey-server-tls
  updateStrategy:
    type: RollingUpdate
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: valkey-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 8Gi
      volumeMode: Filesystem
    status:
      phase: Pending
