apiVersion: apps/v1
kind: StatefulSet
metadata:
  annotations:
    # One logical keyspace with one Sentinel-elected writable primary.
    itsbagelbot.dev/valkey-partitioning: disabled
    itsbagelbot.dev/valkey-topology: sentinel-single-primary
  labels:
    app.kubernetes.io/component: node
    app.kubernetes.io/instance: valkey
    app.kubernetes.io/name: valkey
  name: valkey-node
  namespace: valkey
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  # Four colocated Valkey+Sentinel voters produce one writable primary and
  # three replicas. This count is a CI-enforced configuration invariant.
  replicas: 4
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/component: node
      app.kubernetes.io/instance: valkey
      app.kubernetes.io/name: valkey
  serviceName: valkey-headless
  template:
    metadata:
      annotations:
        # De-meshed. Nodes still announce stable Tailscale IPs for Sentinel and
        # node-local reads, while native Valkey TLS adds end-to-end identity and
        # encryption independent of the transport. Only the native TLS
        # listeners are exposed: data on 6380 and Sentinel on 26380.
        linkerd.io/inject: disabled
        secrets.doppler.com/reload: 'true'
      labels:
        app.kubernetes.io/component: node
        app.kubernetes.io/instance: valkey
        app.kubernetes.io/name: valkey
    spec:
      # Seed the writable /data copies of valkey.conf and sentinel.conf ONCE.
      # After first boot valkey and sentinel own these files: valkey rewrites
      # replicaof on every Sentinel-driven failover and sentinel persists its
      # known peers/epoch, so a restarted pod reads its real current role from
      # /data instead of re-deriving it. The only dynamic input is the node's
      # Tailscale announce IP, taken from the downward API (status.hostIP is the
      # node's tailnet address on this cluster) rather than a hardcoded table,
      # so it is correct on all four nodes including worker1.
      initContainers:
      # The valkey/valkey image is Debian-based with no curl/wget/openssl and
      # runs non-root with no package-manager access, so the k8s-API lookup
      # below needs a separate image that actually has curl. Writes the
      # result to a shared emptyDir for config-init to read.
      - name: fetch-master-ip
        image: curlimages/curl:8.11.0
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -ec
        - |
          if [ -f /data/sentinel.conf ]; then
            exit 0
          fi
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          APISERVER=https://kubernetes.default.svc

          MASTER_IP=""
          while [ -z "${MASTER_IP}" ]; do
            RES=$(curl -s --cacert ${CACERT} -H "Authorization: Bearer ${TOKEN}" ${APISERVER}/api/v1/namespaces/valkey/pods/valkey-node-0 || true)
            MASTER_IP=$(echo "${RES}" | grep -o '"hostIP": "[^"]*"' | head -n 1 | cut -d'"' -f4)
            if [ -z "${MASTER_IP}" ]; then
              echo "Waiting for valkey-node-0 to be scheduled and have a hostIP..."
              sleep 2
            fi
          done
          echo -n "${MASTER_IP}" > /shared/master_ip
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 999
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - mountPath: /data
          name: valkey-data
        - mountPath: /shared
          name: shared-tmp
      - name: config-init
        image: valkey/valkey@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -ec
        - |
          # Resolve the CURRENT master: ask a live Sentinel first (the fleet may
          # have failed over any number of times since pod-0 was master), falling
          # back to the /shared pod-0 seed only for a full cold start where no
          # Sentinel answers. Blindly seeding replicaof from pod-0 chains a new
          # replica under whatever pod-0 happens to be — on worker1 that is the
          # fenced priority-0 replica — creating a sub-replica that Sentinel
          # neither discovers nor manages (hit live on the 2026-07-09 scale-out).
          #
          # Every step here must tolerate absence under `sh -e`: a pod rejoining
          # with retained /data has both conf files, so fetch-master-ip exits
          # early WITHOUT writing /shared/master_ip and the seeds below are
          # never used — resolution failing must not fail the init.
          MASTER_IP=""
          if [ -f /shared/master_ip ]; then
            MASTER_IP=$(cat /shared/master_ip)
          fi
          LIVE_MASTER=$( { REDISCLI_AUTH="${CORE}" valkey-cli -h valkey.valkey.svc.cluster.local -p 26380 --tls --cacert /etc/valkey/tls/ca.crt --sni valkey.valkey.svc.cluster.local --no-auth-warning sentinel get-master-addr-by-name myprimary 2>/dev/null || true; } | head -n 1)
          case "${LIVE_MASTER}" in *.*.*.*) MASTER_IP="${LIVE_MASTER}";; esac
          if [ ! -f /data/valkey.conf ]; then
            cp /config/valkey.conf /data/valkey.conf
            {
              echo "masterauth ${CORE}"
              echo "replica-announce-ip ${HOST_IP}"
              echo "replica-announce-port 6380"
            } >> /data/valkey.conf
            # First-boot seed only: every pod but the master's begins as its
            # replica; Sentinel owns all failovers afterwards. Skipped once
            # valkey has rewritten its own replication state. Empty MASTER_IP
            # (resolution failed on a true cold start) falls back to pod-0.
            if [ "${POD_INDEX}" != "0" ]; then
              echo "replicaof ${MASTER_IP:-valkey-node-0.valkey-headless.valkey.svc.cluster.local} 6380" >> /data/valkey.conf
            fi
            # The home node (worker1, flaky wifi) keeps a read replica but must never
            # be promoted: Sentinel never elects a priority-0 replica. Keyed on the
            # node, not the ordinal, so whichever pod lands on worker1 is fenced. The
            # live cluster was set the same way via CONFIG SET + REWRITE; this only
            # re-seeds it after a fresh-PVC disaster rebuild.
            if [ "${NODE_NAME}" = "worker1" ]; then
              echo "replica-priority 0" >> /data/valkey.conf
            fi
            # node1 (2-core, future DB node) is the last-resort master: higher
            # number = less preferred, so failovers pick node3/node2 (100) first.
            # Mirrors the live CONFIG SET applied 2026-07-09.
            if [ "${NODE_NAME}" = "node1" ]; then
              echo "replica-priority 200" >> /data/valkey.conf
            fi
            chmod 600 /data/valkey.conf
          fi
          # io-threads is deliberately reconciled on every boot instead of
          # only on fresh PVCs. CONFIG REWRITE persists old values, and node1
          # has only two cores while the remaining data-plane hosts have 6-8.
          # Valkey 9.1 threads both reads and writes automatically; the former
          # io-threads-do-reads switch is deprecated and intentionally absent.
          sed -i '/^io-threads /d' /data/valkey.conf
          if [ "${NODE_NAME}" = "node1" ]; then
            echo "io-threads 1" >> /data/valkey.conf
          else
            echo "io-threads 2" >> /data/valkey.conf
          fi
          # Retained PVCs carry Sentinel-rewritten topology. Move those live
          # addresses to the TLS listeners before either process starts; doing
          # this in config-init makes the migration repeatable after restores.
          sed -i -E \
            -e 's/^(replica-announce-port) 6379$/\1 6380/' \
            -e 's/^(replicaof [^ ]+) 6379$/\1 6380/' \
            /data/valkey.conf
          if [ ! -f /data/sentinel.conf ]; then
            cp /config/sentinel.conf /data/sentinel.conf
            {
              echo "requirepass ${CORE}"
              echo "sentinel auth-pass myprimary ${CORE}"
              echo "sentinel announce-ip ${HOST_IP}"
              echo "sentinel announce-port 26380"
              echo "sentinel monitor myprimary ${MASTER_IP} 6380 2"
            } >> /data/sentinel.conf
            chmod 600 /data/sentinel.conf
          fi
          sed -i -E \
            -e 's/^(sentinel announce-port) 26379$/\1 26380/' \
            -e 's/^(sentinel monitor myprimary [^ ]+) 6379 (.+)$/\1 6380 \2/' \
            -e 's/^(sentinel known-replica myprimary [^ ]+) 6379$/\1 6380/' \
            -e 's/^(sentinel known-sentinel myprimary [^ ]+) 26379 (.+)$/\1 26380 \2/' \
            /data/sentinel.conf
          # A mixed-listener rollout can leave both the old endpoint and the
          # newly auto-discovered TLS endpoint in Sentinel's persisted state.
          # Port migration collapses those into the same address, which 9.1
          # correctly rejects as a duplicate. Keep the first stable identity;
          # Sentinel refreshes run IDs and topology through hello messages.
          awk '
            $1 == "sentinel" && ($2 == "known-replica" || $2 == "known-sentinel") && $3 == "myprimary" {
              endpoint = $2 FS $4 FS $5
              if (seen[endpoint]++) next
            }
            { print }
          ' /data/sentinel.conf > /data/sentinel.conf.dedup
          mv /data/sentinel.conf.dedup /data/sentinel.conf
          chmod 600 /data/sentinel.conf
        env:
        - name: HOST_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_INDEX
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
        - name: CORE
          valueFrom:
            secretKeyRef:
              key: valkey-password
              name: valkey-core-secret
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 999
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - mountPath: /data
          name: valkey-data
        - mountPath: /config
          name: valkey-config
          readOnly: true
        - mountPath: /shared
          name: shared-tmp
        - mountPath: /etc/valkey/tls
          name: valkey-tls
          readOnly: true
      containers:
      # valkey-server runs the seeded /data/valkey.conf directly. masterauth and
      # the Tailscale announce address come in as flags from the downward API /
      # secret so they track the live node IP and never need a start script.
      - command:
        - valkey-server
        - /data/valkey.conf
        - --replica-announce-ip
        - $(HOST_IP)
        - --replica-announce-port
        - "6380"
        - --masterauth
        - $(CORE)
        # Keep the fleet unpartitioned and replicas read-only. These flags are
        # authoritative over retained /data/valkey.conf files that Valkey may
        # have rewritten before the policy was committed to the repository.
        - --cluster-enabled
        - "no"
        - --replica-read-only
        - "yes"
        # Command-line policy is authoritative even for retained PVC configs
        # written before these limits existed. This fixes failover replicas
        # that were still maxmemory=0/noeviction while preserving their role.
        - --maxmemory
        - 512mb
        - --maxmemory-policy
        - volatile-lru
        # Retained PVCs may contain an older plaintext port. Command-line
        # policy is authoritative so a restore cannot reopen it.
        - --port
        - "0"
        - --tls-port
        - "6380"
        - --tls-cert-file
        - /etc/valkey/tls/tls.crt
        - --tls-key-file
        - /etc/valkey/tls/tls.key
        - --tls-ca-cert-file
        - /etc/valkey/tls/ca.crt
        - --tls-auth-clients
        - "no"
        - --tls-replication
        - "yes"
        env:
        - name: HOST_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: CORE
          valueFrom:
            secretKeyRef:
              key: valkey-password
              name: valkey-core-secret
        - name: REDISCLI_AUTH
          valueFrom:
            secretKeyRef:
              key: valkey-password
              name: valkey-core-secret
        image: valkey/valkey@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - valkey-cli
            - -p
            - "6380"
            - --tls
            - --cacert
            - /etc/valkey/tls/ca.crt
            - --sni
            - valkey.valkey.svc.cluster.local
            - ping
          failureThreshold: 3
          initialDelaySeconds: 20
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        name: valkey
        ports:
        - containerPort: 6380
          hostPort: 6380
          name: redis-tls
          protocol: TCP
        readinessProbe:
          exec:
            command:
            - valkey-cli
            - -p
            - "6380"
            - --tls
            - --cacert
            - /etc/valkey/tls/ca.crt
            - --sni
            - valkey.valkey.svc.cluster.local
            - ping
          failureThreshold: 3
          initialDelaySeconds: 10
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 3
        startupProbe:
          exec:
            command:
            - valkey-cli
            - -p
            - "6380"
            - --tls
            - --cacert
            - /etc/valkey/tls/ca.crt
            - --sni
            - valkey.valkey.svc.cluster.local
            - ping
          failureThreshold: 30
          periodSeconds: 2
          timeoutSeconds: 3
        resources:
          limits:
            cpu: '2'
            memory: 1Gi
          requests:
            cpu: 250m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 999
          seccompProfile:
            type: RuntimeDefault
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data
          name: valkey-data
        - mountPath: /secrets/users
          name: users-secret
          readOnly: true
        - mountPath: /config
          name: valkey-config
          readOnly: true
        - mountPath: /etc/valkey/tls
          name: valkey-tls
          readOnly: true
      - command:
        - valkey-server
        - /data/sentinel.conf
        - --sentinel
        # Override Sentinel's rewritten PVC config as well as the ConfigMap.
        - --port
        - "0"
        - --tls-port
        - "26380"
        - --tls-cert-file
        - /etc/valkey/tls/tls.crt
        - --tls-key-file
        - /etc/valkey/tls/tls.key
        - --tls-ca-cert-file
        - /etc/valkey/tls/ca.crt
        - --tls-auth-clients
        - "no"
        - --tls-replication
        - "yes"
        env:
        - name: REDISCLI_AUTH
          valueFrom:
            secretKeyRef:
              key: valkey-password
              name: valkey-core-secret
        image: valkey/valkey@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - valkey-cli
            - -p
            - "26380"
            - --tls
            - --cacert
            - /etc/valkey/tls/ca.crt
            - --sni
            - valkey.valkey.svc.cluster.local
            - ping
          failureThreshold: 3
          initialDelaySeconds: 20
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        name: sentinel
        ports:
        - containerPort: 26380
          hostPort: 26380
          name: sentinel-tls
          protocol: TCP
        readinessProbe:
          exec:
            command:
            - valkey-cli
            - -p
            - "26380"
            - --tls
            - --cacert
            - /etc/valkey/tls/ca.crt
            - --sni
            - valkey.valkey.svc.cluster.local
            - ping
          failureThreshold: 3
          initialDelaySeconds: 15
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 3
        startupProbe:
          exec:
            command:
            - valkey-cli
            - -p
            - "26380"
            - --tls
            - --cacert
            - /etc/valkey/tls/ca.crt
            - --sni
            - valkey.valkey.svc.cluster.local
            - ping
          failureThreshold: 30
          periodSeconds: 2
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 999
          seccompProfile:
            type: RuntimeDefault
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data
          name: valkey-data
        - mountPath: /etc/valkey/tls
          name: valkey-tls
          readOnly: true
      dnsPolicy: ClusterFirst
      priorityClassName: infra-low
      restartPolicy: Always
      # Tolerate the worker-pool taint so a valkey-node lands on worker1 too.
      # one-per-node spread (below) + hostPort keep it exactly one per node.
      tolerations:
      - key: itsbagelbot.dev/pool
        operator: Equal
        value: worker-pool
        effect: NoSchedule
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
      serviceAccount: valkey
      serviceAccountName: valkey
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/component: node
            app.kubernetes.io/instance: valkey
            app.kubernetes.io/name: valkey
        maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
      volumes:
      - name: users-secret
        secret:
          defaultMode: 256
          secretName: valkey-users-secret
      - configMap:
          defaultMode: 420
          name: valkey-config
        name: valkey-config
      - name: shared-tmp
        emptyDir: {}
      - name: valkey-tls
        secret:
          defaultMode: 288
          secretName: valkey-server-tls
  updateStrategy:
    type: RollingUpdate
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: valkey-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 8Gi
      volumeMode: Filesystem
    status:
      phase: Pending
