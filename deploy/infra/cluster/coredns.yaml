# Cluster DNS. Replaces the k3s-packaged coredns addon (skipped via
# coredns.yaml.skip on the node2 server since the 2026-06-30 DNS-stall fix,
# when the stock 1-replica Deployment was hand-converted to a DaemonSet).
# This file brings that hand-applied state under Flux ownership with two
# deliberate changes (2026-07-15 network-tune):
#
#   1. Required nodeAffinity keeps the DaemonSet on node2/node3/worker1 only,
#      so every hot-path pod has a node-local resolver. (The node1 exclusion
#      is inert since node1 left the cluster; kept so the applied spec is
#      unchanged.)
#   2. kube-dns gets trafficDistribution: PreferSameNode (same mechanism as
#      the nats Service): queries from node2/node3/worker1 never leave the
#      node.
#
# The ConfigMap deliberately declares ONLY the Corefile key. NodeHosts is
# owned and continuously updated by the k3s node-hosts controller; omitting
# it here keeps server-side apply from fighting over that key. Apply this
# file with SSA (Flux does; for manual use: kubectl apply --server-side).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: coredns
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: system:coredns
  labels:
    kubernetes.io/bootstrapping: rbac-defaults
rules:
  - apiGroups: [""]
    resources: [endpoints, services, pods, namespaces]
    verbs: [list, watch]
  - apiGroups: [discovery.k8s.io]
    resources: [endpointslices]
    verbs: [list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: system:coredns
  labels:
    kubernetes.io/bootstrapping: rbac-defaults
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:coredns
subjects:
  - kind: ServiceAccount
    name: coredns
    namespace: kube-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
        }
        hosts /etc/coredns/NodeHosts {
          ttl 60
          reload 15s
          fallthrough
        }
        prometheus :9153
        cache 30 {
          success 9984 30
          denial 9984 5
          prefetch 5 60s 10%
          serve_stale 3600s immediate
        }
        loop
        reload
        loadbalance
        import /etc/coredns/custom/*.override
        # Forward external names to routable anycast resolvers instead of
        # /etc/resolv.conf: the former node1's host upstream was an OCI
        # link-local address (169.254.169.254) that CoreDNS could not reach
        # from the pod network, which stalled fresh lookups on that node.
        forward . 1.1.1.1 8.8.8.8 9.9.9.9 {
          policy sequential
          max_concurrent 1000
        }
    }
    import /etc/coredns/custom/*.server
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: coredns
  namespace: kube-system
  labels:
    k8s-app: kube-dns
    kubernetes.io/name: CoreDNS
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      k8s-app: kube-dns
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        k8s-app: kube-dns
    spec:
      serviceAccountName: coredns
      priorityClassName: system-cluster-critical
      # DNS lives on the hot nodes only. The node1 exclusion below is inert
      # since node1 left the cluster; kept so the applied spec is unchanged.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [node1]
      nodeSelector:
        kubernetes.io/os: linux
      dnsPolicy: Default
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        # worker1 carries the worker-pool taint; DNS must still run there.
        - key: itsbagelbot.dev/pool
          operator: Equal
          value: worker-pool
          effect: NoSchedule
      containers:
        - name: coredns
          image: rancher/mirrored-coredns-coredns:1.14.3
          imagePullPolicy: IfNotPresent
          args: ["-conf", "/etc/coredns/Corefile"]
          ports:
            - {containerPort: 53, name: dns, protocol: UDP}
            - {containerPort: 53, name: dns-tcp, protocol: TCP}
            - {containerPort: 9153, name: metrics, protocol: TCP}
          resources:
            # The node-local caches on node2/node3 hold about 100Mi steadily.
            requests: {cpu: 100m, memory: 128Mi}
            limits: {memory: 256Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add: [NET_BIND_SERVICE]
              drop: [all]
            readOnlyRootFilesystem: true
          livenessProbe:
            httpGet: {path: /health, port: 8080, scheme: HTTP}
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet: {path: /ready, port: 8181, scheme: HTTP}
            periodSeconds: 2
            successThreshold: 1
            failureThreshold: 3
          volumeMounts:
            - {name: config-volume, mountPath: /etc/coredns, readOnly: true}
            - {name: custom-config-volume, mountPath: /etc/coredns/custom, readOnly: true}
      volumes:
        - name: config-volume
          configMap:
            name: coredns
            items:
              - {key: Corefile, path: Corefile}
              - {key: NodeHosts, path: NodeHosts}
        - name: custom-config-volume
          configMap:
            name: coredns-custom
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: kube-dns
  namespace: kube-system
  annotations:
    prometheus.io/port: "9153"
    prometheus.io/scrape: "true"
  labels:
    k8s-app: kube-dns
    kubernetes.io/cluster-service: "true"
    kubernetes.io/name: CoreDNS
spec:
  type: ClusterIP
  clusterIP: 10.43.0.10
  ipFamilyPolicy: SingleStack
  # Resolve against the node-local CoreDNS when one exists (node2/node3/
  # worker1).
  trafficDistribution: PreferSameNode
  selector:
    k8s-app: kube-dns
  ports:
    - {name: dns, port: 53, protocol: UDP, targetPort: 53}
    - {name: dns-tcp, port: 53, protocol: TCP, targetPort: 53}
    - {name: metrics, port: 9153, protocol: TCP, targetPort: 9153}
---
# Drains/rolls may take one replica at a time, never two.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: coredns
  namespace: kube-system
spec:
  minAvailable: 2
  selector:
    matchLabels:
      k8s-app: kube-dns
