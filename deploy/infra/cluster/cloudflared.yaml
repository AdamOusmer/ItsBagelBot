# Cloudflare Tunnel connector. Public ingress enters here: Cloudflare's edge
# dials these outbound connectors and forwards to traefik.kube-system:443.
#
# Replicas hard-spread one per non-worker host (node2/node3). worker1 is
# excluded explicitly: it is a burst worker, not part of the ingress failure
# domain. A single tunnel ID supports many connector replicas (Cloudflare's
# native HA model). Both outbound paths are already encrypted (443 to traefik
# and 7844 to Cloudflare).
#
# Managed by the cluster Flux Kustomization. config = cloudflared-config
# ConfigMap, creds = cloudflared-tunnel Secret (Doppler-managed; the reload
# annotation rolls pods on rotation).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
  labels:
    app.kubernetes.io/name: cloudflared
spec:
  replicas: 2 # one per non-worker node (node2, node3); node1 decommissioned
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Hard one-per-node anti-affinity consumes both eligible hosts at steady
      # state, so a surge pod can never schedule. Replace one connector at a
      # time while the other continues serving the tunnel.
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
      app.kubernetes.io/instance: cloudflared-deployment
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/instance: cloudflared-deployment
      annotations:
        secrets.doppler.com/reload: "true"
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: ["worker1"]
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: cloudflared-deployment
      # node2 is the control plane and remains one of the three ingress nodes.
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        fsGroup: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.5.0
          imagePullPolicy: IfNotPresent
          args: ["tunnel", "--config", "/etc/cloudflared/config/config.yaml", "run"]
          ports:
            - name: metrics
              containerPort: 2000
              protocol: TCP
          livenessProbe:
            httpGet: {path: /ready, port: 2000}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet: {path: /ready, port: 2000}
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: {cpu: 25m, memory: 64Mi}
            limits: {cpu: 500m, memory: 256Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          volumeMounts:
            - {name: config, mountPath: /etc/cloudflared/config, readOnly: true}
            - {name: creds, mountPath: /etc/cloudflared/creds, readOnly: true}
      volumes:
        - name: config
          configMap:
            name: cloudflared-config
        - name: creds
          secret:
            secretName: cloudflared-tunnel
            items:
              - {key: credentials.json, path: credentials.json}
              - {key: origin_ca_root.pem, path: origin_ca_root.pem}
