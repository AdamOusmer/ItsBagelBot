# Linkerd control-plane HA without taking ownership of the upstream Deployment
# specs. HPAs pin each control-plane Deployment at three replicas; PDBs keep at
# least two available during voluntary disruptions.
#
# This avoids copying Linkerd's generated manifests into this repo while still
# making the installed control plane resilient to a node loss or rolling restart.
#
# LIVE PATCH NOT CAPTURED HERE (re-apply after every `linkerd upgrade`): the
# three control-plane Deployments carry a nodeAffinity keeping them OFF worker1
# (home node) so the HA trio always sits on the stable cloud nodes:
#   for d in linkerd-destination linkerd-identity linkerd-proxy-injector; do
#     kubectl -n linkerd patch deploy "$d" --type=strategic -p '{"spec":{"template":{"spec":{"affinity":{"nodeAffinity":{"requiredDuringSchedulingIgnoredDuringExecution":{"nodeSelectorTerms":[{"matchExpressions":[{"key":"kubernetes.io/hostname","operator":"NotIn","values":["worker1"]}]}]}}}}}}}'
#   done
# The Deployments are managed by the linkerd CLI (no Helm release), so this
# cannot live in Flux without forking upstream manifests.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: linkerd-destination-ha
  namespace: linkerd
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: linkerd-destination
  minReplicas: 3
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: linkerd-identity-ha
  namespace: linkerd
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: linkerd-identity
  minReplicas: 3
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: linkerd-proxy-injector-ha
  namespace: linkerd
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: linkerd-proxy-injector
  minReplicas: 3
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: linkerd-destination-ha
  namespace: linkerd
spec:
  minAvailable: 2
  # Already-unhealthy control-plane pods stay evictable so a node drain can't
  # deadlock on the budget; healthy replicas still honor minAvailable.
  unhealthyPodEvictionPolicy: AlwaysAllow
  selector:
    matchLabels:
      linkerd.io/control-plane-component: destination
      linkerd.io/control-plane-ns: linkerd
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: linkerd-identity-ha
  namespace: linkerd
spec:
  minAvailable: 2
  # Already-unhealthy control-plane pods stay evictable so a node drain can't
  # deadlock on the budget; healthy replicas still honor minAvailable.
  unhealthyPodEvictionPolicy: AlwaysAllow
  selector:
    matchLabels:
      linkerd.io/control-plane-component: identity
      linkerd.io/control-plane-ns: linkerd
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: linkerd-proxy-injector-ha
  namespace: linkerd
spec:
  minAvailable: 2
  # Already-unhealthy control-plane pods stay evictable so a node drain can't
  # deadlock on the budget; healthy replicas still honor minAvailable.
  unhealthyPodEvictionPolicy: AlwaysAllow
  selector:
    matchLabels:
      linkerd.io/control-plane-component: proxy-injector
