# Cluster-scoped / cross-namespace infrastructure, reconciled by the Flux
# "cluster" Kustomization (deploy/flux/clusters/production/cluster.yaml).
# Deliberately NOT namespaced here: each manifest carries its own namespace
# (cloudflared -> cloudflared, traefik HelmChartConfig -> kube-system), so the
# Flux Kustomization must leave targetNamespace unset and this file must not set
# a `namespace:` field.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cloudflared.yaml
  - crowdsec-dopplersecret.yaml
  # coredns replaces the skipped k3s addon (coredns.yaml.skip on node2);
  # DaemonSet on node2/node3/worker1 + PreferSameNode kube-dns.
  - coredns.yaml
  # Own metrics-server instead of the immutable k3s packaged manifest so
  # kubelet collection stays on the Tailscale InternalIP management plane.
  - metrics-server.yaml
  - newrelic-dopplersecrets.yaml
  - newrelic-logging.yaml
  - traefik-config.yaml
