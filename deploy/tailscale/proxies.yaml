# Tailscale operator proxy fleet. Apply AFTER the operator helm install
# (the CRDs ship with the chart).
#
# The ingress ProxyGroup runs one proxy per node. The Tailscale operator
# currently realizes ProxyGroups as StatefulSets, not DaemonSets, so this uses
# the supported API shape while keeping DaemonSet-like placement: two replicas
# with strict hostname anti-affinity (node3 decommissioned, worker1 not
# included). Ingresses opt in via the tailscale.com/proxy-group annotation.
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: ha-spread
spec:
  statefulSet:
    pod:
      # Same node-level HA shape as the rest of the ingress fleet.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  tailscale.com/parent-resource: ts-ingress
              topologyKey: kubernetes.io/hostname
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    tailscale.com/parent-resource: ts-ingress
                topologyKey: kubernetes.io/hostname
      tailscaleContainer:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 500m
            memory: 128Mi
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyGroup
metadata:
  name: ts-ingress
spec:
  type: ingress
  replicas: 2
  proxyClass: ha-spread
